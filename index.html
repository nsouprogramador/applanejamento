<html lang="pt-BR">
<head>

<style>
:root {
  --bg:        #080b12;
  --surface:   #0e1420;
  --surface2:  #141d2e;
  --surface3:  #1b2540;
  --border:    #1e2d45;
  --border2:   #273650;
  --gold:      #c9a84c;
  --gold-dim:  rgba(201,168,76,.12);
  --gold-glow: rgba(201,168,76,.25);
  --blue:      #3d7fff;
  --blue-dim:  rgba(61,127,255,.12);
  --green:     #22c97a;
  --green-dim: rgba(34,201,122,.1);
  --red:       #e05252;
  --red-dim:   rgba(224,82,82,.1);
  --amber:     #f0a030;
  --text:      #d8e0f0;
  --muted:     #4a6080;
  --muted2:    #7a90b8;
  --mono:      'JetBrains Mono', monospace;
  --serif:     'Crimson Pro', Georgia, serif;
  --sans:      'Outfit', sans-serif;
  --radius:    10px;
  --shadow:    0 4px 24px rgba(0,0,0,.5);
  /* Easings e sombras extras */
  --ease:       cubic-bezier(.22,.61,.36,1);
  --ease-swift: cubic-bezier(.4,0,.2,1);
  --shadow-sm:  0 1px 2px rgba(0,0,0,.3), 0 1px 3px rgba(0,0,0,.2);
  --shadow-md:  0 2px 8px rgba(0,0,0,.35), 0 4px 16px rgba(0,0,0,.25);
  --shadow-lg:  0 8px 24px rgba(0,0,0,.4), 0 16px 48px rgba(0,0,0,.3);
  --inner-top:  inset 0 1px 0 rgba(255,255,255,.04);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 0;
  background:
    radial-gradient(ellipse 1200px 800px at 30% 10%, rgba(201,168,76,.025), transparent 70%),
    radial-gradient(ellipse 800px 600px at 90% 90%, rgba(61,127,255,.025), transparent 65%),
    var(--bg);
  background-attachment: fixed;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -.005em;
}
h1, h2, h3 { font-family: var(--serif); font-weight: 500; letter-spacing: -.015em; }
button { font-family: inherit; }
::selection { background: rgba(201,168,76,.35); color: #fff; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--gold); }
input, select, textarea {
  width: 100%;
  background: rgba(20,29,46,.6);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans); font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color .2s var(--ease), box-shadow .2s var(--ease);
}
input:focus, select:focus, textarea:focus {
  border-color: rgba(201,168,76,.5);
  box-shadow: 0 0 0 3px rgba(201,168,76,.12);
  background: var(--surface2);
}


.app-topo {
  background: linear-gradient(180deg, var(--surface) 0%, rgba(14,20,32,.95) 100%);
  border-bottom: 1px solid var(--border);
  padding: 14px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}
.app-logo {
  font-family: var(--serif);
  font-size: 22px;
  letter-spacing: -.02em;
  font-weight: 500;
  background: linear-gradient(180deg, var(--gold) 0%, #d4b45e 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.app-sub {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .2em;
  color: var(--muted2);
  text-transform: uppercase;
  margin-top: 2px;
}
.app-acoes { display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 16px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: rgba(255,255,255,.02);
  color: var(--text);
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--sans);
  transition: all .2s var(--ease);
}
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn.primary {
  background: linear-gradient(180deg, var(--gold), #b8962f);
  color: #0a0d15;
  border-color: var(--gold);
}
.btn.primary:hover { filter: brightness(1.08); color: #0a0d15; }

.dropzone {
  margin: 20px 22px;
  border: 2px dashed var(--border2);
  border-radius: 14px;
  padding: 28px;
  text-align: center;
  cursor: pointer;
  transition: all .25s var(--ease);
  background-image: radial-gradient(circle at 50% 50%, rgba(201,168,76,.04) 0%, transparent 60%);
}
.dropzone:hover, .dropzone.dragging {
  border-color: var(--gold);
  background-image: radial-gradient(circle at 50% 50%, rgba(201,168,76,.1) 0%, transparent 60%);
}
.dropzone-icon { font-size: 36px; opacity: .6; margin-bottom: 10px; }
.dropzone-titulo {
  font-family: var(--serif); font-size: 17px; color: var(--text); margin-bottom: 6px;
}
.dropzone-hint { font-size: 12px; color: var(--muted2); }
.dropzone-hint kbd {
  font-family: var(--mono); font-size: 10px;
  padding: 1px 5px; border-radius: 3px;
  background: var(--surface2); border: 1px solid var(--border2);
}



.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: linear-gradient(180deg, var(--surface2), var(--surface));
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 22px;
  font-size: 12.5px;
  color: var(--text);
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s, transform .2s;
  box-shadow: var(--shadow-lg), var(--inner-top);
  z-index: 9999;
}
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px; border-radius: 16px;
  font-family: var(--mono); font-size: 10px; letter-spacing: .1em;
  background: rgba(0,0,0,.25); color: var(--muted2);
}
.status-badge.ok { background: rgba(34,201,122,.12); color: var(--green); }
.status-badge.warn { background: rgba(240,160,48,.12); color: var(--amber); }

</style>
<style>

/* ═════ Reset + base do planejamento ═════ */
#tab-planejamento {
  padding: 24px 20px 40px;
  max-width: 1100px;
  margin: 0 auto;
}

/* ─── Cabeçalho do segurado ─── */
.p3-cabecalho {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-bottom: 14px;
  margin-bottom: 18px;
  border-bottom: 1px solid var(--border);
  gap: 16px;
  flex-wrap: wrap;
}
.p3-nome {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: -.015em;
  line-height: 1.15;
}
.p3-meta {
  display: flex; gap: 14px; flex-wrap: wrap;
  font-size: 11px;
  color: var(--muted2);
  font-family: var(--mono);
  letter-spacing: .05em;
  margin-top: 6px;
}
.p3-meta span { white-space: nowrap; }
.p3-modo-toggle {
  display: flex; gap: 2px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px;
}
.p3-modo-btn {
  background: transparent;
  border: none;
  color: var(--muted2);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .08em;
  padding: 5px 12px;
  border-radius: 16px;
  cursor: pointer;
  transition: all .2s var(--ease);
}
.p3-modo-btn.ativo {
  background: var(--gold);
  color: #0a0d15;
  font-weight: 700;
}

/* ─── Barra de DER ─── */
.p3-der-bar {
  background: linear-gradient(135deg, rgba(201,168,76,.1), rgba(61,127,255,.04));
  border: 1px solid rgba(201,168,76,.25);
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 18px;
  display: flex; align-items: center; gap: 14px;
  flex-wrap: wrap;
  transition: background .2s, border-color .2s;
}
/* Destaque quando simulando data passada (retrospectiva) */
.p3-der-bar.sim-passado {
  background: linear-gradient(135deg, rgba(61,127,255,.12), rgba(61,127,255,.04));
  border-color: rgba(61,127,255,.4);
  border-left: 4px solid var(--blue);
}
.p3-der-bar.sim-passado .p3-der-label { color: var(--blue); }
.p3-der-bar.sim-passado .p3-der-hint  { color: var(--blue); font-weight: 500; }
/* Destaque quando projetando (prospectiva) */
.p3-der-bar.sim-futuro {
  background: linear-gradient(135deg, rgba(240,160,48,.1), rgba(240,160,48,.03));
  border-color: rgba(240,160,48,.4);
  border-left: 4px solid var(--amber);
}
.p3-der-bar.sim-futuro .p3-der-label { color: var(--amber); }
.p3-der-bar.sim-futuro .p3-der-hint  { color: var(--amber); font-weight: 500; }

.p3-der-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .15em;
  color: var(--gold);
  text-transform: uppercase;
  font-weight: 700;
}
.p3-der-input {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 7px 12px;
  border-radius: 8px;
  width: 150px;
  text-align: center;
}
.p3-der-btns-grupo {
  display: inline-flex;
  gap: 4px;
  padding: 3px;
  background: rgba(8,11,18,.4);
  border-radius: 10px;
  border: 1px solid var(--border);
}
.p3-der-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--muted2);
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 7px;
  cursor: pointer;
  font-family: var(--sans);
  transition: all .15s var(--ease);
  white-space: nowrap;
}
.p3-der-btn:hover {
  background: rgba(201,168,76,.08);
  color: var(--gold);
}
.p3-der-btn.ativo {
  background: rgba(201,168,76,.12);
  border-color: rgba(201,168,76,.3);
  color: var(--gold);
}
.p3-der-hint {
  font-size: 11px;
  color: var(--muted2);
  margin-left: auto;
}

/* ─── Status Card (prioridade 1) ─── */
.p3-status-card {
  background: var(--surface);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  position: relative;
}
.p3-status-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--gold), transparent);
}
.p3-status-ref-badge {
  padding: 6px 18px;
  background: rgba(201,168,76,.06);
  border-bottom: 1px dashed var(--border);
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted2);
  letter-spacing: .04em;
}
.p3-status-ref-badge strong { color: var(--gold); }
.p3-status-ref-badge.nao-hoje {
  background: rgba(61,127,255,.08);
  border-bottom-color: rgba(61,127,255,.25);
  color: var(--blue);
}
.p3-status-ref-badge.nao-hoje strong { color: var(--blue); }

.p3-status-toggle {
  padding: 8px 18px;
  background: rgba(240,160,48,.04);
  border-bottom: 1px dashed var(--border);
}
.p3-status-toggle-label {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 11.5px;
  color: var(--muted2);
  line-height: 1.4;
}
.p3-status-toggle-label:hover { color: var(--text); }
.p3-status-toggle-label input[type=checkbox] {
  accent-color: var(--amber);
  cursor: pointer;
  flex-shrink: 0;
}
.p3-status-head {
  padding: 18px 22px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 18px;
  align-items: center;
}
.p3-status-icon {
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.p3-status-icon.ok    { background: rgba(34,201,122,.15); color: var(--green); }
.p3-status-icon.atencao { background: rgba(240,160,48,.15); color: var(--amber); }
.p3-status-icon.grave { background: rgba(224,82,82,.12); color: #e67070; }

.p3-status-principal {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--text);
  line-height: 1.3;
  font-weight: 500;
}
.p3-status-principal strong {
  color: var(--gold);
  font-weight: 600;
}
.p3-status-desc {
  font-size: 12px;
  color: var(--muted2);
  margin-top: 4px;
  line-height: 1.5;
}

.p3-status-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding: 16px 22px;
  background: rgba(0,0,0,.18);
  border-top: 1px solid var(--border);
}
.p3-stat {
  text-align: center;
}
.p3-stat-valor {
  font-family: var(--serif);
  font-size: 22px;
  color: var(--text);
  font-weight: 500;
  line-height: 1;
}
.p3-stat-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-top: 5px;
}

/* ─── Card da melhor opção (destaque) ─── */
.p3-melhor {
  background: linear-gradient(135deg, rgba(201,168,76,.12), rgba(201,168,76,.03));
  border: 1.5px solid var(--gold);
  border-radius: 14px;
  padding: 18px 22px;
  margin-bottom: 16px;
  box-shadow: 0 0 0 1px rgba(201,168,76,.15), 0 6px 20px rgba(201,168,76,.1);
  position: relative;
}
.p3-melhor-tag {
  position: absolute;
  top: -10px; left: 20px;
  background: var(--gold);
  color: #0a0d15;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .15em;
  padding: 3px 12px;
  border-radius: 10px;
}
.p3-melhor-titulo {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--gold);
  margin-top: 4px;
  margin-bottom: 6px;
  font-weight: 500;
  letter-spacing: -.01em;
}
.p3-melhor-data {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: .05em;
}
.p3-melhor-desc {
  font-size: 13px;
  color: var(--muted2);
  line-height: 1.6;
}
.p3-melhor-desc strong { color: var(--text); font-weight: 600; }

/* ─── Seções colapsáveis ─── */
.p3-secao {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 12px;
  transition: border-color .2s var(--ease);
}
.p3-secao:hover { border-color: var(--border2); }
.p3-secao-head {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  transition: background .15s var(--ease);
}
.p3-secao-head:hover { background: rgba(201,168,76,.02); }
.p3-secao-icon {
  font-size: 18px;
  flex-shrink: 0;
}
.p3-secao-titulo {
  flex: 1;
  font-family: var(--serif);
  font-size: 15px;
  color: var(--text);
  font-weight: 500;
  letter-spacing: -.005em;
}
.p3-secao-resumo {
  font-size: 11.5px;
  color: var(--muted2);
  font-family: var(--mono);
  letter-spacing: .03em;
}
.p3-chevron {
  color: var(--muted);
  font-size: 14px;
  transition: transform .25s var(--ease);
}
.p3-secao.aberta .p3-chevron { transform: rotate(180deg); }
.p3-secao-body {
  padding: 0 18px 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s var(--ease), padding .3s var(--ease);
}
.p3-secao.aberta .p3-secao-body {
  max-height: 3000px;
  padding: 4px 18px 18px;
  overflow-y: visible;
}

/* ─── Linha de benefício (comparativo) ─── */
.p3-beneficio-linha {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 14px;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s var(--ease);
  position: relative;
  overflow: hidden;
}
.p3-beneficio-linha:last-child { border-bottom: none; }
.p3-beneficio-linha:hover { background: rgba(255,255,255,.02); padding-left: 4px; }
.p3-beneficio-info {
  min-width: 0;
  overflow: hidden;
}
.p3-beneficio-nome {
  font-size: 14px;
  color: var(--text);
  font-weight: 500;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.p3-beneficio-nome.melhor::before {
  content: '🏆 ';
  margin-right: 4px;
}
.p3-beneficio-obs {
  font-size: 11px;
  color: var(--muted2);
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.p3-beneficio-data {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted2);
  white-space: nowrap;
}
.p3-status-pill {
  padding: 4px 12px;
  border-radius: 12px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  white-space: nowrap;
}
.p3-status-pill.direito { background: rgba(34,201,122,.15); color: var(--green); }
.p3-status-pill.proximo { background: rgba(240,160,48,.15); color: var(--amber); }
.p3-status-pill.longe   { background: rgba(224,82,82,.08); color: #e67070; }
.p3-status-pill.na      { background: rgba(255,255,255,.04); color: var(--muted); }
.p3-status-pill.com-fator { background: rgba(240,160,48,.15); color: var(--amber); }

/* Detalhe expandido do benefício */
.p3-beneficio-detalhe {
  display: none;
  padding: 14px 16px;
  margin: 4px 0 12px;
  background: rgba(0,0,0,.2);
  border-radius: 8px;
  border-left: 3px solid var(--gold);
  position: static;
  clear: both;
  overflow: hidden;
  max-width: 100%;
  box-sizing: border-box;
}
.p3-beneficio-detalhe.aberto { display: block; }
.p3-beneficio-detalhe * { max-width: 100%; box-sizing: border-box; }

/* ─── Histórico contributivo (calendário por ano) ─── */
.p3-hist-ano {
  display: grid;
  grid-template-columns: 50px 1fr;
  gap: 12px;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px dashed rgba(255,255,255,.04);
}
.p3-hist-ano:last-child { border-bottom: none; }
.p3-hist-ano-label {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--gold);
  font-weight: 700;
  letter-spacing: .05em;
}
.p3-hist-meses {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 2px;
}
.p3-hist-mes {
  aspect-ratio: 1.4;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 8px;
  color: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  letter-spacing: .05em;
  cursor: pointer;
  transition: transform .12s var(--ease);
}
.p3-hist-mes:hover {
  transform: scale(1.15);
  z-index: 2;
  box-shadow: 0 0 0 2px var(--gold);
}
.p3-hist-mes.valida      { background: rgba(34,201,122,.55); }
.p3-hist-mes.invalida    { background: rgba(224,82,82,.5); color: #fff; }
.p3-hist-mes.concomitante { background: rgba(201,168,76,.6); }
.p3-hist-mes.vazia       { background: rgba(255,255,255,.04); color: var(--muted); }

.p3-hist-ano-nota {

<script>
// Diagnóstico em tempo real — se algo estiver errado, aparece na tela
window.addEventListener('load', function() {
  setTimeout(function() {
    var checks = [
      { label: 'PDF.js',                 ok: typeof pdfjsLib !== 'undefined',                 fix: 'Sem internet ou CDN bloqueado. Pode importar JSON em vez de PDF.' },
      { label: 'window._handleFile',     ok: typeof window._handleFile === 'function',       fix: 'Script de upload não inicializou.' },
      { label: 'window._handleDrop',     ok: typeof window._handleDrop === 'function',       fix: 'Handler de drop não inicializou.' },

      { label: 'renderPlanejamento',     ok: typeof window.renderPlanejamento === 'function',fix: 'Render do planejamento não inicializou.' },
      { label: 'extrairCNIS',            ok: typeof extrairCNIS === 'function',              fix: 'Extrator CNIS não disponível.' },
      { label: 'AP_Plan.calcularRMI',    ok: typeof (window.AP_Plan||{}).calcularRMI === 'function', fix: 'Módulo RMI não carregou.' },
      { label: 'AP_Plan.calcularMarcos', ok: typeof (window.AP_Plan||{}).calcularMarcos === 'function', fix: 'Módulo Tramitação não carregou.' },
      { label: 'AP_Plan.calcularComplementacoes', ok: typeof (window.AP_Plan||{}).calcularComplementacoes === 'function', fix: 'Módulo Complementações não carregou.' },
      { label: 'Dropzone no DOM',        ok: !!document.getElementById('dropzone'),          fix: 'Elemento dropzone não existe.' },
      { label: 'Input file no DOM',      ok: !!document.getElementById('input-file'),        fix: 'Elemento de input não existe.' },
      { label: 'Origem do arquivo',      ok: location.protocol !== 'file:',                  fix: 'Arquivo aberto em modo file://. Use uma URL http(s)://, ou esteja ciente que PDF.js pode não funcionar.' },
    ];
    var problemas = checks.filter(function(c) { return !c.ok; });
    var el = document.getElementById('ap-diag');
    var content = document.getElementById('ap-diag-content');
    if (problemas.length === 0) {
      el.style.background = '#0f2420';
      el.style.borderBottom = '2px solid #22c97a';
      content.innerHTML = '<span style="color:#22c97a;">✓ Todos os sistemas OK</span> &nbsp; '
        + '<span style="color:#7a90b8;font-size:11px;">— versão 1.6 · ' + new Date().toLocaleString('pt-BR') + '</span>';
      // Autohide em 4s se tudo certo
      setTimeout(function(){ el.style.display = 'none'; }, 4000);
    } else {
      el.style.borderBottom = '2px solid #e05252';
      var linhas = problemas.map(function(p) {
        return '<div style="padding:4px 0;">'
          + '<span style="color:#e05252;">✗</span> '
          + '<strong style="color:#fff;">' + p.label + '</strong> — '
          + '<span style="color:#d8e0f0;">' + p.fix + '</span>'
          + '</div>';
      }).join('');
      content.innerHTML = '<div style="color:#e05252;margin-bottom:6px;">' + problemas.length + ' problema(s) detectado(s):</div>' + linhas;
    }
    el.style.display = 'block';
  }, 1200);
});
</script>

<script>
'use strict';

// ─── Globais para compatibilidade com módulos originais ───
var dadosExtraidos = {};
var _todosDocumentosDados = [];
var _docsViewer = [];
var _escaneados = [];
var arquivosSel = [];

// ─── Constantes ───
var SALARIO_MINIMO_HISTORICO = {
  2006:350, 2007:380, 2008:415, 2009:465, 2010:510,
  2011:545, 2012:622, 2013:678, 2014:724, 2015:788,
  2016:880, 2017:937, 2018:954, 2019:998, 2020:1045,
  2021:1100, 2022:1212, 2023:1320, 2024:1412, 2025:1518,
};
var INDICADORES_INVALIDOS = [
  'PSC-MEN-SM-EC103',  // contribuição abaixo do salário mínimo (invalida para carência)
  'PREC-MENOR-MIN',    // recolhimento abaixo do valor mínimo (invalida para carência)
  // IREC-LIM-SM NÃO invalida carência — só indica que o SC foi limitado ao SM,
  // mas a competência conta normalmente para aposentadoria por idade urbana/híbrida.
  // (Para ATC, é o indicador de alíquota reduzida que desconsidera — tratado em C do módulo Tramitação)
];

// ─── Utils ───
function log(ctx, msg) {
  console.log('[' + ctx + ']', msg);
}
function toast(msg) {
  var el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function() { el.classList.remove('on'); }, 3500);
}
function salarioMinimoDoAno(ano) {
  return SALARIO_MINIMO_HISTORICO[ano] || 1518;
}
// Stubs para compatibilidade
function adicionarDocViewer(d) { _docsViewer.push(d); }
function avaliarQualidadeTexto(texto, nome) {
  var len = (texto || '').length;
  if (len < 60)  return { nivel: 'escaneado', msg: 'sem texto extraível' };
  if (len < 300) return { nivel: 'baixa', msg: 'texto curto' };
  return { nivel: 'boa', msg: 'OK' };
}
function corrigirOCR(t) { return t; }
function lerPDFFallback(f) { return Promise.resolve(''); }

// ─── Funções essenciais CNIS ───
function _cpf(txt) {
  var m = txt.match(/(\d{3})[\.\s]?(\d{3})[\.\s]?(\d{3})[-\s]?(\d{2})/);
  return m ? m[1]+'.'+m[2]+'.'+m[3]+'-'+m[4] : null;
}

function tipoSegurado(vinculos) {
  if (!vinculos || !vinculos.length) return 'NAO_IDENTIFICADO';
  var temEmp = vinculos.some(function(v){ return v.tipo && v.tipo.indexOf('Empregado') >= 0; });
  var temCI  = vinculos.some(function(v){ return v.tipo && v.tipo.indexOf('Contribuinte') >= 0; });
  if (temEmp && temCI) return 'MISTO';
  if (temEmp)  return 'EMPREGADO';
  if (temCI)   return 'CONTRIBUINTE_INDIVIDUAL';
  return 'NAO_IDENTIFICADO';
}

// ── Conta apenas contribuições juridicamente válidas ──────────────

function contribuicaoValida(comp) {
  if (!comp || !comp.comp) return false;
  // Período de benefício (art. 55, II Lei 8.213/91) — conta para TC e carência
  // independente de valor (o instituto recolheu sobre o salário-benefício)
  if (comp._origemBeneficio || /\bBENEF\b/.test(comp.indicadores || '')) return true;
  // Checa indicadores inválidos
  var inds = comp.indicadores || '';
  for (var ki = 0; ki < INDICADORES_INVALIDOS.length; ki++) {
    if (inds.indexOf(INDICADORES_INVALIDOS[ki]) >= 0) return false;
  }
  // Checa valor vs salário mínimo
  if (comp.valor !== undefined && comp.valor !== null) {
    var ano = parseInt((comp.comp || '').split('/')[1] || '2023');
    var sm  = salarioMinimoDoAno(ano);
    if (comp.valor < sm && comp.valor > 0) return false;
    if (comp.valor <= 0) return false;
  }
  return true;
}

// ── Identifica tipo de segurado a partir dos vínculos ──────────────

function contarCarenciaValida(contribuicoes) {
  if (!contribuicoes) return 0;
  return contribuicoes.filter(contribuicaoValida).length;
}

// ── Última contribuição VÁLIDA ─────────────────────────────────────

function ultimaContribuicaoValida(contribuicoes) {
  if (!contribuicoes || !contribuicoes.length) return null;
  var validas = contribuicoes.filter(contribuicaoValida);
  if (!validas.length) return null;
  // Ordena por data desc
  validas.sort(function(a, b) {
    var pa = a.comp.split('/'), pb = b.comp.split('/');
    var da = new Date(parseInt(pa[1]), parseInt(pa[0])-1, 1);
    var db = new Date(parseInt(pb[1]), parseInt(pb[0])-1, 1);
    return db - da;
  });
  return validas[0].comp;
}

// ── Análise completa para Salário-Maternidade Urbano ──────────────
// Segue estritamente as regras do INSS:
// 1. Empregada: sem carência, basta vínculo ativo ou graça
// 2. CI: pelo menos 1 contribuição válida (jurisprudência majoritária)
// 3. Desempregada: período de graça desde a última contribuição VÁLIDA

// Normalização de texto para detecção de tipo de documento:
// maiúsculas, sem acentos, espaços colapsados.
function _norm(s) {
  return String(s == null ? '' : s)
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .toUpperCase()
    .replace(/\s+/g, ' ')
    .trim();

  // ── Datas extremas + qualidade de segurado ──
  if (d._vinculos.length) {
    function toD(s) {
      if (!s) return new Date(9999, 0, 1);
      var p = s.split('/');
      return new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
    }
    var maisAnt = d._vinculos.reduce(function(a, v) { return toD(v.inicio) < toD(a.inicio) ? v : a; });
    var abertos = d._vinculos.filter(function(v) { return !v.fim; });
    var maisRec;
    if (abertos.length > 0) {
      maisRec = abertos.reduce(function(a, v) { return toD(v.inicio) > toD(a.inicio) ? v : a; });
      d._temVinculoAberto = true;
    } else {
      maisRec = d._vinculos.reduce(function(a, v) { return toD(v.fim) > toD(a.fim) ? v : a; });
      d._temVinculoAberto = false;
    }
    d.dataInicioAtividade = maisAnt.inicio;
    d.dataMaisAntiga      = maisAnt.inicio;
    d._ultimoVinculo      = maisRec.fim || 'EM ABERTO';

    var hoje = new Date();
    var meses = 0;
    if (maisRec.fim && maisRec.fim !== 'EM ABERTO') {
      var ultDt = toD(maisRec.fim);
      meses = (hoje.getFullYear()-ultDt.getFullYear())*12+(hoje.getMonth()-ultDt.getMonth());
    }
    d._mesesDesdeUltimo = meses;

    var ultimaValida = ultimaContribuicaoValida(d._contribuicoesDetalhadas);
    d._ultimaContribuicaoValida = ultimaValida;

    var limGraca = (d._totalContribuicoesValidas >= 120) ? 24 : 12;
    var mesesUltValida = ultimaValida ? (function() {
      var p = ultimaValida.split('/');
      var dtV = new Date(parseInt(p[1]), parseInt(p[0])-1, 1);
      return (hoje.getFullYear()-dtV.getFullYear())*12+(hoje.getMonth()-dtV.getMonth());
    })() : 9999;

    d.situacaoDocumento = d._temVinculoAberto
      ? 'QUALIDADE MANTIDA - vinculo ATIVO (sem data fim)'
      : meses <= 12
        ? 'QUALIDADE MANTIDA - vinculo recente (' + meses + 'm)'
        : mesesUltValida <= limGraca
          ? 'QUALIDADE MANTIDA - periodo de graca (' + mesesUltValida + 'm desde ultima contrib. valida)'
          : 'SEM QUALIDADE - periodo de graca expirado ('
            + meses + 'm desde ultimo vinculo, ' + mesesUltValida + 'm desde ultima contrib. valida)';
  } else if (d._contribuicoesDetalhadas.length > 0) {
    // FALLBACK: se vínculos não foram detectados mas há contribuições,
    // usa as competências para inferir qualidade
    var hoje = new Date();
    var ultimaValida = ultimaContribuicaoValida(d._contribuicoesDetalhadas);
    d._ultimaContribuicaoValida = ultimaValida;
    var mesesUltValida = ultimaValida ? (function() {
      var p = ultimaValida.split('/');
      var dtV = new Date(parseInt(p[1]), parseInt(p[0])-1, 1);
      return (hoje.getFullYear()-dtV.getFullYear())*12+(hoje.getMonth()-dtV.getMonth());
    })() : 9999;
    d._mesesDesdeUltimo = mesesUltValida;
    var limGraca = (d._totalContribuicoesValidas >= 120) ? 24 : 12;
    // Se última contribuição foi < 3 meses, provavelmente vínculo ativo
    d._temVinculoAberto = mesesUltValida <= 3;
    d.situacaoDocumento = mesesUltValida <= 3
      ? 'QUALIDADE MANTIDA - contribuicoes recentes'
      : mesesUltValida <= limGraca
        ? 'QUALIDADE MANTIDA - periodo de graca'
        : 'SEM QUALIDADE - graca expirada (' + mesesUltValida + 'm)';
  }

  // Tipo de atividade
  var tipoSeg = tipoSegurado(d._vinculos);
  d._tipoSegurado = tipoSeg;
  var temEmp = tipoSeg === 'EMPREGADO' || tipoSeg === 'MISTO';
  var temCI  = tipoSeg === 'CONTRIBUINTE_INDIVIDUAL' || tipoSeg === 'MISTO';
  d.qualificacaoProfissional = temEmp && temCI ? 'Empregado + Contribuinte Individual'
    : temEmp ? 'Empregado Urbano' : temCI ? 'Contribuinte Individual' : '';
  d.tipoAtividade = temEmp ? 'URBANO' : 'VERIFICAR';

  d.resumoDocumento = 'CNIS - ' + (d.nomeCliente||'?')
    + ' | Tipo: ' + (tipoSeg||'?')
    + ' | Vinculos: ' + d._vinculos.length
    + ' | Contrib. totais: ' + d._totalContribuicoes
    + ' | Contrib. VALIDAS: ' + d._totalContribuicoesValidas
    + (d._contribuicoesInvalidas ? ' | INVALIDAS (PSC/SM): ' + d._contribuicoesInvalidas : '')
    + (d._ultimaContribuicaoValida ? ' | Ultima valida: ' + d._ultimaContribuicaoValida : '');

  try {
    console.log('[CNIS extrator v4.0]',
      '| Vínculos:', d._vinculos.length,
      '| Comp. totais:', d._totalContribuicoes,
      '| Comp. VÁLIDAS:', d._totalContribuicoesValidas,
      '| Tempo:', Math.floor(d._totalContribuicoesValidas/12) + 'a ' + (d._totalContribuicoesValidas%12) + 'm',
      '| Último:', d._ultimaContribuicaoValida || 'n/d',
      '| Aberto:', d._temVinculoAberto);
  } catch(e) {}

  return d;
}

// ─── PDF reader minimalista (sem dependências do sistema antigo) ───
async function lerPDFSimples(f) {
  if (typeof pdfjsLib === 'undefined') {
    throw new Error('PDF.js não carregou. Verifique conexão com internet ou CDN bloqueado.');
  }
  const buf = await f.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const pags = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const pg = await pdf.getPage(i);
    const tc = await pg.getTextContent({ includeMarkedContent: false });
    let ultimoY = null, linhaAtual = [];
    const linhas = [];
    for (const item of tc.items) {
      if (!item.str) continue;
      const y = item.transform ? Math.round(item.transform[5]) : 0;
      if (ultimoY !== null && Math.abs(y - ultimoY) > 3) {
        if (linhaAtual.length) linhas.push(linhaAtual.join(' '));
        linhaAtual = [];
      }
      linhaAtual.push(item.str.trim());
      ultimoY = y;
    }
    if (linhaAtual.length) linhas.push(linhaAtual.join(' '));
    pags.push(linhas.filter(Boolean).join('\n'));
  }
  return pags.join('\n').replace(/[ \t]{2,}/g, ' ').replace(/\n{3,}/g, '\n\n').trim();
}

<script>

'use strict';
// ═══════════════════════════════════════════════════════════
// A&P PLANEJAMENTO PREVIDENCIÁRIO v1.0
// ═══════════════════════════════════════════════════════════
(function() {

// ─── UTILS ───────────────────────────────────────────────────
function _parseDataBR(str) {
  if (!str) return null;
  var m = String(str).match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (!m) return null;
  return new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
}

function _fmtData(d) {
  if (!d || !(d instanceof Date) || isNaN(d)) return '—';
  return String(d.getDate()).padStart(2,'0') + '/' +
         String(d.getMonth()+1).padStart(2,'0') + '/' +
         d.getFullYear();
}

function _mesesEntre(d1, d2) {
  if (!d1 || !d2) return 0;
  var meses = (d2.getFullYear() - d1.getFullYear()) * 12 + (d2.getMonth() - d1.getMonth());
  if (d2.getDate() < d1.getDate()) meses--;
  return Math.max(0, meses);
}

function _anosEntre(d1, d2) {
  if (!d1 || !d2) return 0;
  var anos = d2.getFullYear() - d1.getFullYear();
  if (d2.getMonth() < d1.getMonth() || (d2.getMonth() === d1.getMonth() && d2.getDate() < d1.getDate())) anos--;
  return Math.max(0, anos);
}

function _fmtTempo(meses) {
  if (!meses || meses < 0) return '0 anos, 0 meses';
  var a = Math.floor(meses / 12);
  var m = meses % 12;
  return a + ' ano' + (a !== 1 ? 's' : '') + ', ' + m + ' mes' + (m !== 1 ? 'es' : '');
}

function _detSexo(dados) {
  // Tenta pelo nome ou pelo qualificativo profissional
  var nome = (dados.nomeCliente || '').toLowerCase();
  var qualif = (dados.qualificacaoProfissional || '').toLowerCase();
  if (/\ba$/.test(qualif)) return 'feminino';   // ex: lavradora, pescadora
  if (/\bo$/.test(qualif)) return 'masculino';  // ex: lavrador, pescador
  // Heurística simples pelo primeiro nome
  var primeiro = nome.split(' ')[0];
  if (/a$/i.test(primeiro) && primeiro.length > 3) return 'feminino';
  return 'masculino'; // default conservador
}

// ─── DEFINIÇÕES DE BENEFÍCIOS ────────────────────────────────
// Cada regra sabe calcular: tem direito, tempo que falta, data de elegibilidade
var REGRAS_APOSENTADORIA = [
  {
    id: 'idade_urbana',
    nome: 'Aposentadoria por Idade Urbana',
    sub: 'Art. 48 Lei 8.213/91 (pós-EC 103/2019)',
    aplicavel: function(d) { return true; }, // todos podem tentar
    calcular: function(ctx) {
      var sexo = ctx.sexo;
      var idadeMinima = sexo === 'feminino' ? 62 : 65;
      var carenciaMinima = 180; // 15 anos

      var idadeAtual = ctx.idadeAtualMeses / 12;
      var carenciaAtual = ctx.carencia;

      var faltaIdade = Math.max(0, idadeMinima - idadeAtual);
      var faltaCarencia = Math.max(0, carenciaMinima - carenciaAtual);

      var temDireito = faltaIdade <= 0 && faltaCarencia <= 0;

      // Quando terá direito?
      var dataDireito = null;
      if (!temDireito && ctx.dataNascimento) {
        var d = new Date(ctx.dataNascimento);
        d.setFullYear(d.getFullYear() + idadeMinima);
        // Se tiver que aguardar mais carência que idade, pega o maior dos dois
        if (faltaCarencia * 30.44 > faltaIdade * 365.25) {
          d = new Date(ctx.hoje);
          d.setMonth(d.getMonth() + Math.ceil(faltaCarencia));
        }
        dataDireito = d;
      }

      return {
        temDireito: temDireito,
        tempoContrib: ctx.tempoContribMeses,
        carencia: carenciaAtual,
        carenciaMinima: carenciaMinima,
        idadeMinima: idadeMinima,
        faltaIdade: Math.ceil(faltaIdade * 12), // em meses
        faltaCarencia: faltaCarencia,
        dataDireito: dataDireito,
        progresso: temDireito ? 100 : Math.round((Math.min(idadeAtual/idadeMinima, 1) * 50) + (Math.min(carenciaAtual/carenciaMinima, 1) * 50)),
      };
    },
  },
  {
    id: 'tempo_contribuicao_idade',
    nome: 'Aposentadoria por Tempo + Idade (transição)',
    sub: 'EC 103/2019 — Regra de pontos (Art. 15)',
    aplicavel: function(d) { return d.temContribAnterior2019; },
    calcular: function(ctx) {
      var sexo = ctx.sexo;
      // Regra dos pontos cresce 1 por ano desde 2020
      var anoAtual = new Date().getFullYear();
      var pontosMinimos = (sexo === 'feminino' ? 88 : 98) + Math.max(0, anoAtual - 2020);
      var tempoMinimo = sexo === 'feminino' ? 360 : 420; // 30/35 anos

      var idadeAtual = ctx.idadeAtualMeses / 12;
      var tempoAtual = ctx.tempoContribMeses / 12;
      var pontosAtuais = Math.floor(idadeAtual + tempoAtual);

      var faltamPontos = Math.max(0, pontosMinimos - pontosAtuais);
      var faltaTempo = Math.max(0, tempoMinimo - ctx.tempoContribMeses);

      var temDireito = faltamPontos <= 0 && faltaTempo <= 0;

      return {
        temDireito: temDireito,
        tempoContrib: ctx.tempoContribMeses,
        tempoMinimo: tempoMinimo,
        pontosAtuais: pontosAtuais,
        pontosMinimos: pontosMinimos,
        faltamPontos: faltamPontos,
        faltaTempo: faltaTempo,
        progresso: temDireito ? 100 : Math.round(Math.min(pontosAtuais/pontosMinimos, 1) * 100),
      };
    },
  },
  {
    id: 'idade_rural',
    nome: 'Aposentadoria por Idade Rural',
    sub: 'Art. 48 §1º Lei 8.213/91',
    aplicavel: function(d) { return d.tipoAtividade === 'RURAL' || d._rural; },
    calcular: function(ctx) {
      var sexo = ctx.sexo;
      var idadeMinima = sexo === 'feminino' ? 55 : 60;
      var carenciaMinima = 180; // 15 anos de atividade rural comprovada

      var idadeAtual = ctx.idadeAtualMeses / 12;
      var carenciaAtual = ctx.carencia;

      var faltaIdade = Math.max(0, idadeMinima - idadeAtual);
      var faltaCarencia = Math.max(0, carenciaMinima - carenciaAtual);

      var temDireito = faltaIdade <= 0 && faltaCarencia <= 0;

      return {
        temDireito: temDireito,
        tempoContrib: ctx.tempoContribMeses,
        carencia: carenciaAtual,
        carenciaMinima: carenciaMinima,
        idadeMinima: idadeMinima,
        faltaIdade: Math.ceil(faltaIdade * 12),
        faltaCarencia: faltaCarencia,
        progresso: temDireito ? 100 : Math.round((Math.min(idadeAtual/idadeMinima, 1) * 50) + (Math.min(carenciaAtual/carenciaMinima, 1) * 50)),
      };
    },
  },
  {
    id: 'pedagio_50',
    nome: 'Pedágio 50%',
    sub: 'EC 103/2019 — Art. 17',
    aplicavel: function(d) {
      if (!d.temContribAnterior2019) return false;
      // Precisava estar a < 2 anos da regra antiga em 13/11/2019
      var sexo = _detSexo(d);
      var tempoMinAntigo = sexo === 'feminino' ? 360 : 420;
      return d.tempoContrib2019 && d.tempoContrib2019 >= (tempoMinAntigo - 24);
    },
    calcular: function(ctx) {
      var sexo = ctx.sexo;
      var tempoMinAntigo = sexo === 'feminino' ? 360 : 420;
      var faltavaEm2019 = Math.max(0, tempoMinAntigo - (ctx.tempoContrib2019 || 0));
      var pedagio = Math.ceil(faltavaEm2019 * 1.5); // tempo que faltava + 50%
      var tempoMinimo = (ctx.tempoContrib2019 || 0) + pedagio;

      var temDireito = ctx.tempoContribMeses >= tempoMinimo;
      var faltaTempo = Math.max(0, tempoMinimo - ctx.tempoContribMeses);

      return {
        temDireito: temDireito,
        tempoMinimo: tempoMinimo,
        tempoContrib: ctx.tempoContribMeses,
        pedagio: pedagio,
        faltaTempo: faltaTempo,
        progresso: temDireito ? 100 : Math.round(Math.min(ctx.tempoContribMeses/tempoMinimo, 1) * 100),
      };
    },
  },
];

// ─── CONTEXTO DO SEGURADO ───────────────────────────────────
function _montarContextoSegurado(dadosExtraidos, todosDocDados) {
  var cnis = (todosDocDados || []).find(function(d) {
    return d && (d._tipoDetectado === 'cnis' || /cnis|extrato/i.test(d.tipoDocumento || ''));
  });
  if (!cnis) cnis = dadosExtraidos;

  var hoje = new Date();
  var dataNasc = _parseDataBR(dadosExtraidos.dataNascimento || cnis.dataNascimento);
  var idadeAtualMeses = dataNasc ? _mesesEntre(dataNasc, hoje) : 0;

  var tempoContribMeses = cnis._totalContribuicoesValidas || cnis._totalContribuicoes || 0;
  var carencia = cnis._totalContribuicoesValidas || 0;

  // Verifica se tem contribuição anterior a 13/11/2019 (para regras de transição)
  var reformaData = new Date(2019, 10, 13); // 13/11/2019
  var temContribAnterior2019 = false;
  var tempoContrib2019 = 0;

  if (cnis._contribuicoesDetalhadas) {
    cnis._contribuicoesDetalhadas.forEach(function(c) {
      var d = _parseDataBR(c.competencia) || (c.ano ? new Date(c.ano, (c.mes||1)-1, 1) : null);
      if (d && d < reformaData) {
        temContribAnterior2019 = true;
        tempoContrib2019++;
      }
    });
  }

  return {
    nomeCliente: dadosExtraidos.nomeCliente || cnis.nomeCliente || '—',
    cpf: dadosExtraidos.cpfCnpj || cnis.cpfCnpj || '—',
    dataNascimento: dataNasc,
    sexo: _detSexo(dadosExtraidos),
    idadeAtualMeses: idadeAtualMeses,
    tempoContribMeses: tempoContribMeses,
    carencia: carencia,
    tipoAtividade: cnis.tipoAtividade || dadosExtraidos.tipoAtividade,
    temContribAnterior2019: temContribAnterior2019,
    tempoContrib2019: tempoContrib2019,
    hoje: hoje,
    _temCnis: !!cnis._vinculos,
  };
}

// ─── OPORTUNIDADES INTELIGENTES ─────────────────────────────
function _detectarOportunidades(ctx, resultados) {
  var ops = [];

  // Oportunidade 1: faltam poucos meses para aposentadoria por idade
  var idadeUrb = resultados.find(function(r) { return r.id === 'idade_urbana'; });
  if (idadeUrb && !idadeUrb.resultado.temDireito) {
    var faltaI = idadeUrb.resultado.faltaIdade || 0;
    var faltaC = idadeUrb.resultado.faltaCarencia || 0;
    if (faltaI <= 12 && faltaC === 0) {
      ops.push({
        icon: '🎯',
        titulo: 'Aposentadoria por Idade Urbana em menos de 1 ano',
        desc: 'Faltam apenas ' + faltaI + ' meses de idade. Carência já cumprida. Data estimada: ' + _fmtData(idadeUrb.resultado.dataDireito),
      });
    } else if (faltaC <= 12 && faltaI === 0) {
      ops.push({
        icon: '💼',
        titulo: 'Carência quase completa',
        desc: 'Faltam apenas ' + faltaC + ' contribuições para atingir a carência mínima de 180 meses. Considerar contribuir como facultativo.',
      });
    }
  }

  // Oportunidade 2: próximo dos pontos
  var pts = resultados.find(function(r) { return r.id === 'tempo_contribuicao_idade'; });
  if (pts && pts.resultado.faltamPontos > 0 && pts.resultado.faltamPontos <= 3) {
    ops.push({
      icon: '📈',
      titulo: 'Próximo da regra dos pontos',
      desc: 'Faltam apenas ' + pts.resultado.faltamPontos + ' pontos. Verificar se vale a pena aguardar a regra ou optar por outra modalidade.',
    });
  }

  // Oportunidade 3: tem pedágio disponível
  var ped = resultados.find(function(r) { return r.id === 'pedagio_50'; });
  if (ped && ped.aplicavel && !ped.resultado.temDireito) {
    ops.push({
      icon: '⏳',
      titulo: 'Regra do Pedágio 50% aplicável',
      desc: 'Segurado estava a menos de 2 anos da regra antiga em 13/11/2019. Pedágio estimado: ' + Math.ceil(ped.resultado.pedagio/12) + ' anos. Avaliar se é mais vantajoso que outras regras.',
    });
  }

  // Oportunidade 4: atividade rural sem carência mínima — orientar
  if (ctx.tipoAtividade === 'RURAL' && ctx.carencia < 180) {
    var faltaRural = 180 - ctx.carencia;
    ops.push({
      icon: '🌾',
      titulo: 'Atividade rural — faltam ' + faltaRural + ' meses de comprovação',
      desc: 'Para aposentadoria rural, é necessário comprovar 180 meses (15 anos) de atividade rural. Buscar documentos complementares: CAR, CAEPF, declaração sindical, bloco de produtor.',
    });
  }

  // Oportunidade 5: direito adquirido já na regra antiga (pré-2019)
  if (ctx.tempoContrib2019 && ctx.tempoContrib2019 >= (ctx.sexo === 'feminino' ? 360 : 420)) {
    ops.push({
      icon: '⚖️',
      titulo: 'Direito adquirido antes da Reforma',
      desc: 'Segurado já tinha ' + _fmtTempo(ctx.tempoContrib2019) + ' em 13/11/2019, suficiente para a regra antiga de aposentadoria por tempo de contribuição. Direito adquirido garantido pelo Art. 3º EC 103/2019.',
    });
  }

  return ops;
}

// ─── CAMINHO MAIS CURTO ─────────────────────────────────────
function _caminhoMaisCurto(resultados, ctx) {
  // Se nenhum tem direito, aponta o que está mais próximo
  var comDireito = resultados.filter(function(r) { return r.resultado.temDireito; });
  if (comDireito.length > 0) {
    return {
      tem: true,
      msg: 'Tem direito a ' + comDireito.length + ' benefício(s) atualmente. Ver tabela abaixo.',
    };
  }

  // Encontra o mais próximo
  var candidatos = resultados
    .filter(function(r) { return r.aplicavel && r.resultado.dataDireito; })
    .map(function(r) { return { nome: r.nome, data: r.resultado.dataDireito }; })
    .sort(function(a,b) { return a.data - b.data; });

  if (candidatos.length > 0) {
    var prox = candidatos[0];
    return {
      tem: false,
      msg: 'Ainda não tem direito a aposentadoria. Primeiro direito estimado: ' + prox.nome + ' em ' + _fmtData(prox.data) + '.',
    };
  }

  return {
    tem: false,
    msg: 'Ainda não tem direito a aposentadoria programada. Sem dados suficientes para projetar data futura.',
  };
}

// ─── RENDERIZAÇÃO ───────────────────────────────────────────
window.renderPlanejamento = function() {
  var root = document.getElementById('tab-planejamento');
  if (!root) return;

  // Verifica se tem CNIS
  var dados = typeof dadosExtraidos !== 'undefined' ? dadosExtraidos : {};
  var todos = typeof _todosDocumentosDados !== 'undefined' ? _todosDocumentosDados : [];
  var temCnis = (todos || []).some(function(d) {
    return d && (d._tipoDetectado === 'cnis' || /cnis|extrato/i.test(d.tipoDocumento || ''));
  });
  if (!temCnis && dados._vinculos) temCnis = true;

  if (!temCnis) {
    // No novo site, a dropzone já está visível acima — não renderizamos empty state
    root.innerHTML = '';
    return;
  }

  var ctx = _montarContextoSegurado(dados, todos);

  // Calcula cada benefício
  var resultados = REGRAS_APOSENTADORIA.map(function(regra) {
    var aplic = regra.aplicavel(Object.assign({}, ctx, dados));
    return {
      id: regra.id,
      nome: regra.nome,
      sub: regra.sub,
      aplicavel: aplic,
      resultado: aplic ? regra.calcular(ctx) : { temDireito: false, naoAplicavel: true },
    };
  });

  var oportunidades = _detectarOportunidades(ctx, resultados);
  var caminho = _caminhoMaisCurto(resultados, ctx);

  // HTML
  var idadeCompleta = ctx.idadeAtualMeses > 0
    ? Math.floor(ctx.idadeAtualMeses/12) + ' anos' + (ctx.idadeAtualMeses % 12 ? ', ' + (ctx.idadeAtualMeses % 12) + ' meses' : '')
    : '—';

  var html = ''
    // Cabeçalho
    + '<div class="plan-header">'
    + '  <div style="font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;">📊 Planejamento Previdenciário</div>'
    + '  <div class="plan-seg-grid">'
    + '    <div class="plan-seg-item"><span class="plan-seg-label">Segurado</span><span class="plan-seg-valor dourado">' + ctx.nomeCliente + '</span></div>'
    + '    <div class="plan-seg-item"><span class="plan-seg-label">CPF</span><span class="plan-seg-valor">' + ctx.cpf + '</span></div>'
    + '    <div class="plan-seg-item"><span class="plan-seg-label">Nascimento</span><span class="plan-seg-valor">' + _fmtData(ctx.dataNascimento) + '</span></div>'
    + '    <div class="plan-seg-item"><span class="plan-seg-label">Idade</span><span class="plan-seg-valor">' + idadeCompleta + '</span></div>'
    + '    <div class="plan-seg-item"><span class="plan-seg-label">Tempo de Contribuição</span><span class="plan-seg-valor">' + _fmtTempo(ctx.tempoContribMeses) + '</span></div>'
    + '    <div class="plan-seg-item"><span class="plan-seg-label">Carência</span><span class="plan-seg-valor">' + ctx.carencia + ' contribuições</span></div>'
    + '  </div>'
    + '</div>'

    // Resumo
    + '<div class="plan-resumo' + (caminho.tem ? ' ok' : '') + '">'
    + (caminho.tem ? '✅ ' : 'ℹ️ ') + caminho.msg
    + '</div>'

    // Tabela de benefícios
    + '<div class="plan-tabela">'
    + '  <div class="plan-th">📋 Aposentadorias Programáveis</div>'
    + '  <table>'
    + '    <thead>'
    + '      <tr>'
    + '        <th style="width:30%;">Benefício</th>'
    + '        <th style="width:20%;">Requisitos Mínimos</th>'
    + '        <th style="width:20%;">Situação Atual</th>'
    + '        <th style="width:15%;">Falta</th>'
    + '        <th style="width:15%;">Status</th>'
    + '      </tr>'
    + '    </thead>'
    + '    <tbody>';

  resultados.forEach(function(r) {
    var res = r.resultado;
    // Requisitos
    var reqTxt = '';
    if (res.idadeMinima)    reqTxt += '<div>Idade: ' + res.idadeMinima + ' anos</div>';
    if (res.tempoMinimo)    reqTxt += '<div>Tempo: ' + _fmtTempo(res.tempoMinimo) + '</div>';
    if (res.carenciaMinima) reqTxt += '<div>Carência: ' + res.carenciaMinima + ' meses</div>';
    if (res.pontosMinimos)  reqTxt += '<div>Pontos: ' + res.pontosMinimos + '</div>';
    if (!reqTxt) reqTxt = '<span style="color:var(--muted);">—</span>';

    // Situação atual
    var sitTxt = '';
    if (res.idadeMinima)    sitTxt += '<div>Idade: ' + Math.floor(ctx.idadeAtualMeses/12) + ' anos</div>';
    if (res.tempoMinimo || res.tempoContrib) sitTxt += '<div>Tempo: ' + _fmtTempo(ctx.tempoContribMeses) + '</div>';
    if (res.carenciaMinima) sitTxt += '<div>Carência: ' + ctx.carencia + '</div>';
    if (res.pontosAtuais !== undefined) sitTxt += '<div>Pontos: ' + res.pontosAtuais + '</div>';
    if (!sitTxt) sitTxt = '<span style="color:var(--muted);">—</span>';

    // Falta
    var faltaTxt = '';
    if (res.faltaIdade > 0)    faltaTxt += '<div>' + Math.ceil(res.faltaIdade/12) + ' anos de idade</div>';
    if (res.faltaTempo > 0)    faltaTxt += '<div>' + _fmtTempo(res.faltaTempo) + '</div>';
    if (res.faltaCarencia > 0) faltaTxt += '<div>' + res.faltaCarencia + ' contribuições</div>';
    if (res.faltamPontos > 0)  faltaTxt += '<div>' + res.faltamPontos + ' pontos</div>';
    if (!faltaTxt && res.temDireito) faltaTxt = '<span style="color:var(--green);">— nada</span>';
    if (!faltaTxt) faltaTxt = '<span style="color:var(--muted);">—</span>';

    // Badge + progresso
    var badge, prog = res.progresso || 0;
    var progClasse = prog >= 90 ? 'alto' : prog >= 50 ? 'medio' : 'baixo';
    if (!r.aplicavel) {
      badge = '<span class="plan-badge sem-direito">N/A</span>';
    } else if (res.temDireito) {
      badge = '<span class="plan-badge direito">✓ TEM DIREITO</span>';
    } else if (prog >= 80) {
      badge = '<span class="plan-badge quase">Próximo</span>';
    } else if (res.dataDireito) {
      badge = '<span class="plan-badge futuro">Em ' + _fmtData(res.dataDireito) + '</span>';
    } else {
      badge = '<span class="plan-badge sem-direito">Longe</span>';
    }

    html += ''
      + '<tr>'
      + '  <td>'
      + '    <div class="plan-b-nome">' + r.nome + '</div>'
      + '    <div class="plan-b-sub">' + r.sub + '</div>'
      + '  </td>'
      + '  <td style="font-size:11.5px;line-height:1.5;">' + reqTxt + '</td>'
      + '  <td style="font-size:11.5px;line-height:1.5;">' + sitTxt + '</td>'
      + '  <td class="plan-falta" style="line-height:1.5;">' + faltaTxt + '</td>'
      + '  <td>'
      +      badge
      + (r.aplicavel && !res.temDireito
          ? '<div class="plan-progresso"><div class="plan-progresso-fill ' + progClasse + '" style="width:' + prog + '%;"></div></div>'
          : '')
      + '  </td>'
      + '</tr>';
  });

  html += ''
    + '    </tbody>'
    + '  </table>'
    + '</div>';

  // Oportunidades
  if (oportunidades.length > 0) {
    html += ''
      + '<div class="plan-oport">'
      + '  <div class="plan-th">💡 Oportunidades Inteligentes ('+ oportunidades.length + ')</div>';
    oportunidades.forEach(function(op) {
      html += ''
        + '  <div class="plan-oport-item">'
        + '    <div class="plan-oport-icon">' + op.icon + '</div>'
        + '    <div style="flex:1;">'
        + '      <div class="plan-oport-titulo">' + op.titulo + '</div>'
        + '      <div class="plan-oport-desc">' + op.desc + '</div>'
        + '    </div>'
        + '  </div>';
    });
    html += '</div>';
  }

  // Rodapé com nota metodológica
  html += ''
    + '<div style="margin-top:16px;padding:12px 16px;background:rgba(61,127,255,.06);border-left:3px solid var(--blue);border-radius:6px;font-size:11px;color:var(--muted2);line-height:1.6;">'
    + '  <strong style="color:var(--blue);">Nota:</strong> cálculos baseados apenas em dados do CNIS. Não inclui tempo especial (insalubridade/periculosidade), tempo rural não averbado, militar, ou público sem averbação. RMA e complementações serão calculadas em versões futuras. Sempre confirmar com simulação oficial no Meu INSS.'
    + '</div>';

  root.innerHTML = html;
};

  return;
}

document.addEventListener('DOMContentLoaded', function() {

});

console.log('[A&P Planejamento] ✅ Módulo carregado');

})();

</script>
<script>

(function() {

// ──────────────────────────────────────────────────────────

function _fmtData(d) {
  if (!d || !(d instanceof Date) || isNaN(d)) return '—';
  return String(d.getDate()).padStart(2,'0') + '/' +
         String(d.getMonth()+1).padStart(2,'0') + '/' +
         d.getFullYear();
}
function _fmtTempo(meses) {
  if (!meses || meses < 0) return '0 anos, 0 meses';
  var a = Math.floor(meses / 12);
  var m = meses % 12;
  return a + ' ano' + (a !== 1 ? 's' : '') + ', ' + m + ' mes' + (m !== 1 ? 'es' : '');
}
function _parseComp(s) {
  // "MM/AAAA" → Date(AAAA, MM-1, 1)
  if (!s) return null;
  var m = String(s).match(/(\d{1,2})\/(\d{4})/);
  if (!m) return null;
  return new Date(parseInt(m[2]), parseInt(m[1]) - 1, 1);
}

// ──────────────────────────────────────────────────────────

var REGRAS_EXTRAS = [

        tempoMinimo: tempoMinimo,
        tempoContrib: ctx.tempoContribMeses,

        obs: 'Requer perícia do INSS para graduar deficiência (grave/moderada/leve). Tempo varia por grau.',

      var faltaCarencia = Math.max(0, carenciaMinima - ctx.carencia);
      var temDireito = faltaIdade <= 0 && faltaCarencia <= 0;

      return {

        idadeMinima: idadeMinima,
        carenciaMinima: carenciaMinima,
        tempoContrib: ctx.tempoContribMeses,

        faltaCarencia: faltaCarencia,
        progresso: temDireito ? 100 : Math.round((Math.min(idadeAtual/idadeMinima,1)*50) + (Math.min(ctx.carencia/carenciaMinima,1)*50)),
        obs: 'Requer comprovação de deficiência em qualquer grau por pelo menos 15 anos.',

  {
    id: 'transicao_idade_progressiva',

    calcular: function(ctx) {
      var sexo = ctx.sexo;

      // Idade inicia em 56M/61H (2019) e sobe 0,5 por ano até 62M/65H
      var anosDesde2019 = new Date().getFullYear() - 2019;
      var idadeInicio = sexo === 'feminino' ? 56 : 61;
      var idadeMaxima = sexo === 'feminino' ? 62 : 65;
      var idadeAtualRegra = Math.min(idadeMaxima, idadeInicio + (anosDesde2019 * 0.5));

      var idadeAtual = ctx.idadeAtualMeses / 12;

        obs: 'Idade mínima cresce 0,5 ano/ano até atingir 62M/65H em 2031.',

// ──────────────────────────────────────────────────────────
// 2. QUALIDADE DE SEGURADO
// ──────────────────────────────────────────────────────────
function _calcularQualidadeSegurado(ctx) {
  var cnis = ctx.cnisOriginal;
  if (!cnis || !cnis._vinculos) {
    return { status: 'indefinido', desc: 'Sem dados suficientes para determinar qualidade de segurado.' };
  }

  // Data de referência: DER em análise (não "hoje real")
  // Isso é crítico para benefícios não-programáveis — a qualidade importante
  // é a da DATA DO EVENTO (afastamento, óbito, parto), não a de hoje.
  var ref = (ctx.der instanceof Date && !isNaN(ctx.der)) ? ctx.der : new Date();

  // Recalcula "última contribuição VÁLIDA ATÉ A DER" em vez de usar o
  // _ultimaContribuicaoValida global (que contempla contribuições posteriores à DER).
  var ultimaData = null;
  var ultimaComp = null;
  if (cnis._contribuicoesDetalhadas && cnis._contribuicoesDetalhadas.length) {
    cnis._contribuicoesDetalhadas.forEach(function(c) {
      if (!c || !c.comp) return;
      var parts = c.comp.split('/');
      if (parts.length !== 2) return;
      var dc = new Date(parseInt(parts[1]), parseInt(parts[0]) - 1, 15);
      if (dc > ref) return; // só conta até a DER
      // Valida indicadores: PSC-MEN-SM e PREC-MENOR-MIN não contam
      var inds = c.indicadores || '';
      var indStr = typeof inds === 'string' ? inds : (Array.isArray(inds) ? inds.join(' ') : '');
      if (/PSC-MEN-SM|PREC-MENOR-MIN/.test(indStr)) return;
      if (!ultimaData || dc > ultimaData) { ultimaData = dc; ultimaComp = c.comp; }
    });
  }
  // Fallback para o valor armazenado (caso não haja _contribuicoesDetalhadas)
  if (!ultimaData) {
    var fb = cnis._ultimaContribuicaoValida || cnis._ultimoVinculo;
    ultimaData = _parseComp(fb);
  }

  // Verifica se tem vínculo ATIVO NA DATA DE REFERÊNCIA (não só "hoje")
  var temVinculoAberto = (cnis._vinculos || []).some(function(v) {
    // Parsa data início/fim
    function pd(s) {
      if (!s) return null;
      var p = (s || '').split('/');
      if (p.length !== 3) return null;
      return new Date(parseInt(p[2]), parseInt(p[1]) - 1, parseInt(p[0]));
    }
    var ini = pd(v.inicio);
    var fimAberto = !v.fim || /aberto|atual|vigente/i.test(v.fim);
    if (!ini) return false;
    if (ini > ref) return false; // vínculo ainda não começou na DER
    if (fimAberto) return true;  // aberto, e já havia iniciado → ATIVO na DER
    var fim = pd(v.fim);
    if (fim && fim >= ref) return true; // fim posterior à DER → ativo na DER
    return false;
  });

  if (temVinculoAberto) {
    return {
      status: 'ativo',
      desc: 'Possui vínculo empregatício ATIVO na DER (' + _fmtData(ref) + '). Qualidade de segurado preservada.',
      meta: 'VÍNCULO VIGENTE',
    };
  }

  if (!ultimaData) {
    return { status: 'indefinido', desc: 'Não foi possível identificar a última contribuição antes da DER (' + _fmtData(ref) + ').' };
  }

  // Meses entre última contribuição e DATA DE REFERÊNCIA (não "hoje")
  var mesesDesde = (ref.getFullYear() - ultimaData.getFullYear()) * 12
                 + (ref.getMonth() - ultimaData.getMonth());
  if (mesesDesde < 0) mesesDesde = 0;

  // Conta total de contribuições VÁLIDAS até a DER (para definir base de graça 12 vs 24)
  var totalContribAteDer = 0;
  if (cnis._contribuicoesDetalhadas) {
    cnis._contribuicoesDetalhadas.forEach(function(c) {
      if (!c || !c.comp) return;
      var parts = c.comp.split('/');
      if (parts.length !== 2) return;
      var dc = new Date(parseInt(parts[1]), parseInt(parts[0]) - 1, 15);
      if (dc > ref) return;
      var indStr = typeof c.indicadores === 'string' ? c.indicadores : (Array.isArray(c.indicadores) ? c.indicadores.join(' ') : '');
      if (/PSC-MEN-SM|PREC-MENOR-MIN/.test(indStr)) return;
      totalContribAteDer++;
    });
  }

  // Período de graça (art. 15 da Lei 8.213/91):
  //   I - sem limite: aposentado
  //   II - 12 meses: após cessação do benefício por incapacidade ou deixar de exercer atividade
  //   II+§1º - 24 meses: se tiver pago mais de 120 contribuições sem perda de qualidade
  //   §2º - +12 meses se comprovar desemprego involuntário (SINE ou MTE)
  var gracaBase = 12;
  if (totalContribAteDer >= 120) gracaBase = 24;
  var gracaMaxComDesemprego = gracaBase + 12;

  // Se advogado marcou "desemprego comprovado", a graça efetiva é a estendida
  var usarExtensao = !!window._apEstadoDesemprego;
  var gracaEfetiva = usarExtensao ? gracaMaxComDesemprego : gracaBase;

  if (mesesDesde <= gracaBase) {
    var restam = gracaBase - mesesDesde;
    return {
      status: 'graca',
      desc: 'Em período de graça na DER (' + _fmtData(ref) + '). Última contribuição válida: ' + _fmtData(ultimaData) + '. Restam ' + restam + ' meses na graça normal' + (gracaBase === 24 ? ' (24 meses por ter ≥ 120 contribuições)' : '') + '.',
      meta: 'RESTAM ' + restam + ' MESES',
    };
  }

  if (mesesDesde <= gracaMaxComDesemprego) {
    var restam2 = gracaMaxComDesemprego - mesesDesde;
    if (usarExtensao) {
      // Advogado marcou desemprego: conta como graça ATIVA
      return {
        status: 'graca',
        desc: 'Graça ESTENDIDA por desemprego comprovado na DER (' + _fmtData(ref) + '). Última contribuição: ' + _fmtData(ultimaData) + '. Restam ' + restam2 + ' meses (art. 15, §2º Lei 8.213/91).',
        meta: 'GRAÇA +12m DESEMPREGO — RESTAM ' + restam2 + ' MESES',
      };
    }
    // Sem marcação: indica só que a extensão é possível
    return {
      status: 'graca',
      desc: 'Graça prorrogada possível na DER (' + _fmtData(ref) + ') — requer comprovação de desemprego no Ministério do Trabalho/SINE. Última contribuição: ' + _fmtData(ultimaData) + '. Máximo ' + restam2 + ' meses se comprovado. Marque "Desemprego comprovado" no card acima para aplicar.',
      meta: 'GRAÇA ESTENDIDA — COMPROVAR DESEMPREGO',
    };
  }

  return {
    status: 'perdeu',
    desc: 'Qualidade de segurado PERDIDA na DER (' + _fmtData(ref) + ').' + (usarExtensao ? ' Mesmo com desemprego comprovado (+12 meses), o prazo de ' + gracaMaxComDesemprego + 'm foi ultrapassado.' : '') + ' Última contribuição: ' + _fmtData(ultimaData) + ' (' + mesesDesde + ' meses antes da DER). Para recuperar: contribuir 6 meses (metade da carência) para benefícios por incapacidade.',
    meta: mesesDesde + ' MESES SEM CONTRIBUIR',
  };
}

// ──────────────────────────────────────────────────────────
// 3. ANÁLISE DE CONTRIBUIÇÕES
// ──────────────────────────────────────────────────────────
function _analisarContribuicoes(ctx) {
  var cnis = ctx.cnisOriginal;
  if (!cnis || !cnis._contribuicoesDetalhadas || !cnis._contribuicoesDetalhadas.length) {
    return null;
  }

  var contribs = cnis._contribuicoesDetalhadas;

  // Ordena por data
  contribs = contribs.slice().sort(function(a, b) {
    var da = _parseComp(a.comp), db = _parseComp(b.comp);
    return (da && db) ? da - db : 0;
  });

  var primeira = _parseComp(contribs[0].comp);
  var ultima   = _parseComp(contribs[contribs.length - 1].comp);
  if (!primeira || !ultima) return null;

  // Monta mapa de contribuições por mês
  var mapa = {};
  contribs.forEach(function(c) {
    var d = _parseComp(c.comp);
    if (!d) return;
    var key = d.getFullYear() * 12 + d.getMonth();
    if (!mapa[key]) mapa[key] = { data: d, contribs: [] };
    mapa[key].contribs.push(c);
  });

  // Gera timeline do primeiro ao último mês
  var inicio = primeira.getFullYear() * 12 + primeira.getMonth();
  var fim    = ultima.getFullYear() * 12 + ultima.getMonth();
  var timeline = [];
  var gaps = [];
  var gapAtual = null;

  for (var i = inicio; i <= fim; i++) {
    var d = new Date(Math.floor(i / 12), i % 12, 1);
    var mes = mapa[i];
    var status;
    if (!mes) {
      status = 'vazia';
      if (!gapAtual) gapAtual = { inicio: d, fim: d, meses: 1 };
      else { gapAtual.fim = d; gapAtual.meses++; }
    } else {
      if (gapAtual) {
        if (gapAtual.meses >= 3) gaps.push(gapAtual);
        gapAtual = null;
      }
      // Tem contribuição — vale?
      var todasInvalidas = mes.contribs.every(function(c) {
        return (c.indicadores || []).some(function(i) { return /PSC-MEN-SM/.test(i); });
      });
      if (todasInvalidas) status = 'invalida';
      else if (mes.contribs.length > 1) status = 'concomitante';
      else status = 'valida';
    }
    timeline.push({
      mes: d,
      status: status,
      contribs: mes ? mes.contribs : [],
    });
  }
  if (gapAtual && gapAtual.meses >= 3) gaps.push(gapAtual);

  return {
    timeline: timeline,
    gaps: gaps,
    primeiraContrib: primeira,
    ultimaContrib: ultima,
    totalMeses: fim - inicio + 1,
    mesesComContrib: Object.keys(mapa).length,
    mesesSemContrib: (fim - inicio + 1) - Object.keys(mapa).length,
  };
}

// ──────────────────────────────────────────────────────────
// 4. PENDÊNCIAS
// ──────────────────────────────────────────────────────────
function _detectarPendencias(ctx, analise) {
  var pends = [];
  var cnis = ctx.cnisOriginal;
  if (!cnis) return pends;

  // 1. Contribuições inválidas (PSC-MEN-SM)
  if (cnis._contribuicoesInvalidas > 0) {
    pends.push({
      nivel: 'grave',
      icon: '⚠️',
      titulo: cnis._contribuicoesInvalidas + ' contribuições ABAIXO do salário mínimo',
      desc: 'Competências marcadas com PSC-MEN-SM-EC103 não contam para carência. EC 103/2019 §14 do Art. 29.',
      acao: 'AÇÃO: complementar contribuições afetadas ou deduzir da carência.',
    });
  }

  // 2. Gaps grandes (>12 meses)
  if (analise && analise.gaps) {
    analise.gaps.filter(function(g) { return g.meses >= 12; }).forEach(function(g) {
      pends.push({
        nivel: 'atencao',
        icon: '📉',
        titulo: 'Período sem contribuição: ' + g.meses + ' meses',
        desc: 'De ' + _fmtData(g.inicio) + ' a ' + _fmtData(g.fim) + ' — sem registros. Verificar se houve atividade rural, informal ou se há documentos comprobatórios não incluídos.',
        acao: 'AÇÃO: checar se há documentos rurais (CAEPF, RGP, DAP) para esse período.',
      });
    });
  }

  // 3. Vínculos sem fim (ainda ativos?)
  var vinculosAtivos = (cnis._vinculos || []).filter(function(v) {
    return !v.fim || /aberto|atual|vigente/i.test(v.fim);
  });
  if (vinculosAtivos.length > 0) {
    vinculosAtivos.forEach(function(v) {
      pends.push({
        nivel: 'info',
        icon: '🔵',
        titulo: 'Vínculo em aberto: ' + (v.empresa || 'empresa não identificada').substring(0, 50),
        desc: 'Iniciado em ' + (v.inicio || '?') + '. Ainda consta como ativo no CNIS — confirmar se cliente continua trabalhando.',
        acao: 'AÇÃO: confirmar com o cliente status do vínculo atual.',
      });
    });
  }

  // 4. MEI com alíquota incompleta
  var temIREC = false;
  (cnis._contribuicoesDetalhadas || []).forEach(function(c) {
    if ((c.indicadores || []).some(function(i) { return /IREC-MEI/.test(i); })) temIREC = true;
  });
  if (temIREC) {
    pends.push({
      nivel: 'info',
      icon: '💼',
      titulo: 'Contribuições MEI com alíquota reduzida (5%)',
      desc: 'MEI contribui apenas 5% do SM — só dá direito a aposentadoria por idade. Para outras aposentadorias, é necessário complementar para 20%.',
      acao: 'AÇÃO: avaliar complementação (15% adicional) para acessar todas as regras.',
    });
  }

  // 5. Última contribuição muito antiga
  if (cnis._mesesDesdeUltimo && cnis._mesesDesdeUltimo > 24) {
    pends.push({
      nivel: 'atencao',
      icon: '⏰',
      titulo: 'Sem contribuir há ' + cnis._mesesDesdeUltimo + ' meses',
      desc: 'Qualidade de segurado muito provavelmente perdida. Para benefícios por incapacidade, requer 6 meses de contribuição após filiação novamente.',
      acao: 'AÇÃO: voltar a contribuir ou regularizar situação antes de qualquer pedido.',
    });
  }

  // 6. Nenhuma pendência
  if (pends.length === 0) {
    pends.push({
      nivel: 'resolvido',
      icon: '✅',
      titulo: 'Sem pendências críticas identificadas',
      desc: 'CNIS aparenta estar regular. Contribuições consistentes, sem períodos marcados como inválidos.',
      acao: '',
    });
  }

  return pends;
}

function _analisarNaoProgramados(ctx, qualidade) {

  });

  benefs.push({
    nome: '♿ Aposentadoria por Incapacidade Permanente',
    sub: 'Art. 42 Lei 8.213/91',
    regra: 'Carência: 12 meses (dispensada para acidente) + qualidade',
    temDireito: temQualidade && carencia >= 12,
    status: temQualidade && carencia >= 12 ? 'sim' : (!temQualidade ? 'nao' : 'talvez'),
    motivo: !temQualidade ? 'Sem qualidade de segurado' : (carencia < 12 ? 'Carência insuficiente' : 'Requer perícia'),

    benefs.push({
      nome: '🤰 Salário-Maternidade',
      sub: 'Art. 71 Lei 8.213/91',
      regra: temAtividadeRural ? 'Rural: sem carência, comprovar atividade' : 'Urbana: 10 contribuições (CI/facultativa) — empregada não tem carência',
      temDireito: temQualidade,
      status: temQualidade ? 'sim' : 'nao',
      motivo: !temQualidade ? 'Sem qualidade' : 'Apto (verificar tipo de segurada)',
    });
  }

  benefs.push({
    nome: '💔 Pensão por Morte (se instituidor for segurado)',
    sub: 'Art. 74 Lei 8.213/91',
    regra: 'Sem carência — basta qualidade do instituidor no momento do óbito',
    temDireito: temQualidade,
    status: 'sim',
    motivo: 'Benefício vai para dependentes, não para o titular',
  });

  if (idadeAnos >= 65) {
    benefs.push({
      nome: '👵 BPC/LOAS — Idoso',
      sub: 'Art. 20 Lei 8.742/93',
      regra: 'Idade ≥ 65 anos + renda per capita < ¼ SM',
      temDireito: true,
      status: 'talvez',
      motivo: 'Requer comprovação de miserabilidade via CadÚnico',
    });
  }
  benefs.push({
    nome: '♿ BPC/LOAS — Deficiência',
    sub: 'Art. 20 §2º Lei 8.742/93',
    regra: 'Qualquer idade + deficiência ≥ 2 anos + renda ¼ SM',
    temDireito: true,
    status: 'talvez',
    motivo: 'Requer perícia + CadÚnico atualizado',
  });

  return benefs;
}

var _renderOrig = window.renderPlanejamento;

window.renderPlanejamento = function() {
  // Executa o render v1 primeiro
  if (typeof _renderOrig === 'function') _renderOrig();

  var root = document.getElementById('tab-planejamento');
  if (!root) return;

  // Se v1 mostrou empty state, não adiciona nada
  if (root.querySelector('.plan-empty')) return;

  // Reconstrói contexto
  var dados = typeof dadosExtraidos !== 'undefined' ? dadosExtraidos : {};
  var todos = typeof _todosDocumentosDados !== 'undefined' ? _todosDocumentosDados : [];
  var cnis = (todos || []).find(function(d) {
    return d && (d._tipoDetectado === 'cnis' || /cnis|extrato/i.test(d.tipoDocumento || ''));
  }) || dados;

  var ctx = {
    nomeCliente: dados.nomeCliente || cnis.nomeCliente,
    cnisOriginal: cnis,
    sexo: (function() {
      var n = (dados.nomeCliente || '').split(' ')[0];
      return /a$/i.test(n) ? 'feminino' : 'masculino';
    })(),
    idadeAtualMeses: (function() {
      var d = dados.dataNascimento || cnis.dataNascimento;
      if (!d) return 0;
      var m = String(d).match(/(\d{2})\/(\d{2})\/(\d{4})/);
      if (!m) return 0;
      var nasc = new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
      var hoje = new Date();
      return (hoje.getFullYear() - nasc.getFullYear()) * 12 + (hoje.getMonth() - nasc.getMonth());
    })(),
    tempoContribMeses: cnis._totalContribuicoesValidas || cnis._totalContribuicoes || 0,
    carencia: cnis._totalContribuicoesValidas || 0,
    tipoAtividade: cnis.tipoAtividade || dados.tipoAtividade,
    temContribAnterior2019: false,
    tempoContrib2019: 0,
  };

  // Calcula tempo pré-2019
  if (cnis._contribuicoesDetalhadas) {
    var reforma = new Date(2019, 10, 13);
    cnis._contribuicoesDetalhadas.forEach(function(c) {
      var d = _parseComp(c.comp);
      if (d && d < reforma) {
        ctx.temContribAnterior2019 = true;
        ctx.tempoContrib2019++;
      }
    });
  }

  // ═══ SEÇÃO: TODAS AS APOSENTADORIAS ═══
  var extras = REGRAS_EXTRAS.map(function(regra) {
    var aplic = regra.aplicavel(dados, ctx);
    return {
      id: regra.id,
      nome: regra.nome,
      sub: regra.sub,
      aplicavel: aplic,
      resultado: aplic ? regra.calcular(ctx) : { temDireito: false, naoAplicavel: true },

  var htmlExtras = ''
    + '<div class="plan-secao">'
    + '  <div class="plan-th" style="display:flex;justify-content:space-between;align-items:center;">'
    + '    <span>🏛️ Todas as Aposentadorias — Comparativo Completo</span>'
    + '  </div>'
    + '  <table>'
    + '    <thead><tr>'
    + '      <th style="width:30%;">Benefício</th>'
    + '      <th style="width:22%;">Requisitos</th>'
    + '      <th style="width:22%;">Situação Atual</th>'
    + '      <th style="width:13%;">Falta</th>'
    + '      <th style="width:13%;">Status</th>'
    + '    </tr></thead>'
    + '    <tbody>';

  extras.forEach(function(r) {
    var res = r.resultado;
    var reqTxt = '';
    if (res.idadeMinima)    reqTxt += '<div>Idade: ' + (typeof res.idadeMinima === 'number' ? res.idadeMinima.toFixed(1).replace(/\.0$/,'') : res.idadeMinima) + ' anos</div>';
    if (res.tempoMinimo)    reqTxt += '<div>Tempo: ' + _fmtTempo(res.tempoMinimo) + '</div>';

    analise.timeline.forEach(function(m) {
      var tooltip = _fmtData(m.mes) + ' — ' + (
        m.status === 'valida' ? 'contribuição válida' :

      + '      <div class="contrib-legenda-item"><div class="contrib-legenda-box" style="background:rgba(34,201,122,.7);"></div>Válida</div>'
      + '      <div class="contrib-legenda-item"><div class="contrib-legenda-box" style="background:rgba(224,82,82,.6);"></div>Inválida (PSC)</div>'
      + '      <div class="contrib-legenda-item"><div class="contrib-legenda-box" style="background:rgba(201,168,76,.7);"></div>Concomitante</div>'
      + '      <div class="contrib-legenda-item"><div class="contrib-legenda-box" style="background:rgba(255,255,255,.04);"></div>Sem contribuição</div>'
      + '    </div>'
      + '  </div>'
      + '</div>';
  }

  // ═══ SEÇÃO: PENDÊNCIAS ═══
  var pends = _detectarPendencias(ctx, analise);
  var htmlPend = ''
    + '<div class="plan-secao">'
    + '  <div class="plan-th">🔍 Pendências Identificadas (' + pends.filter(function(p){return p.nivel!=='resolvido';}).length + ')</div>';
  pends.forEach(function(p) {
    htmlPend += ''
      + '<div class="pend-item ' + p.nivel + '">'
      + '  <div class="pend-icon">' + p.icon + '</div>'
      + '  <div style="flex:1;">'
      + '    <div class="pend-titulo">' + p.titulo + '</div>'
      + '    <div class="pend-desc">' + p.desc + '</div>'
      + (p.acao ? '<div class="pend-acao">' + p.acao + '</div>' : '')
      + '  </div>'
      + '</div>';
  });
  htmlPend += '</div>';

  // ═══ INSERE TUDO ANTES DA NOTA METODOLÓGICA ═══
  var nota = root.querySelector('[style*="strong style=\\"color:var(--blue);\\">Nota"]')
          || root.querySelector('div[style*="border-left:3px solid var(--blue)"]');
  // Busca mais simples: último filho do root
  var ultimo = root.lastElementChild;

  var container = document.createElement('div');
  container.innerHTML = htmlQual + htmlAnalise + htmlPend + htmlExtras + htmlNaoProg;

  // Insere ANTES da nota metodológica
  if (ultimo && ultimo.textContent.includes('Nota:')) {
    root.insertBefore(container, ultimo);
    // move os filhos do container para root, mantendo ordem
    while (container.firstChild) {
      root.insertBefore(container.firstChild, ultimo);
    }
  } else {
    root.appendChild(container);
  }
};

console.log('[A&P Planejamento v2] ✅ Expansão carregada — 7 aposentadorias + qualidade + contribuições + pendências');

// Exposição para o v3 acessar via window.AP_Plan
window.AP_Plan = window.AP_Plan || {};
window.AP_Plan.regrasExtras = REGRAS_EXTRAS;

})();
