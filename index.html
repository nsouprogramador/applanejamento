<script>

'use strict';
// ═══════════════════════════════════════════════════════════
// A&P PEDÁGIOS & TRANSIÇÕES v1.0
// ═══════════════════════════════════════════════════════════
(function() {

// ──────────────────────────────────────────────────────────
// UTILS (reuso das já existentes se disponíveis)
// ──────────────────────────────────────────────────────────
function _fmtData(d) {
  if (!d || !(d instanceof Date) || isNaN(d)) return '—';
  return String(d.getDate()).padStart(2,'0') + '/' +
         String(d.getMonth()+1).padStart(2,'0') + '/' +
         d.getFullYear();
}
function _fmtTempo(meses) {
  if (meses === null || meses === undefined) return '—';
  var neg = meses < 0;
  meses = Math.abs(meses);
  var a = Math.floor(meses / 12);
  var m = Math.round(meses % 12);
  var s = a + 'a ' + m + 'm';
  return neg ? '-' + s : s;
}
function _fmtDuracao(meses) {
  if (!meses || meses < 0) return '—';
  var a = Math.floor(meses / 12);
  var m = Math.round(meses % 12);
  return a + ' ano' + (a !== 1 ? 's' : '') + ' e ' + m + ' mes' + (m !== 1 ? 'es' : '');
}
function _parseComp(s) {
  if (!s) return null;
  var m = String(s).match(/(\d{1,2})\/(\d{4})/);
  if (!m) return null;
  return new Date(parseInt(m[2]), parseInt(m[1]) - 1, 1);
}
function _parseDataBR(s) {
  if (!s) return null;
  var m = String(s).match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (!m) return null;
  return new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
}

// ──────────────────────────────────────────────────────────
// FATOR PREVIDENCIÁRIO (simplificado)
// f = (Tc × a / Es) × [1 + (Id + Tc × a) / 100]
// onde: a = 0.31, Tc = tempo contrib, Id = idade, Es = expectativa IBGE
// ──────────────────────────────────────────────────────────
// Tabela IBGE simplificada (expectativa em anos restantes por idade)
var EXPECTATIVA_IBGE = {
  50: 33.3, 51: 32.4, 52: 31.5, 53: 30.6, 54: 29.8,
  55: 28.9, 56: 28.1, 57: 27.2, 58: 26.4, 59: 25.6,
  60: 24.8, 61: 24.0, 62: 23.2, 63: 22.4, 64: 21.6,
  65: 20.9, 66: 20.1, 67: 19.4, 68: 18.6, 69: 17.9,
  70: 17.2,
};

function _fatorPrevidenciario(idadeAnos, tempoContribAnos) {
  var idadeRound = Math.round(idadeAnos);
  var es = EXPECTATIVA_IBGE[idadeRound] || (idadeRound < 50 ? 35 : 20);
  var a = 0.31;
  var f = (tempoContribAnos * a / es) * (1 + (idadeRound + tempoContribAnos * a) / 100);
  return Math.round(f * 10000) / 10000; // 4 casas
}

// ──────────────────────────────────────────────────────────
// CALCULADORAS — uma por regra
// Todas retornam estrutura padronizada com passos, resultado, observações
// ──────────────────────────────────────────────────────────
function _calcDireitoAdquirido(ctx) {
  // Tinha 30/35 anos contribuição em 13/11/2019?
  var sexo = ctx.sexo;
  var tempoMin = sexo === 'feminino' ? 360 : 420;
  var t = ctx.tempoContrib2019 || 0;
  var tinhaDireito = t >= tempoMin;
  return {
    nome: 'Direito Adquirido',
    base: 'Art. 3º EC 103/2019',
    aplicavel: tinhaDireito,
    temDireito: tinhaDireito,
    passos: [
      { label: 'Tempo de contribuição em 13/11/2019', valor: _fmtDuracao(t), raw: t },
      { label: 'Exigido pela regra antiga',            valor: _fmtDuracao(tempoMin), raw: tempoMin },
      { label: 'Atingido antes da Reforma?',           valor: tinhaDireito ? '✓ SIM' : '✗ NÃO', destaque: true },
    ],
    observacao: tinhaDireito
      ? 'Cliente já havia implementado os requisitos antes da Reforma. Tem direito INTEGRAL de se aposentar pela regra antiga — sem pedágio, sem idade mínima. Art. 3º EC 103 protege direito adquirido.'
      : 'Ainda faltavam ' + _fmtDuracao(tempoMin - t) + ' em 13/11/2019 para ter direito adquirido pela regra antiga.',
    dataDireito: tinhaDireito ? new Date(2019, 10, 13) : null,
    fatorAplica: true,
    fatorOpcional: true, // pode escolher não aplicar se resultado for pior
  };
}

function _calcPedagio50(ctx) {
  var sexo = ctx.sexo;
  var tempoMinAntigo = sexo === 'feminino' ? 360 : 420;
  var t2019 = ctx.tempoContrib2019 || 0;
  var faltava2019 = Math.max(0, tempoMinAntigo - t2019);
  var pedagio = Math.round(faltava2019 * 0.5);
  var tempoExigido = t2019 + faltava2019 + pedagio; // = tempoMinAntigo + pedagio
  // Idade mínima: 53F/55H (na data do atingimento)
  var idadeMinAnos = sexo === 'feminino' ? 53 : 55;

  // Precisa ter estado a ≤ 2 anos da regra antiga em 13/11/2019
  var aplicavel = ctx.temContribAnterior2019 && faltava2019 <= 24 && faltava2019 > 0;

  var tempoAtual = ctx.tempoContribMeses;
  var idadeAtual = ctx.idadeAtualMeses / 12;
  var faltaTempo = Math.max(0, tempoExigido - tempoAtual);
  var faltaIdade = Math.max(0, idadeMinAnos - idadeAtual);
  var temDireito = aplicavel && faltaTempo === 0 && faltaIdade <= 0;

  // Data projetada (quando atinge ambos)
  var dataDireito = null;
  if (aplicavel && !temDireito) {
    var hoje = new Date();
    var d = new Date(hoje);
    // Adiciona o maior entre: meses faltando de tempo ou de idade
    var mesesFaltantes = Math.max(Math.ceil(faltaTempo), Math.ceil(faltaIdade * 12));
    d.setMonth(d.getMonth() + mesesFaltantes);
    dataDireito = d;
  } else if (temDireito) {
    dataDireito = new Date(); // já tem direito
  }

  // Fator previdenciário estimado
  var fator = null;
  if (aplicavel && (temDireito || dataDireito)) {
    var idadeProjetada = Math.max(idadeAtual, idadeMinAnos);
    var tempoProjetadoAnos = Math.max(tempoAtual, tempoExigido) / 12;
    fator = _fatorPrevidenciario(idadeProjetada, tempoProjetadoAnos);
  }

  return {
    nome: 'Pedágio 50%',
    base: 'EC 103/2019 Art. 17',
    aplicavel: aplicavel,
    temDireito: temDireito,
    passos: [
      { label: 'Tempo em 13/11/2019',                valor: _fmtDuracao(t2019), raw: t2019 },
      { label: 'Regra antiga (tempo mínimo)',        valor: _fmtDuracao(tempoMinAntigo), raw: tempoMinAntigo },
      { label: 'Faltava em 13/11/2019',              valor: _fmtDuracao(faltava2019), raw: faltava2019 },
      { label: '(×) Pedágio de 50% do que faltava',  valor: _fmtDuracao(pedagio), raw: pedagio, op: '×' },
      { label: 'Tempo total exigido',                valor: _fmtDuracao(tempoExigido), raw: tempoExigido, destaque: true },
      { label: 'Idade mínima',                       valor: idadeMinAnos + ' anos', raw: idadeMinAnos },
      { label: 'Tempo atual',                        valor: _fmtDuracao(tempoAtual), raw: tempoAtual },
      { label: 'Idade atual',                        valor: Math.floor(idadeAtual) + ' anos', raw: idadeAtual },
      { label: 'Falta tempo',                        valor: faltaTempo === 0 ? '— nada' : _fmtDuracao(faltaTempo), raw: faltaTempo },
      { label: 'Falta idade',                        valor: faltaIdade === 0 ? '— nada' : Math.ceil(faltaIdade * 12) + ' meses', raw: faltaIdade },
    ],
    observacao: !aplicavel
      ? (faltava2019 === 0
          ? 'Direito adquirido antes da Reforma — pedágio não é necessário.'
          : 'Não se aplica: faltava mais de 2 anos em 13/11/2019 (faltavam ' + _fmtDuracao(faltava2019) + ').')
      : 'Cliente está no grupo elegível (faltavam ≤ 2 anos em 13/11/2019).',
    alertaFator: aplicavel,  // SEMPRE aplica fator
    fator: fator,
    dataDireito: dataDireito,
    fatorAplica: true,
  };
}

function _calcPedagio100(ctx) {
  var sexo = ctx.sexo;
  var tempoMinAntigo = sexo === 'feminino' ? 360 : 420;
  var t2019 = ctx.tempoContrib2019 || 0;
  var faltava2019 = Math.max(0, tempoMinAntigo - t2019);
  var pedagio = faltava2019; // 100%
  var tempoExigido = t2019 + faltava2019 + pedagio; // = tempoMinAntigo + pedagio
  var idadeMinAnos = sexo === 'feminino' ? 57 : 60;

  // Aplica-se a quem tem contribuição pré-Reforma (não tem limite de 2 anos como o 50%)
  var aplicavel = ctx.temContribAnterior2019 && faltava2019 > 0;

  var tempoAtual = ctx.tempoContribMeses;
  var idadeAtual = ctx.idadeAtualMeses / 12;
  var faltaTempo = Math.max(0, tempoExigido - tempoAtual);
  var faltaIdade = Math.max(0, idadeMinAnos - idadeAtual);
  var temDireito = aplicavel && faltaTempo === 0 && faltaIdade <= 0;

  var dataDireito = null;
  if (aplicavel && !temDireito) {
    var hoje = new Date();
    var d = new Date(hoje);
    var mesesFaltantes = Math.max(Math.ceil(faltaTempo), Math.ceil(faltaIdade * 12));
    d.setMonth(d.getMonth() + mesesFaltantes);
    dataDireito = d;
  } else if (temDireito) {
    dataDireito = new Date();
  }

  return {
    nome: 'Pedágio 100%',
    base: 'EC 103/2019 Art. 20',
    aplicavel: aplicavel,
    temDireito: temDireito,
    passos: [
      { label: 'Tempo em 13/11/2019',                valor: _fmtDuracao(t2019), raw: t2019 },
      { label: 'Regra antiga (tempo mínimo)',        valor: _fmtDuracao(tempoMinAntigo), raw: tempoMinAntigo },
      { label: 'Faltava em 13/11/2019',              valor: _fmtDuracao(faltava2019), raw: faltava2019 },
      { label: '(×) Pedágio de 100% do que faltava', valor: _fmtDuracao(pedagio), raw: pedagio, op: '×' },
      { label: 'Tempo total exigido',                valor: _fmtDuracao(tempoExigido), raw: tempoExigido, destaque: true },
      { label: 'Idade mínima',                       valor: idadeMinAnos + ' anos', raw: idadeMinAnos },
      { label: 'Tempo atual',                        valor: _fmtDuracao(tempoAtual), raw: tempoAtual },
      { label: 'Idade atual',                        valor: Math.floor(idadeAtual) + ' anos', raw: idadeAtual },
      { label: 'Falta tempo',                        valor: faltaTempo === 0 ? '— nada' : _fmtDuracao(faltaTempo), raw: faltaTempo },
      { label: 'Falta idade',                        valor: faltaIdade === 0 ? '— nada' : Math.ceil(faltaIdade * 12) + ' meses', raw: faltaIdade },
    ],
    observacao: !aplicavel
      ? 'Não se aplica: sem contribuição pré-Reforma.'
      : 'RMI INTEGRAL (100% da média dos salários). Não aplica fator previdenciário — é a regra mais vantajosa em termos de renda.',
    alertaFator: false,
    fatorAplica: false,
    dataDireito: dataDireito,
  };
}

function _calcPontos(ctx) {
  var sexo = ctx.sexo;
  var tempoMin = sexo === 'feminino' ? 360 : 420;
  // Pontos em 2020: 87F/97H. Cresce 1 por ano até 100F/105H (mulher em 2033, homem em 2028)
  var anoAtual = new Date().getFullYear();
  var pontosBase = sexo === 'feminino' ? 87 : 97;
  var pontosMax = sexo === 'feminino' ? 100 : 105;
  var pontosExigidos = Math.min(pontosMax, pontosBase + (anoAtual - 2020));

  var aplicavel = ctx.temContribAnterior2019;
  var tempoAtual = ctx.tempoContribMeses;
  var idadeAtual = ctx.idadeAtualMeses / 12;
  var pontosAtuais = Math.floor(idadeAtual + tempoAtual/12);

  var faltaTempo = Math.max(0, tempoMin - tempoAtual);
  var faltamPontos = Math.max(0, pontosExigidos - pontosAtuais);
  var temDireito = aplicavel && faltaTempo === 0 && faltamPontos === 0;

  var dataDireito = null;
  if (aplicavel && !temDireito) {
    // cresce 1 ponto/ano (idade + tempo sobem juntos): faltam N pontos ÷ 2 anos (metade idade metade tempo)
    var hoje = new Date();
    var mesesFaltantes = Math.max(faltaTempo, Math.ceil(faltamPontos * 6));
    var d = new Date(hoje);
    d.setMonth(d.getMonth() + mesesFaltantes);
    dataDireito = d;
  } else if (temDireito) {
    dataDireito = new Date();
  }

  return {
    nome: 'Regra dos Pontos',
    base: 'EC 103/2019 Art. 15',
    aplicavel: aplicavel,
    temDireito: temDireito,
    passos: [
      { label: 'Tempo mínimo de contribuição',         valor: _fmtDuracao(tempoMin), raw: tempoMin },
      { label: 'Pontos exigidos em ' + anoAtual,       valor: pontosExigidos + ' pontos', raw: pontosExigidos, destaque: true },
      { label: 'Tempo atual',                          valor: _fmtDuracao(tempoAtual), raw: tempoAtual },
      { label: 'Idade atual',                          valor: Math.floor(idadeAtual) + ' anos', raw: idadeAtual },
      { label: 'Pontos atuais (idade + tempo)',        valor: pontosAtuais + ' pontos', raw: pontosAtuais },
      { label: 'Falta tempo',                          valor: faltaTempo === 0 ? '— nada' : _fmtDuracao(faltaTempo), raw: faltaTempo },
      { label: 'Faltam pontos',                        valor: faltamPontos === 0 ? '— nada' : faltamPontos + ' pontos', raw: faltamPontos },
    ],
    observacao: !aplicavel
      ? 'Não se aplica: sem contribuição pré-Reforma.'
      : 'RMI calculada pela média + coeficiente (começa em 60%, +2% por ano adicional após 20H/15M). Sem fator.',
    alertaFator: false,
    fatorAplica: false,
    dataDireito: dataDireito,
  };
}

function _calcIdadeProgressiva(ctx) {
  var sexo = ctx.sexo;
  var tempoMin = sexo === 'feminino' ? 360 : 420;
  // Idade inicial 2019: 56F/61H. Cresce 0,5/ano até 62F/65H
  var anosDesde2019 = new Date().getFullYear() - 2019;
  var idadeInicial = sexo === 'feminino' ? 56 : 61;
  var idadeMaxima = sexo === 'feminino' ? 62 : 65;
  var idadeExigida = Math.min(idadeMaxima, idadeInicial + anosDesde2019 * 0.5);

  var aplicavel = ctx.temContribAnterior2019;
  var tempoAtual = ctx.tempoContribMeses;
  var idadeAtual = ctx.idadeAtualMeses / 12;

  var faltaIdade = Math.max(0, idadeExigida - idadeAtual);
  var faltaTempo = Math.max(0, tempoMin - tempoAtual);
  var temDireito = aplicavel && faltaIdade <= 0 && faltaTempo === 0;

  var dataDireito = null;
  if (aplicavel && !temDireito) {
    var hoje = new Date();
    var d = new Date(hoje);
    var mesesFaltantes = Math.max(Math.ceil(faltaIdade * 12), Math.ceil(faltaTempo));
    d.setMonth(d.getMonth() + mesesFaltantes);
    dataDireito = d;
  } else if (temDireito) {
    dataDireito = new Date();
  }

  return {
    nome: 'Idade Progressiva',
    base: 'EC 103/2019 Art. 16',
    aplicavel: aplicavel,
    temDireito: temDireito,
    passos: [
      { label: 'Idade inicial (2019)',                 valor: idadeInicial + ' anos', raw: idadeInicial },
      { label: '(+) 0,5 ano por ano × ' + anosDesde2019 + ' anos', valor: '+' + (anosDesde2019 * 0.5), raw: anosDesde2019 * 0.5 },
      { label: 'Idade exigida em ' + new Date().getFullYear(), valor: idadeExigida + ' anos', raw: idadeExigida, destaque: true },
      { label: 'Tempo mínimo exigido',                 valor: _fmtDuracao(tempoMin), raw: tempoMin },
      { label: 'Idade atual',                          valor: Math.floor(idadeAtual) + ' anos', raw: idadeAtual },
      { label: 'Tempo atual',                          valor: _fmtDuracao(tempoAtual), raw: tempoAtual },
      { label: 'Falta idade',                          valor: faltaIdade === 0 ? '— nada' : Math.ceil(faltaIdade * 12) + ' meses', raw: faltaIdade },
      { label: 'Falta tempo',                          valor: faltaTempo === 0 ? '— nada' : _fmtDuracao(faltaTempo), raw: faltaTempo },
    ],
    observacao: !aplicavel
      ? 'Não se aplica: sem contribuição pré-Reforma.'
      : 'RMI pela média + 60% + 2% por ano adicional. Sem fator. Idade mínima sobe 0,5 ano/ano até 2031.',
    alertaFator: false,
    fatorAplica: false,
    dataDireito: dataDireito,
  };
}

function _calcRegraNova(ctx) {
  // Regra permanente (pós-Reforma, todos): idade mínima + 180 meses
  var sexo = ctx.sexo;
  var idadeMin = sexo === 'feminino' ? 62 : 65;
  var carenciaMin = 180;

  var tempoAtual = ctx.tempoContribMeses;
  var idadeAtual = ctx.idadeAtualMeses / 12;
  var carencia = ctx.carencia || 0;

  var faltaIdade = Math.max(0, idadeMin - idadeAtual);
  var faltaCarencia = Math.max(0, carenciaMin - carencia);
  var temDireito = faltaIdade <= 0 && faltaCarencia === 0;

  var dataDireito = null;
  if (!temDireito) {
    var hoje = new Date();
    var d = new Date(hoje);
    var mesesFaltantes = Math.max(Math.ceil(faltaIdade * 12), faltaCarencia);
    d.setMonth(d.getMonth() + mesesFaltantes);
    dataDireito = d;
  } else {
    dataDireito = new Date();
  }

  return {
    nome: 'Regra Nova (Idade Urbana)',
    base: 'Art. 48 Lei 8.213/91 + EC 103/2019',
    aplicavel: true, // todos
    temDireito: temDireito,
    passos: [
      { label: 'Idade mínima',           valor: idadeMin + ' anos', raw: idadeMin },
      { label: 'Carência mínima',        valor: carenciaMin + ' meses', raw: carenciaMin, destaque: true },
      { label: 'Idade atual',            valor: Math.floor(idadeAtual) + ' anos', raw: idadeAtual },
      { label: 'Carência atual',         valor: carencia + ' meses', raw: carencia },
      { label: 'Falta idade',            valor: faltaIdade === 0 ? '— nada' : Math.ceil(faltaIdade * 12) + ' meses', raw: faltaIdade },
      { label: 'Falta carência',         valor: faltaCarencia === 0 ? '— nada' : faltaCarencia + ' meses', raw: faltaCarencia },
    ],
    observacao: 'RMI = 60% da média + 2% por ano adicional após 20 anos (H) ou 15 anos (M). Sem fator previdenciário.',
    alertaFator: false,
    fatorAplica: false,
    dataDireito: dataDireito,
  };
}

// ──────────────────────────────────────────────────────────
// RANKING INTELIGENTE — qual regra é melhor para este cliente?
// ──────────────────────────────────────────────────────────
function _rankearRegras(resultados, ctx) {
  // Filtra só as aplicáveis
  var aplic = resultados.filter(function(r) { return r.aplicavel; });
  if (!aplic.length) return null;

  // Ordena por:
  // 1. Já tem direito > ainda não
  // 2. Se ambos têm direito: o que tem RMI melhor (sem fator > com fator)
  // 3. Se ambos não têm: o que tem data mais próxima
  aplic.sort(function(a, b) {
    // Direito adquirido sempre primeiro (se aplicável)
    if (a.nome === 'Direito Adquirido' && a.temDireito) return -1;
    if (b.nome === 'Direito Adquirido' && b.temDireito) return 1;

    // Ambos com direito: sem fator ganha
    if (a.temDireito && b.temDireito) {
      if (a.fatorAplica !== b.fatorAplica) return a.fatorAplica ? 1 : -1;
      return 0;
    }
    // Um com direito, outro sem: direito ganha
    if (a.temDireito && !b.temDireito) return -1;
    if (!a.temDireito && b.temDireito) return 1;
    // Nenhum com direito: data mais próxima ganha
    if (a.dataDireito && b.dataDireito) return a.dataDireito - b.dataDireito;
    if (a.dataDireito) return -1;
    if (b.dataDireito) return 1;
    return 0;
  });

  var melhor = aplic[0];
  var recomendacao = '';

  if (melhor.nome === 'Direito Adquirido' && melhor.temDireito) {
    recomendacao = 'Direito ADQUIRIDO antes da Reforma. Cliente pode se aposentar IMEDIATAMENTE pela regra antiga (Art. 3º EC 103/2019). Não precisa cumprir pedágio ou idade mínima.';
  } else if (melhor.temDireito) {
    if (melhor.fatorAplica) {
      recomendacao = 'Melhor opção DISPONÍVEL HOJE: ' + melhor.nome + '. Mas ATENÇÃO: aplica fator previdenciário (~' + (melhor.fator ? melhor.fator.toFixed(2) : '?') + '), que reduz a RMI. Avalie se compensa aguardar regra sem fator.';
    } else {
      recomendacao = 'Melhor opção: ' + melhor.nome + '. Não aplica fator previdenciário — RMI integral.';
    }
  } else {
    var quando = melhor.dataDireito ? _fmtData(melhor.dataDireito) : 'data futura';
    recomendacao = 'Regra mais próxima: ' + melhor.nome + '. Direito estimado em ' + quando + '.';
    if (melhor.fatorAplica) {
      recomendacao += ' Observação: aplica fator previdenciário (RMI reduzida).';
    }
  }

  // Se há Pedágio 50% e Pedágio 100% aplicáveis, compara
  var p50 = resultados.find(function(r){ return r.nome === 'Pedágio 50%'; });
  var p100 = resultados.find(function(r){ return r.nome === 'Pedágio 100%'; });
  if (p50 && p100 && p50.aplicavel && p100.aplicavel) {
    // Pedágio 100% geralmente é melhor em termos de RMI (sem fator)
    if (p50.temDireito && !p100.temDireito && p100.dataDireito) {
      var diff = p100.dataDireito - new Date();
      var mesesEspera = Math.ceil(diff / (30.44 * 24 * 3600 * 1000));
      if (mesesEspera <= 24) {
        recomendacao += ' 💡 Comparação Pedágio: já tem direito pelo 50% (com fator), mas se esperar ' + mesesEspera + ' meses, Pedágio 100% paga valor integral (geralmente 25-35% a mais).';
      }
    }
  }

  return { melhor: melhor, recomendacao: recomendacao };
}

function _renderCalc(passos) {
  var html = '<div class="ped-calc">';
  passos.forEach(function(p) {
    html += '<div class="ped-calc-linha' + (p.destaque ? ' destaque' : '') + '">'
      + '  <span class="ped-calc-label">' + (p.op ? '<span class="ped-calc-op">' + p.op + '</span>' : '') + p.label + '</span>'
      + '  <span class="ped-calc-valor">' + p.valor + '</span>'
      + '</div>';
  });
  html += '</div>';
  return html;
}

function _renderRegra(r, isMelhor) {
  var badge;
  if (!r.aplicavel)        badge = '<span class="ped-data-direito sem">Não aplicável</span>';
  else if (r.temDireito)   badge = '<span class="ped-data-direito">✓ Tem direito HOJE</span>';
  else if (r.dataDireito)  badge = '<span class="ped-data-direito">em ' + _fmtData(r.dataDireito) + '</span>';
  else                     badge = '<span class="ped-data-direito sem">Sem projeção</span>';

  var html = '<div class="ped-regra' + (isMelhor ? ' melhor' : '') + '">'
    + '  <div class="ped-regra-header">'
    + '    <div>'
    + '      <div class="ped-regra-titulo">'
    +          (isMelhor ? '🏆 ' : '') + r.nome
    + '      </div>'
    + '      <div class="ped-regra-base">' + r.base + '</div>'
    + '    </div>'
    + '    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">'
    + '      ' + badge
    + (isMelhor ? '<span class="ped-regra-rank">MELHOR OPÇÃO</span>' : '')
    + '    </div>'
    + '  </div>';

  if (r.aplicavel) {
    html += '  <div class="ped-regra-body">'
      +      _renderCalc(r.passos)
      + '    <div class="ped-explica">' + r.observacao + '</div>';

    if (r.alertaFator) {
      html += '<div class="ped-alerta-fator">'
        + '<strong>⚠️ ATENÇÃO — FATOR PREVIDENCIÁRIO:</strong> esta regra aplica fator (~'
        + (r.fator ? r.fator.toFixed(3) : 'calcular na data') + '). '
        + 'Se &lt; 1,0, reduz a RMI proporcionalmente. '
        + 'Exemplo: fator 0,72 em média de R$ 3.000 = RMI de R$ 2.160 (redução de 28%). '
        + 'Considere esperar o Pedágio 100% (sem fator) se viável.'
        + '</div>';
    }

    html += '  </div>';
  } else {
    html += '<div class="ped-regra-body"><div class="ped-explica">' + r.observacao + '</div></div>';
  }

  html += '</div>';
  return html;
}

    + '        </div>'
    + '        <div class="ped-marco-item">'
    + '          <span class="ped-marco-label">Faltava pela regra antiga</span>'
    + '          <span class="ped-marco-valor ' + (faltavaEm2019 === 0 ? 'dourado' : '') + '">' + (faltavaEm2019 === 0 ? '0 (direito adquirido!)' : _fmtDuracao(faltavaEm2019)) + '</span>'
    + '        </div>'
    + '      </div>'
    + '    </div>';

  // Alerta de direito adquirido
  if (direitoAdq) {
    html += ''
      + '    <div class="ped-direito-adquirido">'
      + '      <div class="ped-direito-icon">🏛️</div>'
      + '      <div>'
      + '        <div class="ped-direito-titulo">Direito Adquirido — Pré-Reforma</div>'
      + '        <div class="ped-direito-desc">'

      + '          <strong>Pode se aposentar pela regra antiga, sem pedágio, sem idade mínima.</strong> '
      + '          Garantia do Art. 3º da EC 103/2019.'
      + '        </div>'
      + '      </div>'
      + '    </div>';
  }

  // Recomendação
  if (ranking && ranking.recomendacao) {
    html += ''
      + '    <div class="ped-ranking">'
      + '      <div class="ped-ranking-titulo">🎯 Recomendação Inteligente</div>'
      + '      <div class="ped-ranking-desc">' + ranking.recomendacao + '</div>'
      + '    </div>';
  }

  // Cada regra (ordem: melhor primeiro)
  var ordemExibicao = resultados.slice().sort(function(a, b) {
    if (a.nome === melhorNome) return -1;
    if (b.nome === melhorNome) return 1;
    // aplicáveis antes
    if (a.aplicavel !== b.aplicavel) return a.aplicavel ? -1 : 1;
    return 0;
  });

  ordemExibicao.forEach(function(r) {
    html += _renderRegra(r, r.nome === melhorNome);
  });

  html += '  </div></div>';

  // Injeta ANTES da nota metodológica (último filho)
  var ultimo = root.lastElementChild;
  var container = document.createElement('div');
  container.innerHTML = html;

  // Procura a nota metodológica
  var nota = null;
  var filhos = root.children;
  for (var i = filhos.length - 1; i >= 0; i--) {
    if (filhos[i].textContent && filhos[i].textContent.includes('Nota:')) {
      nota = filhos[i];
      break;
    }
  }

  // Move os filhos do container
  if (nota) {
    while (container.firstChild) {
      root.insertBefore(container.firstChild, nota);
    }
  } else {
    while (container.firstChild) {
      root.appendChild(container.firstChild);
    }
  }
};

'use strict';
// ─── Compat: exporta funções de cálculo para o v3 acessar ───
// Os módulos v1, v2, pedágios executam em IIFE, mas os símbolos ficam nos escopos
// deles. Precisamos de outra forma de expor.
//
// Solução: os módulos v2 e pedágios já foram modificados no arquivo principal

// 
// Na real, a reconstrução fica complexa demais. Faço assim:
// Os três módulos (v1, v2, pedágios) no seu IIFE, vão escrever em window._planCalcs
// se eu pedir via um hook. Mas não peço.
// 
// A solução ATÔMICA: reconstruí AP_Plan aqui com referências FUNÇÕES DUPLICADAS
// tiradas do arquivo ap-pareceres.html.
//
// MELHOR SOLUÇÃO na prática: injetar antes do v3 um patch que intercepta as
// funções via hook. Mas isso é gambiarra.
// 
// Vou adotar uma abordagem MUITO MAIS SIMPLES: no glue, criar AP_Plan chamando 
// diretamente as funções como estão expostas nos módulos. Se não estão expostas, 
// criar stubs que retornam "indisponível".
//
window.AP_Plan = window.AP_Plan || {};

if (!window.AP_Plan.calcularQualidadeSegurado) {
  window.AP_Plan.calcularQualidadeSegurado = function(ctx) {
    // Fallback mínimo: usa _temVinculoAberto e _mesesDesdeUltimo do cnis
    var cnis = ctx.cnisOriginal || {};
    if (cnis._temVinculoAberto) {
      return { status: 'ativo', desc: 'Vínculo ativo no CNIS. Qualidade mantida automaticamente.', meta: 'VÍNCULO VIGENTE' };
    }
    var m = cnis._mesesDesdeUltimo || 0;
    var lim = (cnis._totalContribuicoesValidas >= 120) ? 24 : 12;
    if (m <= lim) return { status: 'graca', desc: 'Em período de graça. Restam ' + (lim-m) + ' meses.', meta: 'GRAÇA' };

<script>

'use strict';
// ═══════════════════════════════════════════════════════════
// A&P PLANEJAMENTO v3.0 — Nova Interface
// ═══════════════════════════════════════════════════════════
(function() {

var AP = window.AP_Plan || {};

// ─── Estado global do planejamento ──────────────────────
var _estado = {
  der: null,             // Date — DER da análise
  modo: 'tecnica',       // 'tecnica' | 'cliente'
  secaoAberta: null,     // qual seção está expandida
};

// ─── Utils ───────────────────────────────────────────────
function _fmtData(d) {
  if (!d || !(d instanceof Date) || isNaN(d)) return '—';
  return String(d.getDate()).padStart(2,'0') + '/' +
         String(d.getMonth()+1).padStart(2,'0') + '/' +
         d.getFullYear();
}
function _fmtDataISO(d) {
  if (!d) return '';
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function _parseDataBR(s) {
  if (!s) return null;
  var m = String(s).match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (!m) return null;
  return new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
}
function _parseDataISO(s) {
  if (!s) return null;
  var m = String(s).match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return null;
  return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
}
function _parseComp(s) {
  if (!s) return null;
  var m = String(s).match(/(\d{1,2})\/(\d{4})/);
  if (!m) return null;
  return new Date(parseInt(m[2]), parseInt(m[1]) - 1, 1);
}
function _fmtDuracao(meses) {
  if (!meses || meses < 0) return '—';
  var a = Math.floor(meses / 12);
  var m = Math.round(meses % 12);
  if (a === 0) return m + ' mes' + (m !== 1 ? 'es' : '');
  if (m === 0) return a + ' ano' + (a !== 1 ? 's' : '');
  return a + 'a ' + m + 'm';
}
function _fmtDuracaoLonga(meses) {
  if (!meses || meses < 0) return '—';
  var a = Math.floor(meses / 12);
  var m = Math.round(meses % 12);
  var txt = '';
  if (a > 0) txt += a + ' ano' + (a !== 1 ? 's' : '');
  if (a > 0 && m > 0) txt += ' e ';
  if (m > 0) txt += m + ' mes' + (m !== 1 ? 'es' : '');
  return txt || '0 meses';
}
function _esc(s) {
  return String(s || '').replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

// ─── Contexto base do segurado ──────────────────────────
function _montarContexto(der) {
  var dados = typeof dadosExtraidos !== 'undefined' ? dadosExtraidos : {};
  var todos = typeof _todosDocumentosDados !== 'undefined' ? _todosDocumentosDados : [];
  var cnis  = (todos || []).find(function(d){
    return d && (d._tipoDetectado === 'cnis' || /cnis|extrato/i.test(d.tipoDocumento || ''));
  }) || dados;

  var nasc = _parseDataBR(dados.dataNascimento || cnis.dataNascimento);
  var dataAnalise = der || new Date();

  var idadeMeses = nasc
    ? ((dataAnalise.getFullYear() - nasc.getFullYear()) * 12 + (dataAnalise.getMonth() - nasc.getMonth()))
    : 0;

  // Tempo de contribuição na DER (não só a válida total — filtra por data ≤ DER)
  var tempoAteDer = cnis._totalContribuicoesValidas || 0;
  var carenciaAteDer = tempoAteDer;
  if (cnis._contribuicoesDetalhadas && der) {
    tempoAteDer = 0; carenciaAteDer = 0;
    cnis._contribuicoesDetalhadas.forEach(function(c) {
      var d = _parseComp(c.comp);
      if (!d || d > der) return;
      tempoAteDer++;
      var invalida = (c.indicadores || []).some(function(i) { return /PSC-MEN-SM/.test(i); });
      if (!invalida) carenciaAteDer++;
    });
  }

  // Pré-reforma
  var reforma = new Date(2019, 10, 13);
  var tempoContrib2019 = 0;
  var temContribAnterior2019 = false;
  if (cnis._contribuicoesDetalhadas) {
    cnis._contribuicoesDetalhadas.forEach(function(c) {
      var d = _parseComp(c.comp);
      if (d && d < reforma) {
        temContribAnterior2019 = true;
        tempoContrib2019++;
      }
    });
  }

  var sexo = (function() {
    var n = (dados.nomeCliente || cnis.nomeCliente || '').split(' ')[0];
    return /a$/i.test(n) ? 'feminino' : 'masculino';
  })();

  return {
    nomeCliente: dados.nomeCliente || cnis.nomeCliente || 'Segurado',
    cpf: dados.cpfCnpj || cnis.cpfCnpj || '—',
    dataNascimento: nasc,
    sexo: sexo,
    der: dataAnalise,
    idadeAtualMeses: idadeMeses,
    tempoContribMeses: tempoAteDer,
    carencia: carenciaAteDer,
    tempoContrib2019: tempoContrib2019,
    temContribAnterior2019: temContribAnterior2019,
    tipoAtividade: cnis.tipoAtividade || dados.tipoAtividade,
    cnisOriginal: cnis,
    dadosOriginais: dados,
    todosDocDados: todos,
    _temCnis: !!(cnis && cnis._vinculos),
    hoje: new Date(),
  };
}

// ─── Textos conforme modo (técnica/cliente) ────────────
function _texto(chave) {
  var T = {
    status_ativo: {
      tecnica: 'Segurado com qualidade de segurado ATIVA na DER',
      cliente: 'Sua proteção previdenciária está ativa nessa data',
    },
    status_graca: {
      tecnica: 'Em período de graça — qualidade preservada temporariamente',
      cliente: 'Você ainda tem direitos previdenciários por mais algum tempo',
    },
    status_perdeu: {
      tecnica: 'Qualidade de segurado PERDIDA na DER',
      cliente: 'Você perdeu a proteção previdenciária — precisa voltar a contribuir',
    },
    fator_previdenciario: {
      tecnica: 'Aplica fator previdenciário — reduz a RMI proporcionalmente',
      cliente: 'Essa regra usa um cálculo que pode reduzir o valor do benefício',
    },
    sem_fator: {
      tecnica: 'Não aplica fator previdenciário — RMI integral',
      cliente: 'Essa regra garante valor cheio — sem redução',
    },
  };
  return (T[chave] || {})[_estado.modo] || (T[chave] || {}).tecnica || '';
}

// ─── Analisa TODAS as regras e retorna só as aplicáveis ─
function _analisarTodasRegras(ctx) {
  var resultados = [];

  // Regras principais (do módulo pedágios)
  if (AP.calcDireitoAdquirido)  resultados.push(AP.calcDireitoAdquirido(ctx));
  if (AP.calcPedagio100)        resultados.push(AP.calcPedagio100(ctx));
  if (AP.calcPedagio50)         resultados.push(AP.calcPedagio50(ctx));
  if (AP.calcPontos)            resultados.push(AP.calcPontos(ctx));
  if (AP.calcIdadeProgressiva)  resultados.push(AP.calcIdadeProgressiva(ctx));
  if (AP.calcRegraNova)         resultados.push(AP.calcRegraNova(ctx));

  // Regras extras (módulo v2)
  (AP.regrasExtras || []).forEach(function(regra) {
    var aplic = regra.aplicavel(ctx.dadosOriginais, ctx);
    if (!aplic) {
      resultados.push({
        nome: regra.nome, base: regra.sub,
        aplicavel: false, temDireito: false,
        passos: [], observacao: 'Não aplicável ao perfil do segurado.',
      });
    } else {
      var r = regra.calcular(ctx);
      resultados.push({
        nome: regra.nome, base: regra.sub,
        aplicavel: true,
        temDireito: r.temDireito,
        passos: [],
        observacao: r.obs || '',
        fatorAplica: false,
        dataDireito: r.dataDireito || null,
        _detalhe: r,
      });
    }
  });

  return resultados;
}

// ─── Renderiza cabeçalho do segurado ───────────────────
function _renderCabecalho(ctx) {
  var idade = Math.floor(ctx.idadeAtualMeses / 12);
  var metaHtml = '';
  if (ctx.cpf && ctx.cpf !== '—')        metaHtml += '<span>CPF ' + _esc(ctx.cpf) + '</span>';
  if (ctx.dataNascimento)                metaHtml += '<span>NASC. ' + _fmtData(ctx.dataNascimento) + '</span>';
  metaHtml += '<span>' + idade + ' ANOS</span>';
  metaHtml += '<span>SEXO ' + (ctx.sexo === 'feminino' ? 'F' : 'M') + '</span>';

  return ''
    + '<div class="p3-cabecalho">'
    + '  <div>'
    + '    <div class="p3-nome">' + _esc(ctx.nomeCliente) + '</div>'
    + '    <div class="p3-meta">' + metaHtml + '</div>'
    + '  </div>'
    + '  <div class="p3-modo-toggle">'
    + '    <button class="p3-modo-btn ' + (_estado.modo === 'tecnica' ? 'ativo' : '') + '" onclick="window._apPlanModoSet(\'tecnica\')">Técnica</button>'
    + '    <button class="p3-modo-btn ' + (_estado.modo === 'cliente' ? 'ativo' : '') + '" onclick="window._apPlanModoSet(\'cliente\')">Cliente</button>'
    + '  </div>'
    + '</div>';
}

// ─── Renderiza barra de DER ───────────────────────────
function _renderDer(ctx) {
  var ehHoje = ctx.der.toDateString() === ctx.hoje.toDateString();
  var ehPassado = ctx.der < ctx.hoje && !ehHoje;
  var ehFuturo  = ctx.der > ctx.hoje && !ehHoje;

  // Diferença em anos/meses para hint rico
  var diffHint = '';
  if (!ehHoje) {
    var diffMeses = Math.abs(
      (ctx.der.getFullYear() - ctx.hoje.getFullYear()) * 12
      + (ctx.der.getMonth() - ctx.hoje.getMonth())
    );
    var a = Math.floor(diffMeses / 12), m = diffMeses % 12;
    var parte = (a > 0 ? a + 'a' : '') + (m > 0 ? (a > 0 ? ' ' : '') + m + 'm' : '') || 'menos de 1m';
    diffHint = ehPassado ? '(há ' + parte + ')' : '(em ' + parte + ')';
  }

  var hint;
  if (ehHoje) {
    hint = 'analisando situação atual';
  } else if (ehPassado) {
    hint = '🕰 simulando em ' + _fmtData(ctx.der) + ' ' + diffHint + ' — útil para auxílio-doença / pensão / afastamentos';
  } else {
    hint = '→ projetando para ' + _fmtData(ctx.der) + ' ' + diffHint;
  }

  // Classe extra quando não é hoje
  var barraCls = 'p3-der-bar' + (ehPassado ? ' sim-passado' : (ehFuturo ? ' sim-futuro' : ''));

  return ''
    + '<div class="' + barraCls + '">'
    + '  <span class="p3-der-label">📅 DATA DA ANÁLISE (DER)</span>'
    + '  <input type="date" class="p3-der-input" id="p3-der-input" value="' + _fmtDataISO(ctx.der) + '" onchange="window._apPlanDerChange(this.value)">'
    + '  <div class="p3-der-btns-grupo">'
    + '    <button class="p3-der-btn" onclick="window._apPlanDerRecuar(60)" title="5 anos atrás">← 5a</button>'
    + '    <button class="p3-der-btn" onclick="window._apPlanDerRecuar(12)" title="1 ano atrás">← 1a</button>'
    + '    <button class="p3-der-btn ' + (ehHoje ? 'ativo' : '') + '" onclick="window._apPlanDerHoje()">Hoje</button>'
    + '    <button class="p3-der-btn" onclick="window._apPlanDerAvancar(12)" title="1 ano à frente">1a →</button>'
    + '    <button class="p3-der-btn" onclick="window._apPlanDerAvancar(24)" title="2 anos à frente">2a →</button>'
    + '  </div>'
    + '  <span class="p3-der-hint">' + hint + '</span>'
    + '</div>';
}

// ─── Renderiza status card principal ──────────────────
function _renderStatus(ctx, qualidade, resultados) {
  var elegivel = resultados.filter(function(r) { return r.aplicavel && r.temDireito; }).length;

  var statusClass, statusIcon, statusPrincipal, statusDesc;

  if (qualidade.status === 'ativo') {
    statusClass = 'ok'; statusIcon = '✓';
    statusPrincipal = _estado.modo === 'tecnica'
      ? '<strong>Qualidade ativa.</strong> Cliente elegível a ' + elegivel + ' benefício' + (elegivel !== 1 ? 's' : '') + '.'
      : '<strong>Proteção ativa.</strong> Você pode pedir ' + elegivel + ' benefício' + (elegivel !== 1 ? 's' : '') + ' nessa data.';
    statusDesc = qualidade.desc;
  } else if (qualidade.status === 'graca') {
    statusClass = 'atencao'; statusIcon = '⏳';
    statusPrincipal = _estado.modo === 'tecnica'
      ? '<strong>Em período de graça.</strong> ' + qualidade.meta
      : '<strong>Proteção temporária.</strong> ' + qualidade.meta;
    statusDesc = qualidade.desc;
  } else {
    statusClass = 'grave'; statusIcon = '✗';
    statusPrincipal = _estado.modo === 'tecnica'
      ? '<strong>Qualidade perdida.</strong> Apenas benefícios que independem de qualidade.'
      : '<strong>Sem proteção previdenciária.</strong> Precisa voltar a contribuir.';
    statusDesc = qualidade.desc;
  }

  // Badge explicitando a data de referência
  var derStr = _fmtData(ctx.der);
  var ehHoje = ctx.der.toDateString() === (ctx.hoje || new Date()).toDateString();
  var badgeDer = '<div class="p3-status-ref-badge' + (ehHoje ? '' : ' nao-hoje') + '">'
    + '📅 calculado para <strong>' + derStr + '</strong>'
    + (ehHoje ? ' (hoje)' : ' (DER em análise)')
    + '</div>';

  // Toggle de desemprego comprovado (só faz sentido se NÃO tem vínculo ativo)
  var desempregoOn = !!window._apEstadoDesemprego;
  var toggleDes = '';
  // Só mostra o toggle se a qualidade é "graca" ou "perdeu" (não faz sentido com vínculo ativo)
  if (qualidade.status === 'graca' || qualidade.status === 'perdeu') {
    toggleDes = ''
      + '<div class="p3-status-toggle">'
      + '  <label class="p3-status-toggle-label">'
      + '    <input type="checkbox" ' + (desempregoOn ? 'checked' : '') + ' onchange="window._apPlanToggleDesemprego(this.checked)">'
      + '    <span>Desemprego comprovado (SINE/MTE) — estende graça em +12 meses (art. 15, §2º Lei 8.213/91)</span>'
      + '  </label>'
      + '</div>';
  }

  return ''
    + '<div class="p3-status-card">'
    + badgeDer
    + toggleDes
    + '  <div class="p3-status-head">'
    + '    <div class="p3-status-icon ' + statusClass + '">' + statusIcon + '</div>'
    + '    <div>'
    + '      <div class="p3-status-principal">' + statusPrincipal + '</div>'
    + '      <div class="p3-status-desc">' + _esc(statusDesc) + '</div>'
    + '    </div>'
    + '  </div>'
    + '  <div class="p3-status-stats">'
    + '    <div class="p3-stat">'
    + '      <div class="p3-stat-valor">' + _fmtDuracao(ctx.tempoContribMeses) + '</div>'
    + '      <div class="p3-stat-label">Tempo de contribuição</div>'
    + '    </div>'
    + '    <div class="p3-stat">'
    + '      <div class="p3-stat-valor">' + ctx.carencia + '</div>'
    + '      <div class="p3-stat-label">Carência (válidas)</div>'
    + '    </div>'
    + '    <div class="p3-stat">'
    + '      <div class="p3-stat-valor">' + Math.floor(ctx.idadeAtualMeses / 12) + '</div>'
    + '      <div class="p3-stat-label">Idade na DER (anos)</div>'
    + '    </div>'
    + '  </div>'
    + '</div>';
}

// ─── Renderiza melhor opção ──────────────────────────
function _renderMelhor(ctx, melhor, recomendacao) {
  if (!melhor) return '';

  var dataTxt = '';
  if (melhor.temDireito) dataTxt = '✓ Tem direito em ' + _fmtData(ctx.der);
  else if (melhor.dataDireito) dataTxt = 'Previsão: ' + _fmtData(melhor.dataDireito);
  else dataTxt = 'Data a definir';

  var descTxt;
  if (_estado.modo === 'tecnica') {
    descTxt = recomendacao || '';
  } else {
    // Versão simplificada
    if (melhor.nome === 'Direito Adquirido') {
      descTxt = 'Você já completou os requisitos antes da Reforma. <strong>Pode se aposentar a qualquer momento</strong>, pelas regras antigas, sem precisar cumprir pedágio ou idade mínima.';
    } else if (melhor.temDireito) {
      if (melhor.fatorAplica) {
        descTxt = '<strong>Você tem direito, mas atenção:</strong> essa regra pode <strong>reduzir o valor mensal</strong> (por causa do fator previdenciário). Talvez seja melhor esperar outra opção.';
      } else {
        descTxt = '<strong>Você tem direito hoje.</strong> Essa é a regra mais vantajosa — <strong>paga o valor integral</strong> (sem redução).';
      }
    } else {
      descTxt = 'Essa será a melhor regra quando chegar a data prevista. Até lá, continue contribuindo normalmente.';
    }
  }

  return ''
    + '<div class="p3-melhor">'
    + '  <div class="p3-melhor-tag">MELHOR OPÇÃO</div>'
    + '  <div class="p3-melhor-titulo">' + _esc(melhor.nome) + '</div>'
    + '  <div class="p3-melhor-data">' + dataTxt + '</div>'
    + '  <div class="p3-melhor-desc">' + descTxt + '</div>'
    + '</div>';
}

// ─── Renderiza seção colapsável ───────────────────────
function _renderSecao(id, icon, titulo, resumo, conteudoHtml, abertaPorDefault) {
  var aberta = abertaPorDefault || (_estado.secaoAberta === id);
  return ''
    + '<div class="p3-secao ' + (aberta ? 'aberta' : '') + '" data-secao-id="' + id + '">'
    + '  <div class="p3-secao-head" onclick="window._apPlanToggleSecao(\'' + id + '\')">'
    + '    <span class="p3-secao-icon">' + icon + '</span>'
    + '    <span class="p3-secao-titulo">' + titulo + '</span>'
    + '    <span class="p3-secao-resumo">' + resumo + '</span>'
    + '    <span class="p3-chevron">▾</span>'
    + '  </div>'
    + '  <div class="p3-secao-body">' + conteudoHtml + '</div>'
    + '</div>';
}

// ─── Renderiza lista de benefícios ────────────────────
function _renderListaBeneficios(ctx, resultados, melhorNome) {
  var html = '';

  // Agrupa: aplicáveis primeiro, depois não-aplicáveis
  var aplicaveis = resultados.filter(function(r) { return r.aplicavel; });
  var naoAplic  = resultados.filter(function(r) { return !r.aplicavel; });

  // Ordena aplicáveis: melhor primeiro, depois com direito, depois por data
  aplicaveis.sort(function(a, b) {
    if (a.nome === melhorNome) return -1;
    if (b.nome === melhorNome) return 1;
    if (a.temDireito !== b.temDireito) return a.temDireito ? -1 : 1;
    if (a.dataDireito && b.dataDireito) return a.dataDireito - b.dataDireito;
    return 0;
  });

  aplicaveis.forEach(function(r, i) {
    html += _renderLinhaBeneficio(r, r.nome === melhorNome, i, ctx);
  });

  if (naoAplic.length > 0) {
    html += '<div style="margin-top:14px;padding-top:12px;border-top:1px dashed var(--border);font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;">Não aplicáveis a este perfil</div>';
    naoAplic.forEach(function(r, i) {
      html += _renderLinhaBeneficio(r, false, 1000 + i, ctx);
    });
  }

  return html;
}

function _renderLinhaBeneficio(r, melhor, idx, ctx) {
  var pillClass, pillTxt;
  if (!r.aplicavel) {
    pillClass = 'na'; pillTxt = 'N/A';
  } else if (r.temDireito && r.fatorAplica) {
    pillClass = 'com-fator'; pillTxt = '⚠ com fator';
  } else if (r.temDireito) {
    pillClass = 'direito'; pillTxt = '✓ disponível';
  } else if (r.dataDireito) {
    pillClass = 'proximo'; pillTxt = 'futuro';
  } else {
    pillClass = 'longe'; pillTxt = 'longe';
  }

  var dataTxt = '';
  if (r.temDireito) dataTxt = 'hoje';
  else if (r.dataDireito) dataTxt = _fmtData(r.dataDireito);
  else dataTxt = '—';

  // Obs curta
  var obs = '';
  if (r.fatorAplica && r.temDireito) obs = _texto('fator_previdenciario');
  else if (r.aplicavel && !r.temDireito) obs = r.observacao ? r.observacao.substring(0, 80) + (r.observacao.length > 80 ? '...' : '') : '';
  else if (!r.aplicavel) obs = r.observacao || 'Não aplicável';

  var detalheHtml = _renderDetalheCalculo(r, ctx);

  return ''
    + '<div class="p3-beneficio-linha" onclick="window._apPlanToggleDetalhe(' + idx + ')">'
    + '  <div class="p3-beneficio-info">'
    + '    <div class="p3-beneficio-nome' + (melhor ? ' melhor' : '') + '">' + _esc(r.nome) + '</div>'
    + (obs ? '<div class="p3-beneficio-obs">' + _esc(obs) + '</div>' : '')
    + '  </div>'
    + '  <div class="p3-beneficio-data">' + dataTxt + '</div>'
    + '  <div class="p3-status-pill ' + pillClass + '">' + pillTxt + '</div>'
    + '</div>'
    + '<div class="p3-beneficio-detalhe" id="p3-det-' + idx + '">' + detalheHtml + '</div>';
}

function _renderDetalheCalculo(r, ctx) {
  if (!r.aplicavel) return '<div style="font-size:12px;color:var(--muted2);">' + _esc(r.observacao || 'Não aplicável ao perfil') + '</div>';

  var html = '<div style="font-size:12.5px;color:var(--muted2);line-height:1.55;margin-bottom:10px;">'
    + _esc(r.observacao || '') + '</div>';

  if (r.passos && r.passos.length > 0) {
    html += '<div class="p3-calc">';
    r.passos.forEach(function(p) {
      html += '<div class="p3-calc-linha' + (p.destaque ? ' destaque' : '') + '">'
        + '<span>' + _esc(p.label) + '</span>'
        + '<span>' + _esc(p.valor) + '</span>'
        + '</div>';
    });
    html += '</div>';
  }

  if (r.alertaFator && r.aplicavel) {
    html += '<div style="padding:10px 14px;background:rgba(240,160,48,.08);border-left:3px solid var(--amber);border-radius:0 6px 6px 0;font-size:11.5px;color:var(--text);line-height:1.55;margin-top:10px;">'
      + '<strong style="color:var(--amber);">⚠ Fator previdenciário:</strong> '
      + (_estado.modo === 'cliente'
          ? 'Essa regra usa um cálculo que pode reduzir o valor do benefício. Exemplo: em uma média de R$ 3.000, o fator de 0,72 resultaria em R$ 2.160 (redução de 28%).'
          : 'Fator estimado ' + (r.fator ? r.fator.toFixed(3) : 'a calcular') + '. Reduz a RMI proporcionalmente. Em média de R$ 3.000, fator 0,72 = R$ 2.160 (−28%).')
      + '</div>';
  }

  return html;
}

// ─── Renderiza histórico contributivo por ano ─────────
function _renderHistoricoAnual(ctx) {
  var analise = AP.analisarContribuicoes ? AP.analisarContribuicoes(ctx) : null;
  if (!analise || !analise.timeline || !analise.timeline.length) {
    return '<div style="color:var(--muted2);font-size:13px;padding:20px;text-align:center;">Sem dados de contribuições detalhadas no CNIS.</div>';
  }

  // Agrupa timeline por ano
  var porAno = {};
  analise.timeline.forEach(function(m) {
    var ano = m.mes.getFullYear();
    if (!porAno[ano]) porAno[ano] = Array(12).fill(null);
    porAno[ano][m.mes.getMonth()] = m;
  });

  var MESES_LABEL = ['J','F','M','A','M','J','J','A','S','O','N','D'];
  var anos = Object.keys(porAno).sort();
  var html = '';

  anos.forEach(function(ano) {
    var meses = porAno[ano];
    var anoInvalidas = meses.filter(function(m){ return m && m.status === 'invalida'; }).length;
    var anoVazias = meses.filter(function(m){ return !m || m.status === 'vazia'; }).length;

    html += '<div class="p3-hist-ano">'
      + '  <span class="p3-hist-ano-label">' + ano + '</span>'
      + '  <div class="p3-hist-meses">';
    meses.forEach(function(m, idx) {
      var status = m ? m.status : 'vazia';
      var valor = '';
      if (m && m.contribs && m.contribs[0] && m.contribs[0].valor) {
        valor = '\nR$ ' + m.contribs[0].valor;
      }
      var tt = MESES_LABEL[idx] + '/' + ano + ' — ' + (
        status === 'valida' ? 'contribuição válida' :
        status === 'invalida' ? 'INVÁLIDA (abaixo do SM)' :
        status === 'concomitante' ? 'múltiplas contribuições' :
        'sem contribuição'
      ) + valor;
      html += '<div class="p3-hist-mes ' + status + '" title="' + _esc(tt) + '">' + MESES_LABEL[idx] + '</div>';
    });
    html += '</div>';

    if (anoInvalidas >= 3 || anoVazias >= 10) {
      var nota = '';
      if (anoVazias >= 10) nota = '⚠ ano praticamente sem contribuições';
      else if (anoInvalidas >= 3) nota = '⚠ ' + anoInvalidas + ' competências abaixo do SM';
      html += '<div class="p3-hist-ano-nota">' + nota + '</div>';
    }

    html += '</div>';
  });

  html += '<div class="p3-hist-legenda">'
    + '  <div class="p3-hist-legenda-item"><span class="p3-hist-legenda-box" style="background:rgba(34,201,122,.55);"></span>Contribuição válida</div>'
    + '  <div class="p3-hist-legenda-item"><span class="p3-hist-legenda-box" style="background:rgba(224,82,82,.5);"></span>Abaixo do SM</div>'
    + '  <div class="p3-hist-legenda-item"><span class="p3-hist-legenda-box" style="background:rgba(201,168,76,.6);"></span>Concomitante</div>'
    + '  <div class="p3-hist-legenda-item"><span class="p3-hist-legenda-box" style="background:rgba(255,255,255,.04);border:1px solid var(--border);"></span>Sem contribuição</div>'
    + '</div>';

  return html;
}

// ─── Renderiza pendências com detalhes ────────────────
function _renderPendenciasDetalhadas(ctx) {
  var cnis = ctx.cnisOriginal;
  if (!cnis || !cnis._contribuicoesDetalhadas) {
    return '<div style="color:var(--muted2);font-size:13px;padding:20px;text-align:center;">Sem CNIS com contribuições detalhadas.</div>';
  }

  var html = '';
  var contribs = cnis._contribuicoesDetalhadas;

  // 1. Competências inválidas (PSC-MEN-SM) COM DETALHES
  var invalidas = contribs.filter(function(c) {
    return (c.indicadores || []).some(function(i) { return /PSC-MEN-SM/.test(i); });
  });
  if (invalidas.length > 0) {
    html += '<div class="p3-pend grave">'
      + '  <div class="p3-pend-head">'
      + '    <span style="font-size:18px;">⚠</span>'
      + '    <div class="p3-pend-titulo">' + invalidas.length + ' competência' + (invalidas.length !== 1 ? 's' : '') + ' abaixo do salário mínimo</div>'
      + '  </div>'
      + '  <div class="p3-pend-desc">'
      +      (_estado.modo === 'tecnica'
            ? 'Essas contribuições possuem indicador PSC-MEN-SM-EC103. Por força do §14 do Art. 29 da Lei 8.213/91 (incluído pela EC 103/2019), não contam para carência.'
            : 'Essas contribuições foram feitas com valor abaixo do salário mínimo. Pela Reforma da Previdência, <strong>não valem para contar tempo de aposentadoria</strong>.')
      + '  </div>'
      + '  <table class="p3-pend-tabela">'
      + '    <thead><tr><th>Competência</th><th>Valor</th><th>Indicadores</th></tr></thead>'
      + '    <tbody>';
    invalidas.slice(0, 20).forEach(function(c) {
      var inds = (c.indicadores || []).filter(function(i) { return /PSC-MEN-SM/.test(i); }).join(', ');
      html += '<tr>'
        + '<td style="font-family:var(--mono);">' + _esc(c.comp) + '</td>'
        + '<td>R$ ' + _esc(c.valor || '—') + '</td>'
        + '<td style="font-family:var(--mono);font-size:10px;">' + _esc(inds) + '</td>'
        + '</tr>';
    });
    html += '</tbody></table>';
    if (invalidas.length > 20) {
      html += '<div style="font-size:10px;color:var(--muted);margin-top:6px;">+ ' + (invalidas.length - 20) + ' competências adicionais não exibidas</div>';
    }
    html += '<div class="p3-pend-acao">'
      + '<strong>O que fazer:</strong> '
      + (_estado.modo === 'tecnica'
          ? 'Orientar o segurado a complementar essas contribuições até o valor do SM da competência (com juros Selic), via GPS código 1150. Após quitação, solicitar no INSS o "Retorno de Competência" para que passem a contar para carência.'
          : 'O cliente pode pagar a diferença dessas contribuições para elas passarem a valer. Use a Guia da Previdência Social (GPS) com código 1150.')
      + '</div>'
      + '</div>';
  }

  // 2. Gaps longos (sem contribuição ≥ 12 meses)
  var analise = AP.analisarContribuicoes ? AP.analisarContribuicoes(ctx) : null;
  if (analise && analise.gaps) {
    var gapsLongos = analise.gaps.filter(function(g) { return g.meses >= 12; });
    if (gapsLongos.length > 0) {
      html += '<div class="p3-pend atencao">'
        + '  <div class="p3-pend-head">'
        + '    <span style="font-size:18px;">📉</span>'
        + '    <div class="p3-pend-titulo">' + gapsLongos.length + ' período' + (gapsLongos.length !== 1 ? 's' : '') + ' longo' + (gapsLongos.length !== 1 ? 's' : '') + ' sem contribuição (≥ 1 ano)</div>'
        + '  </div>'
        + '  <div class="p3-pend-desc">'
        +   (_estado.modo === 'tecnica'
              ? 'Intervalos grandes no CNIS podem indicar atividade informal, rural ou exterior não averbada.'
              : 'Períodos em que você ficou sem contribuir. Pode ter trabalhado de forma informal ou em atividade rural.')
        + '  </div>'
        + '  <table class="p3-pend-tabela">'
        + '    <thead><tr><th>De</th><th>Até</th><th>Duração</th></tr></thead>'
        + '    <tbody>';
      gapsLongos.forEach(function(g) {
        html += '<tr>'
          + '<td style="font-family:var(--mono);">' + _fmtData(g.inicio) + '</td>'
          + '<td style="font-family:var(--mono);">' + _fmtData(g.fim) + '</td>'
          + '<td>' + _fmtDuracaoLonga(g.meses) + '</td>'
          + '</tr>';
      });
      html += '</tbody></table>'
        + '<div class="p3-pend-acao">'
        + '<strong>O que fazer:</strong> '
        + 'verificar se há documentos do período (CAEPF, RGP, declaração sindical, DAP, contrato de trabalho informal) que permitam averbação retroativa.'
        + '</div>'
        + '</div>';
    }
  }

  // 3. Vínculos em aberto
  var vinculosAtivos = (cnis._vinculos || []).filter(function(v) {
    return !v.fim || /aberto|atual|vigente/i.test(v.fim);
  });
  if (vinculosAtivos.length > 0) {
    html += '<div class="p3-pend info">'
      + '  <div class="p3-pend-head">'
      + '    <span style="font-size:18px;">🔵</span>'
      + '    <div class="p3-pend-titulo">' + vinculosAtivos.length + ' vínculo' + (vinculosAtivos.length !== 1 ? 's' : '') + ' em aberto</div>'
      + '  </div>'
      + '  <div class="p3-pend-desc">'
      +   'Confirmar se ainda estão ativos com o cliente.'
      + '  </div>'
      + '  <table class="p3-pend-tabela">'
      + '    <thead><tr><th>Empresa</th><th>Início</th><th>Tipo</th></tr></thead>'
      + '    <tbody>';
    vinculosAtivos.forEach(function(v) {
      html += '<tr>'
        + '<td>' + _esc((v.empresa || '—').substring(0, 40)) + '</td>'
        + '<td style="font-family:var(--mono);">' + _esc(v.inicio || '—') + '</td>'
        + '<td style="font-size:10px;">' + _esc(v.tipo || '—') + '</td>'
        + '</tr>';
    });
    html += '</tbody></table></div>';
  }

  if (!html) {
    html = '<div style="padding:24px;text-align:center;color:var(--green);">'
      + '<div style="font-size:28px;margin-bottom:8px;">✓</div>'
      + '<div style="font-size:14px;">Nenhuma pendência crítica identificada</div>'
      + '</div>';
  }

  return html;
}

// ─── Handlers globais ────────────────────────────────
window._apPlanModoSet = function(modo) {
  _estado.modo = modo;
  window.renderPlanejamento();
};
window._apPlanDerChange = function(v) {
  var d = _parseDataISO(v);
  if (d) { _estado.der = d; window.renderPlanejamento(); }
};
window._apPlanDerHoje = function() {
  _estado.der = null; // null = usa hoje
  window.renderPlanejamento();
};
window._apPlanDerProjetar = function() {
  var hoje = new Date();
  var futuro = new Date(hoje);
  futuro.setFullYear(futuro.getFullYear() + 2);
  _estado.der = futuro;
  window.renderPlanejamento();
};
// Recua N meses a partir da DER atual (ou hoje se não tem)
window._apPlanDerRecuar = function(meses) {
  var base = _estado.der || new Date();
  var novo = new Date(base);
  novo.setMonth(novo.getMonth() - parseInt(meses));
  _estado.der = novo;
  window.renderPlanejamento();
};
// Avança N meses
window._apPlanDerAvancar = function(meses) {
  var base = _estado.der || new Date();
  var novo = new Date(base);
  novo.setMonth(novo.getMonth() + parseInt(meses));
  _estado.der = novo;
  window.renderPlanejamento();
};
window._apPlanToggleSecao = function(id) {
  _estado.secaoAberta = (_estado.secaoAberta === id) ? null : id;
  // Toggle classes direto para não re-renderizar tudo
  document.querySelectorAll('.p3-secao').forEach(function(s) {
    var sid = s.dataset.secaoId;
    s.classList.toggle('aberta', sid === _estado.secaoAberta);
  });
};
// Toggle de desemprego comprovado — estende graça em 12m
window._apPlanToggleDesemprego = function(ativo) {
  window._apEstadoDesemprego = !!ativo;
  window.renderPlanejamento();
};
window._apPlanToggleDetalhe = function(idx) {
  var el = document.getElementById('p3-det-' + idx);
  if (el) el.classList.toggle('aberto');
};

// ─── RENDER PRINCIPAL ────────────────────────────────
window.renderPlanejamento = function() {
  var root = document.getElementById('tab-planejamento');
  if (!root) return;

  // Verifica se tem CNIS
  var todos = typeof _todosDocumentosDados !== 'undefined' ? _todosDocumentosDados : [];
  var temCnis = (todos || []).some(function(d) {
    return d && (d._tipoDetectado === 'cnis' || /cnis|extrato/i.test(d.tipoDocumento || ''));
  });
  var dadosAtual = typeof dadosExtraidos !== 'undefined' ? dadosExtraidos : {};
  if (!temCnis && dadosAtual._vinculos) temCnis = true;

  if (!temCnis) {
    root.innerHTML = ''
      + '<div class="p3-empty">'
      + '  <div class="p3-empty-icon">📊</div>'
      + '  <div class="p3-empty-titulo">Planejamento Previdenciário</div>'
      + '  <div class="p3-empty-desc">Arraste o CNIS do cliente na área acima (ou clique para selecionar) para começar a análise.</div>'
      + '</div>';
    return;
  }

  // Monta contexto
  var ctx = _montarContexto(_estado.der);

  // Calcula qualidade
  var qualidade = AP.calcularQualidadeSegurado ? AP.calcularQualidadeSegurado(ctx) : { status: 'indefinido', desc: '' };

  // Analisa todas as regras
  var resultados = _analisarTodasRegras(ctx);

  // Ranking
  var ranking = AP.rankearRegras ? AP.rankearRegras(resultados, ctx) : null;
  var melhor = ranking ? ranking.melhor : null;

  // Stats para resumos das seções (exibidos mesmo recolhidas)
  var qtdAplicaveis = resultados.filter(function(r) { return r.aplicavel; }).length;
  var qtdComDireito = resultados.filter(function(r) { return r.aplicavel && r.temDireito; }).length;

  var pendCount = 0;
  if (ctx.cnisOriginal._contribuicoesDetalhadas) {
    pendCount += ctx.cnisOriginal._contribuicoesDetalhadas.filter(function(c) {
      return (c.indicadores || []).some(function(i) { return /PSC-MEN-SM/.test(i); });
    }).length;
  }
  var analise = AP.analisarContribuicoes ? AP.analisarContribuicoes(ctx) : null;
  var gapsCount = analise && analise.gaps ? analise.gaps.filter(function(g){ return g.meses >= 12; }).length : 0;

  // Monta HTML
  var html = ''
    + _renderCabecalho(ctx)
    + _renderDer(ctx)
    + _renderStatus(ctx, qualidade, resultados)
    + _renderMelhor(ctx, melhor, ranking ? ranking.recomendacao : '');

  // Seção: todos os benefícios (recolhida por padrão)
  var listaResumo = qtdComDireito + ' de ' + qtdAplicaveis + ' disponível' + (qtdComDireito !== 1 ? 'eis' : '');
  html += _renderSecao('beneficios', '📋', 'Todos os benefícios', listaResumo,
    _renderListaBeneficios(ctx, resultados, melhor ? melhor.nome : null),
    false);

  // Seção: pendências (recolhida)
  var pendResumo = pendCount + gapsCount > 0
    ? (pendCount > 0 ? pendCount + ' abaixo do SM' : '') + (gapsCount > 0 ? (pendCount > 0 ? ' · ' : '') + gapsCount + ' gap' + (gapsCount > 1 ? 's' : '') : '')
    : 'sem pendências';
  html += _renderSecao('pendencias', '🔍', 'Pendências no CNIS', pendResumo,
    _renderPendenciasDetalhadas(ctx), false);

  // Seção: histórico contributivo (recolhida)
  var histResumo = analise ? analise.mesesComContrib + ' de ' + analise.totalMeses + ' meses' : 'sem dados';
  html += _renderSecao('historico', '📊', 'Histórico contributivo', histResumo,
    _renderHistoricoAnual(ctx), false);

  // Nota metodológica
  html += '<div style="margin-top:20px;padding:12px 16px;background:rgba(61,127,255,.05);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;font-size:11px;color:var(--muted2);line-height:1.6;">'
    + (_estado.modo === 'tecnica'
        ? '<strong style="color:var(--blue);">Nota metodológica:</strong> cálculos baseados apenas em dados do CNIS. Não inclui tempo especial (insalubridade/periculosidade), tempo rural não averbado, militar ou público sem averbação. Fator previdenciário estimado pela tabela IBGE simplificada. Sempre confirmar com simulação oficial no Meu INSS.'
        : '<strong style="color:var(--blue);">Aviso:</strong> esses cálculos são uma estimativa baseada no CNIS. Para valores exatos e confirmação final, seu advogado deve verificar no Meu INSS.')
    + '</div>';

  root.innerHTML = html;
};

console.log('[A&P Planejamento v3] ✅ Nova interface carregada');

<script>
'use strict';
(function() {

// ─── Processa CNIS PDF ───
async function _processarCNIS(file) {
  toast('📄 Lendo CNIS...');
  try {
    const texto = await lerPDFSimples(file);
    if (!texto || texto.length < 100) {
      toast('⚠ Não consegui ler texto do PDF. Use um CNIS digital.');
      return;
    }
    // Detecção de tipo — se falhar por qualquer motivo, assume CNIS e segue
    let tipo = 'cnis';
    try {
      tipo = detectarTipoDoc(texto, file.name);
    } catch (e) {
      console.warn('[A&P] detectarTipoDoc falhou, assumindo CNIS:', e);
    }
    if (tipo !== 'cnis') {
      toast('⚠ Arquivo não parece ser um CNIS. Detectado: ' + tipo + ' (tentando extrair mesmo assim)');
    }
    const dados = extrairCNIS(texto);
    dados._tipoDetectado = 'cnis';
    dados.tipoDocumento = 'CNIS';

    // Popula globais
    dadosExtraidos = Object.assign({}, dados);
    _todosDocumentosDados = [dados];

    // Feedback
    const valid = dados._totalContribuicoesValidas || 0;
    const vincs = (dados._vinculos || []).length;
    if (vincs === 0 && valid === 0) {
      toast('⚠ Nenhum vínculo/contribuição encontrado. O PDF pode ser escaneado ou de formato não-padrão.');
    } else {
      toast('✓ CNIS lido: ' + vincs + ' vínculos, ' + valid + ' contribuições válidas (' + Math.floor(valid/12) + 'a ' + (valid%12) + 'm)');
    }
    _atualizarStatusBadge();

    // Renderiza planejamento
    if (typeof window.renderPlanejamento === 'function') {
      setTimeout(window.renderPlanejamento, 100);
    }
  } catch(e) {
    console.error('[A&P] erro ao processar CNIS:', e);
    toast('✗ Erro ao ler PDF: ' + (e && e.message ? e.message : String(e)));
  }
}

// ─── Importa JSON do A&P Análise ───
window._importarJSON = function(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const pacote = JSON.parse(e.target.result);
      if (!pacote.cnis || !pacote.segurado) {
        toast('⚠ JSON inválido. Use um arquivo exportado pelo A&P Análise.');
        return;
      }
      // Monta dadosExtraidos como se viesse do extrator
      dadosExtraidos = Object.assign({}, pacote.segurado, pacote.cnis);
      dadosExtraidos._tipoDetectado = 'cnis';
      dadosExtraidos.tipoDocumento = 'CNIS';
      _todosDocumentosDados = [dadosExtraidos];

      toast('✓ Dados importados: ' + (pacote.segurado.nomeCliente || '?'));
      _atualizarStatusBadge();
      if (typeof window.renderPlanejamento === 'function') {
        setTimeout(window.renderPlanejamento, 100);
      }
    } catch(err) {
      toast('✗ Erro ao importar: ' + err.message);
    }
  };
  reader.readAsText(file);
};

// ─── Exportar dados atuais ───
window._exportarDados = function() {
  if (!dadosExtraidos || !dadosExtraidos._contribuicoesDetalhadas) {
    toast('⚠ Sem dados para exportar. Anexe um CNIS primeiro.');
    return;
  }
  const pacote = {
    _formato: 'ap-planejamento-v1',
    _geradoEm: new Date().toISOString(),
    _origem: 'A&P Planejamento',
    segurado: {
      nomeCliente: dadosExtraidos.nomeCliente || '',
      cpfCnpj: dadosExtraidos.cpfCnpj || '',
      dataNascimento: dadosExtraidos.dataNascimento || '',
      nomeMae: dadosExtraidos._nomeMae || '',
      nit: dadosExtraidos._nit || '',
    },
    cnis: {
      _vinculos: dadosExtraidos._vinculos || [],
      _contribuicoes: dadosExtraidos._contribuicoes || [],
      _contribuicoesDetalhadas: dadosExtraidos._contribuicoesDetalhadas || [],
      _totalContribuicoes: dadosExtraidos._totalContribuicoes || 0,
      _totalContribuicoesValidas: dadosExtraidos._totalContribuicoesValidas || 0,
      _contribuicoesInvalidas: dadosExtraidos._contribuicoesInvalidas || 0,
      _ultimaContribuicaoValida: dadosExtraidos._ultimaContribuicaoValida || '',
      _temVinculoAberto: dadosExtraidos._temVinculoAberto || false,
      tipoAtividade: dadosExtraidos.tipoAtividade || '',
    },
  };
  const nome = (pacote.segurado.nomeCliente || 'cliente').replace(/\s+/g,'_').substring(0,30);
  const blob = new Blob([JSON.stringify(pacote, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'plan_' + nome + '_' + Date.now() + '.json';
  a.click();
  toast('✓ Dados exportados');
};

// ─── Limpar ───
window._limparDados = function() {
  if (!confirm('Limpar dados atuais?')) return;
  dadosExtraidos = {};
  _todosDocumentosDados = [];
  _atualizarStatusBadge();
  if (typeof window.renderPlanejamento === 'function') window.renderPlanejamento();
  toast('✓ Dados limpos');
};

// ─── Handlers upload ───
window._handleFile = function(file) {
  if (!file) {
    toast('⚠ Nenhum arquivo selecionado');
    return;
  }
  console.log('[A&P] arquivo selecionado:', file.name, 'tipo:', file.type, 'tamanho:', file.size);
  var nome = (file.name || '').toLowerCase();
  // Aceita .pdf, .json independente do case. Também aceita tipo MIME como fallback.
  if (nome.endsWith('.json') || file.type === 'application/json') {
    window._importarJSON(file);
  } else if (nome.endsWith('.pdf') || file.type === 'application/pdf') {
    _processarCNIS(file);
  } else {
    toast('⚠ Formato não reconhecido. Use PDF (CNIS) ou JSON. Arquivo: ' + file.name);
    console.warn('[A&P] arquivo rejeitado — nome:', file.name, 'tipo:', file.type);
  }
};

window._handleDrop = function(evt) {
  try { evt.preventDefault(); } catch(e) {}
  try {
    var dz = document.getElementById('dropzone');
    if (dz) dz.classList.remove('dragging');
  } catch(e) {}
  try {
    var file = evt.dataTransfer && evt.dataTransfer.files && evt.dataTransfer.files[0];
    if (file) {
      window._handleFile(file);
    } else {
      toast('⚠ Nenhum arquivo detectado no drop');
      console.warn('[A&P] drop sem arquivos. dataTransfer:', evt.dataTransfer);
    }
  } catch (e) {
    console.error('[A&P] erro no drop:', e);
    toast('✗ Erro no drop: ' + e.message);
  }
};

// ─── Atualiza badge de status no topo ───
function _atualizarStatusBadge() {
  const b = document.getElementById('status-badge');
  if (!b) return;
  if (dadosExtraidos && dadosExtraidos._totalContribuicoesValidas > 0) {
    const v = dadosExtraidos._totalContribuicoesValidas;
    b.className = 'status-badge ok';
    b.textContent = '✓ ' + Math.floor(v/12) + 'a ' + (v%12) + 'm · ' + v + ' carência';
  } else {
    b.className = 'status-badge';
    b.textContent = 'Aguardando CNIS';
  }
}

// Renderiza ao carregar (empty state do módulo v3)
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(function() {
    if (typeof window.renderPlanejamento === 'function') {
      window.renderPlanejamento();
    }
  }, 300);
});

})();
</script>
