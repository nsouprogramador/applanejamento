    mecanismo: 'Essa é a <strong>regra permanente da Reforma</strong> — para quem não se encaixa nas transições. Exige idade mínima (<strong>' + idadeMin + ' anos</strong>) + pelo menos <strong>15 anos de contribuição</strong>.',
    calculo: ''
      + 'Idade mínima: <span class="num">' + idadeMin + ' anos</span>\n'
      + 'Sua idade: <span class="num">' + Math.floor(idadeAnos) + ' anos</span>\n'
      + 'Carência mínima: <span class="num">15 anos (180 meses)</span>\n'
      + 'Sua carência: <span class="num">' + _fmtTempoCurto(ctx.carencia || 0) + '</span>',
    recomendacao: regra.temDireito
      ? { tipo: 'pos', texto: '<strong>Você atende à regra.</strong> Sem fator previdenciário.' }
      : { tipo: 'info', texto: 'Previsão: <em>' + (regra.dataDireito ? _fmtData(regra.dataDireito) : 'a calcular') + '</em>.' },
  };
}

// Utilitário: extrai "o que falta" dos passos da regra
function _extrairFaltas(passos) {
  if (!passos) return '';
  var faltas = [];
  passos.forEach(function(p) {
    if (/Falta/i.test(p.label) && p.valor && !/nada/i.test(p.valor)) {
      faltas.push(p.label.replace(/^Falta\s+/i, '') + ' ' + p.valor);
    }
  });
  return faltas.length ? faltas.join(', ') : 'requisitos pendentes';
}

// Roteador por nome de regra
function gerarExplicacao(regra, ctx, modo) {
  var nome = (regra.nome || '').toLowerCase();
  if (/direito\s+adquirido/.test(nome))     return _explicacaoDireitoAdquirido(regra, ctx, modo);
  if (/pedágio\s+50|pedagio\s+50/.test(nome)) return _explicacaoPedagio50(regra, ctx, modo);
  if (/pedágio\s+100|pedagio\s+100/.test(nome)) return _explicacaoPedagio100(regra, ctx, modo);
  if (/pontos/.test(nome))                  return _explicacaoPontos(regra, ctx, modo);
  if (/idade\s+progress/.test(nome))        return _explicacaoIdadeProgressiva(regra, ctx, modo);
  if (/regra\s+nova|idade\s+urbana/.test(nome)) return _explicacaoRegraNova(regra, ctx, modo);
  return null;
}

// Render do bloco didática
function _renderDidatica(regra, ctx, modo) {
  var exp = gerarExplicacao(regra, ctx, modo);
  if (!exp) return '';
  var html = '<div class="p3-didatica">';
  html += '<div class="p3-didatica-secao">'
    + '<div class="p3-didatica-titulo">' + (modo === 'tecnica' ? '⚖ Mecanismo jurídico' : '📘 Como funciona') + '</div>'
    + '<div class="p3-didatica-corpo">' + exp.mecanismo + '</div>'
    + '</div>';
  if (exp.calculo) {
    html += '<div class="p3-didatica-secao">'
      + '<div class="p3-didatica-titulo">🧮 Aplicado ao seu caso</div>'
      + '<div class="p3-didatica-calculo">' + exp.calculo + '</div>'
      + '</div>';
  }
  if (exp.recomendacao) {
    html += '<div class="p3-didatica-secao">'
      + '<div class="p3-didatica-titulo">💡 Recomendação</div>'
      + '<div class="p3-didatica-recomend ' + exp.recomendacao.tipo + '">' + exp.recomendacao.texto + '</div>'
      + '</div>';
  }
  html += '</div>';
  return html;
}

// ──────────────────────────────────────────────────────────
// CARD "ENTENDENDO SUA SITUAÇÃO"
// ──────────────────────────────────────────────────────────

function _renderSituacao(ctx, melhor, resultados, modo) {
  var idadeAnos = Math.floor(ctx.idadeAtualMeses / 12);
  var tempoStr = _fmtTempoCurto(ctx.tempoContribMeses);
  var sexoStr = ctx.sexo === 'feminino' ? 'mulher' : 'homem';
  var elegiveis = resultados.filter(function(r){ return r.aplicavel && r.temDireito; }).length;
  var futuros  = resultados.filter(function(r){ return r.aplicavel && !r.temDireito && r.dataDireito; }).length;
  var primeiroNome = ctx.primeiroNome || 'O segurado';

  var conteudo;

  if (modo === 'tecnica') {
    var paragrafos = [];
    paragrafos.push('<p><strong>Perfil:</strong> ' + _esc(ctx.nomeCliente) + ', ' + sexoStr + ', ' + idadeAnos
      + ' anos na DER, ' + tempoStr + ' de tempo de contribuição (' + (ctx.carencia || 0)
      + ' carência válida).</p>');

    if (ctx.temContribAnterior2019) {
      paragrafos.push('<p><strong>Cenário jurídico:</strong> segurado <em>pré-EC 103/2019</em> '
        + '(contribuição inicial antes de 13/11/2019, com ' + _fmtTempo(ctx.tempoContrib2019)
        + ' acumulados na data do corte). '
        + 'Elegível às regras de transição dos <strong>arts. 15, 16, 17 e 20 da EC 103/19</strong>, '
        + 'além da regra permanente (art. 19) e do direito adquirido (art. 3º), '
        + 'quando for o caso.</p>');
    } else {
      paragrafos.push('<p><strong>Cenário jurídico:</strong> segurado <em>pós-EC 103/2019</em> '
        + '(sem contribuições anteriores a 13/11/2019). '
        + '<strong>Regras de transição não aplicáveis.</strong> '
        + 'Elegível apenas à regra permanente do <strong>art. 19 da EC 103/19</strong> '
        + '(idade + carência).</p>');
    }

    if (melhor) {
      if (melhor.temDireito) {
        paragrafos.push('<p><strong>Melhor caminho identificado:</strong> <em>' + _esc(melhor.nome)
          + '</em>. ' + (melhor.fatorAplica
            ? 'ATENÇÃO: regra aplica fator previdenciário — avaliar custo-benefício frente a outras opções sem fator.'
            : 'Regra sem fator previdenciário, RMI calculada sobre coeficiente da EC 103 (60% + 2%/ano após o mínimo).')
          + '</p>');
      } else {
        paragrafos.push('<p><strong>Situação na DER:</strong> nenhuma regra programável implementada. '
          + 'Regra mais próxima: <em>' + _esc(melhor.nome) + '</em>, previsão '
          + (melhor.dataDireito ? _fmtData(melhor.dataDireito) : 'a calcular') + '. '
          + 'Considerar complementação de alíquotas ou contribuições futuras para antecipar.</p>');
      }
    }

    paragrafos.push('<p><strong>Mapa de elegibilidade:</strong> ' + elegiveis + ' regra(s) com direito hoje, '
      + futuros + ' regra(s) com projeção futura. '
      + 'Detalhes por regra na seção abaixo.</p>');

    conteudo = paragrafos.join('');
  } else {
    // CLIENTE
    var partes = [];
    partes.push('<p>Olá, <strong>' + _esc(primeiroNome) + '</strong>. Vamos entender onde você está:</p>');
    partes.push('<p>Você tem <strong>' + idadeAnos + ' anos</strong> e já contribuiu para o INSS por <strong>'
      + tempoStr + '</strong>. Isso significa '
      + (ctx.carencia >= 180 ? 'que você tem a carência mínima para algumas aposentadorias (15 anos).'
        : 'que você ainda precisa de mais ' + (180 - ctx.carencia) + ' contribuições para atingir os 15 anos mínimos.') + '</p>');

    if (ctx.temContribAnterior2019) {
      partes.push('<p>Como você <strong>já contribuía antes da Reforma da Previdência de 2019</strong>, '
        + 'você pode escolher entre <em>regras de transição</em> — feitas especificamente para pessoas '
        + 'como você não serem "apanhadas de surpresa" pelas novas exigências.</p>');
    } else {
      partes.push('<p>Você começou a contribuir <strong>depois da Reforma da Previdência de 2019</strong>. '
        + 'Isso significa que você segue a regra permanente: precisa atingir a idade mínima '
        + '(' + (ctx.sexo === 'feminino' ? '62 anos para mulheres' : '65 anos para homens') + ') '
        + 'e pelo menos 15 anos de contribuição.</p>');
    }

    if (melhor && melhor.temDireito) {
      partes.push('<p>A boa notícia: <strong>você já tem direito a se aposentar hoje</strong> pela regra <em>'
        + _esc(melhor.nome) + '</em>. '
        + (melhor.fatorAplica
          ? 'ATENÇÃO: essa regra pode reduzir o valor do seu benefício em ~25-30%. Veja abaixo as outras opções — pode valer a pena esperar.'
          : 'Essa regra paga o valor cheio (sem redução).')
        + '</p>');
    } else if (melhor && melhor.dataDireito) {
      partes.push('<p>A regra mais próxima para você é <em>' + _esc(melhor.nome)
        + '</em>, com previsão para <strong>' + _fmtData(melhor.dataDireito) + '</strong>. '
        + 'Até lá, continue contribuindo.</p>');
    }

    conteudo = partes.join('');
  }

  // Grid de stats
  var gridHtml = ''
    + '<div class="p3-situacao-grid">'
    + '  <div class="p3-situacao-grid-item"><div class="p3-situacao-grid-label">Idade</div><div class="p3-situacao-grid-valor">' + idadeAnos + ' anos</div></div>'
    + '  <div class="p3-situacao-grid-item"><div class="p3-situacao-grid-label">Tempo contrib.</div><div class="p3-situacao-grid-valor">' + tempoStr + '</div></div>'
    + '  <div class="p3-situacao-grid-item"><div class="p3-situacao-grid-label">Carência</div><div class="p3-situacao-grid-valor">' + (ctx.carencia || 0) + ' meses</div></div>'
    + '  <div class="p3-situacao-grid-item"><div class="p3-situacao-grid-label">Elegíveis hoje</div><div class="p3-situacao-grid-valor">' + elegiveis + '</div></div>'
    + '</div>';

  return ''
    + '<div class="p3-situacao">'
    + '  <div class="p3-situacao-tag">' + (modo === 'tecnica' ? 'ANÁLISE TÉCNICA' : 'ENTENDENDO SUA SITUAÇÃO') + '</div>'
    + '  <div class="p3-situacao-titulo">' + (modo === 'tecnica' ? 'Síntese do enquadramento jurídico' : 'Onde você está hoje') + '</div>'
    + gridHtml
    + '  <div class="p3-situacao-texto">' + conteudo + '</div>'
    + '</div>';
}

// ──────────────────────────────────────────────────────────
// RECOMPUTA REGRAS (mesma lógica dos outros módulos)
// ──────────────────────────────────────────────────────────

function _recomputarRegras(ctx) {
  var AP = window.AP_Plan || {};
  var res = [];
  if (AP.calcDireitoAdquirido) res.push(AP.calcDireitoAdquirido(ctx));
  if (AP.calcPedagio100)       res.push(AP.calcPedagio100(ctx));
  if (AP.calcPedagio50)        res.push(AP.calcPedagio50(ctx));
  if (AP.calcPontos)           res.push(AP.calcPontos(ctx));
  if (AP.calcIdadeProgressiva) res.push(AP.calcIdadeProgressiva(ctx));
  if (AP.calcRegraNova)        res.push(AP.calcRegraNova(ctx));
  return res;
}

function _identificarMelhor(resultados) {
  var aplic = resultados.filter(function(r){ return r.aplicavel; });
  if (!aplic.length) return null;
  aplic.sort(function(a, b) {
    if (a.nome === 'Direito Adquirido' && a.temDireito) return -1;
    if (b.nome === 'Direito Adquirido' && b.temDireito) return 1;
    if (a.temDireito && b.temDireito) {
      if (a.fatorAplica !== b.fatorAplica) return a.fatorAplica ? 1 : -1;
      return 0;
    }
    if (a.temDireito) return -1;
    if (b.temDireito) return 1;
    if (a.dataDireito && b.dataDireito) return a.dataDireito - b.dataDireito;
    if (a.dataDireito) return -1;
    if (b.dataDireito) return 1;
    return 0;
  });
  return aplic[0];
}

// ──────────────────────────────────────────────────────────
// INJEÇÃO DOM
// ──────────────────────────────────────────────────────────

function _injetar() {
  var ctx = _obterCtx();
  if (!ctx._temCnis) return;
  var AP = window.AP_Plan || {};
  if (!AP.calcPedagio50) return;

  var modo = _modo();
  var resultados = _recomputarRegras(ctx);
  var melhor = _identificarMelhor(resultados);

  // 1) Card "Entendendo sua situação" — logo após .p3-melhor
  var melhorCard = document.querySelector('.p3-melhor');
  if (melhorCard) {
    // Remove versão anterior (se houver — ex: toggle técnica/cliente mudou)
    var antigo = document.querySelector('.p3-situacao');
    if (antigo) antigo.remove();
    var html = _renderSituacao(ctx, melhor, resultados, modo);
    melhorCard.insertAdjacentHTML('afterend', html);
  }

  // 2) Bloco Didática dentro de cada .p3-beneficio-detalhe
  var linhas = document.querySelectorAll('.p3-beneficio-linha');
  linhas.forEach(function(linha) {
    var nomeEl = linha.querySelector('.p3-beneficio-nome');
    if (!nomeEl) return;
    var nome = nomeEl.textContent.trim();
    var regra = resultados.find(function(x){ return x.nome === nome; });
    if (!regra) return;

    var detalhe = linha.nextElementSibling;
    if (!detalhe || !detalhe.classList.contains('p3-beneficio-detalhe')) return;

    // Remove versão anterior (para suportar toggle modo)
    var didAntigo = detalhe.querySelector('.p3-didatica');
    if (didAntigo) didAntigo.remove();

    var didHtml = _renderDidatica(regra, ctx, modo);
    if (didHtml) {
      // Insere ANTES do bloco RMI (se houver), senão no final
      var rmiDet = detalhe.querySelector('.p3-rmi-detalhe');
      if (rmiDet) {
        rmiDet.insertAdjacentHTML('beforebegin', didHtml);
      } else {
        detalhe.insertAdjacentHTML('beforeend', didHtml);
      }
    }
  });
}

// Expõe
window.AP_Plan = window.AP_Plan || {};
window.AP_Plan.gerarExplicacaoRegra = gerarExplicacao;

// Hook: roda depois de TODOS os outros módulos
var _renderPrev = window.renderPlanejamento;
window.renderPlanejamento = function() {
  if (typeof _renderPrev === 'function') {
    try { _renderPrev.apply(this, arguments); } catch(e) {}
  }
  setTimeout(_injetar, 160); // maior delay que Complementações
};

setTimeout(function() {
  if (typeof window.renderPlanejamento === 'function') _injetar();
}, 1100);

console.log('[A&P Plan] Módulo Didáticas v1 carregado');

})();
</script>

  .p3-contrib-empresa.avulsa { color: #888 !important; }

}
</style>

<script>
(function() {
'use strict';

if (window._apContribMgrInstalled) return;
window._apContribMgrInstalled = true;

var PAG_SIZE = 50;
var INDICADORES_TIPOS = [
  { key: 'IREC-MEI',         label: 'IREC-MEI (5%)',       css: 'mei',   desc: 'MEI' },
  { key: 'IREC-LC123',       label: 'IREC-LC123 (11%)',    css: 'lc123', desc: 'LC 123' },
  { key: 'IREC-LIM-SM',      label: 'IREC-LIM-SM',         css: 'lim',   desc: 'Limit. SM' },
  { key: 'PSC-MEN-SM-EC103', label: 'PSC-MEN-SM (< SM)',   css: 'psc',   desc: '< SM (inv.)' },
  { key: 'PREC-MENOR-MIN',   label: 'PREC-MENOR-MIN',      css: 'prec',  desc: '< mínimo' },
  { key: 'BENEF',            label: 'BENEF (período INSS)',css: 'benef', desc: 'Benefício' },
];

// Estado (ficam no window p/ handlers inline conseguirem acessar)
window._apContribFiltro  = { ano: '', busca: '', status: 'todas' };
window._apContribPagina  = 1;
window._apContribEditando = null; // null | { comp, valor, indicadores, _origem, _isNew }
window._apContribParaExcluir = null;

// ──────────────────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────────────────

function _esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}
function _indicadoresStr(c) {
  var i = c.indicadores;
  if (typeof i === 'string') return i;
  if (Array.isArray(i)) return i.join(' ');
  return '';
}
function _indicadoresArr(c) {
  var s = _indicadoresStr(c);
  return s.trim() ? s.trim().split(/\s+/).filter(Boolean) : [];
}
function _fmtMoeda(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return 'R$ ' + Number(v).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d)\,)/g, '.');
}
function _ehInvalida(c) {
  var s = _indicadoresStr(c);
  return /PSC-MEN-SM|PREC-MENOR-MIN/.test(s);
}
function _compValida(str) {
  // MM/AAAA
  var m = (str || '').match(/^(\d{2})\/(\d{4})$/);
  if (!m) return null;
  var mes = parseInt(m[1]), ano = parseInt(m[2]);
  if (mes < 1 || mes > 12) return null;
  if (ano < 1970 || ano > 2050) return null;
  return { mes: mes, ano: ano, str: m[1] + '/' + m[2] };
}

// Retorna o vínculo a que pertence uma competência (ou null)
function _vinculoDaComp(compStr) {
  var cnis = _obterCnis();
  if (!cnis || !cnis._vinculos) return null;
  var parts = (compStr || '').split('/');
  if (parts.length !== 2) return null;
  var compData = new Date(parseInt(parts[1]), parseInt(parts[0]) - 1, 15);
  function paraData(s) {
    if (!s) return null;
    var p = (s || '').split('/');
    if (p.length !== 3) return null;
    return new Date(parseInt(p[2]), parseInt(p[1]) - 1, parseInt(p[0]));
  }
  // Procura o PRIMEIRO vínculo em que a competência cai
  for (var i = 0; i < cnis._vinculos.length; i++) {
    var v = cnis._vinculos[i];
    var ini = paraData(v.inicio);
    var fim = v.fim ? paraData(v.fim) : new Date(2099, 11, 31);
    if (ini && compData >= ini && compData <= fim) return v;
  }
  return null;
}

function _empresaResumo(empresa) {
  if (!empresa) return '—';
  var s = String(empresa).trim();
  // Limpa sufixos comuns
  s = s.replace(/\s+(LTDA|S\.?A\.?|S\/A|ME|EPP|EIRELI|MEI)\s*\.?\s*$/i, '').trim();
  return s;
}

function _obterCnis() {
  var todos = window._todosDocumentosDados || [];
  return todos.find(function(d) {
    return d && (d._tipoDetectado === 'cnis' || /cnis|extrato/i.test(d.tipoDocumento || ''));
  });
}

// ──────────────────────────────────────────────────────────
// RECÁLCULO EM CASCATA (dispara renderPlanejamento)
// ──────────────────────────────────────────────────────────

function _recomputarTotais() {
  var cnis = _obterCnis();
  if (!cnis || !cnis._contribuicoesDetalhadas) return;

  // Ordena por data
  cnis._contribuicoesDetalhadas.sort(function(a, b) {
    var pa = a.comp.split('/'), pb = b.comp.split('/');
    return (parseInt(pa[1]) * 12 + parseInt(pa[0])) - (parseInt(pb[1]) * 12 + parseInt(pb[0]));
  });
  cnis._contribuicoes = cnis._contribuicoesDetalhadas.map(function(c) { return c.comp; });

  // Totais
  var validas = cnis._contribuicoesDetalhadas.filter(function(c) { return !_ehInvalida(c); });
  cnis._totalContribuicoes = cnis._contribuicoesDetalhadas.length;
  cnis._totalContribuicoesValidas = validas.length;
  cnis._contribuicoesInvalidas = cnis._contribuicoesDetalhadas.length - validas.length;

  // Sincroniza dadosExtraidos (ambos apontam para o mesmo array normalmente, mas garante)
  if (window.dadosExtraidos) {
    window.dadosExtraidos._contribuicoesDetalhadas = cnis._contribuicoesDetalhadas;
    window.dadosExtraidos._contribuicoes = cnis._contribuicoes;
    window.dadosExtraidos._totalContribuicoes = cnis._totalContribuicoes;
    window.dadosExtraidos._totalContribuicoesValidas = cnis._totalContribuicoesValidas;
    window.dadosExtraidos._contribuicoesInvalidas = cnis._contribuicoesInvalidas;
  }
}

function _dispararRender() {
  _recomputarTotais();
  if (typeof window._atualizarStatusBadge === 'function') {
    try { window._atualizarStatusBadge(); } catch(e) {}
  }
  if (typeof window.renderPlanejamento === 'function') {
    setTimeout(window.renderPlanejamento, 50);
  }
}

// ──────────────────────────────────────────────────────────
// RENDER TABELA
// ──────────────────────────────────────────────────────────

function _aplicarFiltros(contribs) {
  var f = window._apContribFiltro;
  return contribs.filter(function(c) {
    if (f.ano && !c.comp.endsWith('/' + f.ano)) return false;
    if (f.busca && c.comp.indexOf(f.busca) < 0) return false;
    if (f.status === 'validas' && _ehInvalida(c)) return false;
    if (f.status === 'invalidas' && !_ehInvalida(c)) return false;
    if (f.status === 'manuais' && c._origem !== 'manual') return false;
    return true;
  });
}

function _renderTabela() {
  var cnis = _obterCnis();
  if (!cnis || !cnis._contribuicoesDetalhadas) return '';
  var todas = cnis._contribuicoesDetalhadas.slice();
  // Ordena: mais recente primeiro
  todas.sort(function(a, b) {
    var pa = a.comp.split('/'), pb = b.comp.split('/');
    return (parseInt(pb[1]) * 12 + parseInt(pb[0])) - (parseInt(pa[1]) * 12 + parseInt(pa[0]));
  });

  var filtradas = _aplicarFiltros(todas);
  var totalPags = Math.max(1, Math.ceil(filtradas.length / PAG_SIZE));
  if (window._apContribPagina > totalPags) window._apContribPagina = totalPags;
  if (window._apContribPagina < 1) window._apContribPagina = 1;
  var inicio = (window._apContribPagina - 1) * PAG_SIZE;
  var pagina = filtradas.slice(inicio, inicio + PAG_SIZE);

  if (!pagina.length) {
    return '<div class="p3-contrib-vazio">Nenhuma competência encontrada com os filtros aplicados.</div>';
  }

  var linhasHtml = pagina.map(function(c) {
    var indArr = _indicadoresArr(c);
    var indsHtml = '<span class="p3-contrib-inds">' + indArr.map(function(i) {
      var tipo = INDICADORES_TIPOS.find(function(t) { return t.key === i; });
      var cls = tipo ? tipo.css : 'lim';
      return '<span class="p3-contrib-ind ' + cls + '">' + _esc(i) + '</span>';
    }).join('') + '</span>';

    var origem = c._origem === 'manual' ? 'manual' : 'cnis';
    var origemHtml = '<span class="p3-contrib-origem ' + origem + '">'
      + (origem === 'manual' ? '📝 manual' : '📄 CNIS') + '</span>';

    var invalida = _ehInvalida(c);
    var statusHtml = '<span class="p3-contrib-status ' + (invalida ? 'invalida' : 'valida') + '">'
      + (invalida ? '✗ inválida' : '✓ válida') + '</span>';

    // Empresa / Vínculo
    var empresaHtml;
    // Prioridade: empresa salva no próprio registro (manual ou editada) → vínculo do CNIS
    if (c.empresa) {
      var resumoM = _empresaResumo(c.empresa);
      var completoM = c.empresa + (c.tipoVinculo ? ' · ' + c.tipoVinculo : '');
      empresaHtml = '<span class="p3-contrib-empresa manual-emp" title="' + _esc(completoM) + '">'
        + '📝 ' + _esc(resumoM)
        + '</span>';
    } else {
      var vinc = _vinculoDaComp(c.comp);
      if (vinc) {
        var resumo = _empresaResumo(vinc.empresa);
        var completo = (vinc.seq ? '#' + vinc.seq + ' ' : '') + (vinc.empresa || '')
          + (vinc.inicio ? ' · ' + vinc.inicio + ' → ' + (vinc.fim || 'em aberto') : '');
        empresaHtml = '<span class="p3-contrib-empresa" title="' + _esc(completo) + '">'
          + (vinc.seq ? '<span class="p3-contrib-empresa-seq">#' + _esc(vinc.seq) + '</span> ' : '')
          + _esc(resumo)
          + '</span>';
      } else {
        empresaHtml = '<span class="p3-contrib-empresa avulsa" title="Sem vínculo identificado">— avulsa</span>';
      }
    }

    var compEsc = _esc(c.comp).replace(/'/g, "\\'");
    var acoesHtml = ''
      + '<div class="p3-contrib-acoes">'
      + '  <button class="p3-contrib-btn-acao" onclick="window._apContribEditar(\'' + compEsc + '\')" title="Editar">✎</button>'
      + '  <button class="p3-contrib-btn-acao danger" onclick="window._apContribExcluirPerg(\'' + compEsc + '\')" title="Excluir">🗑</button>'
      + '</div>';

    return '<tr class="' + (origem === 'manual' ? 'manual' : '') + '">'
      + '<td>' + _esc(c.comp) + '</td>'
      + '<td>' + empresaHtml + '</td>'
      + '<td class="num">' + _fmtMoeda(c.valor) + '</td>'
      + '<td>' + indsHtml + '</td>'
      + '<td>' + statusHtml + '</td>'
      + '<td>' + origemHtml + '</td>'
      + '<td class="center">' + acoesHtml + '</td>'
      + '</tr>';
  }).join('');

  // Paginação
  var pagHtml = '';
  if (totalPags > 1) {
    var btns = '';
    btns += '<button class="p3-contrib-pagina-btn" onclick="window._apContribMudarPagina(1)" ' + (window._apContribPagina === 1 ? 'disabled' : '') + '>« primeira</button>';
    btns += '<button class="p3-contrib-pagina-btn" onclick="window._apContribMudarPagina(' + (window._apContribPagina - 1) + ')" ' + (window._apContribPagina === 1 ? 'disabled' : '') + '>‹</button>';
    btns += '<span class="p3-contrib-pagina-btn ativa">' + window._apContribPagina + '/' + totalPags + '</span>';
    btns += '<button class="p3-contrib-pagina-btn" onclick="window._apContribMudarPagina(' + (window._apContribPagina + 1) + ')" ' + (window._apContribPagina === totalPags ? 'disabled' : '') + '>›</button>';
    btns += '<button class="p3-contrib-pagina-btn" onclick="window._apContribMudarPagina(' + totalPags + ')" ' + (window._apContribPagina === totalPags ? 'disabled' : '') + '>última »</button>';
    pagHtml = ''
      + '<div class="p3-contrib-pagina">'
      + '  <span>Mostrando ' + (inicio + 1) + '–' + Math.min(inicio + PAG_SIZE, filtradas.length) + ' de ' + filtradas.length + '</span>'
      + '  <div class="p3-contrib-pagina-btns">' + btns + '</div>'
      + '</div>';
  }

  return ''
    + '<div style="max-height:600px;overflow:auto;border:1px solid var(--border);border-radius:6px;">'
    + '  <table class="p3-contrib-tabela">'
    + '    <thead><tr>'
    + '      <th>Competência</th>'
    + '      <th>Empresa / Vínculo</th>'
    + '      <th class="num">Valor</th>'
    + '      <th>Indicadores</th>'
    + '      <th>Status</th>'
    + '      <th>Origem</th>'
    + '      <th class="center">Ações</th>'
    + '    </tr></thead>'
    + '    <tbody>' + linhasHtml + '</tbody>'
    + '  </table>'
    + '</div>'
    + pagHtml;
}

function _renderCabecalho() {
  var cnis = _obterCnis();
  if (!cnis || !cnis._contribuicoesDetalhadas) return '';
  var contribs = cnis._contribuicoesDetalhadas;
  var anos = Array.from(new Set(contribs.map(function(c){ return c.comp.split('/')[1]; }))).sort(function(a,b){ return parseInt(b) - parseInt(a); });
  var manuais = contribs.filter(function(c) { return c._origem === 'manual'; }).length;
  var invalidas = contribs.filter(_ehInvalida).length;
  var f = window._apContribFiltro;

  // Select de anos
  var anosOpts = '<option value=""' + (!f.ano ? ' selected' : '') + '>Todos os anos</option>'
    + anos.map(function(a) { return '<option value="' + a + '"' + (f.ano === a ? ' selected' : '') + '>' + a + '</option>'; }).join('');

  // Select de status
  var statusOpts = ''
    + '<option value="todas"' + (f.status === 'todas' ? ' selected' : '') + '>Todas</option>'
    + '<option value="validas"' + (f.status === 'validas' ? ' selected' : '') + '>Só válidas</option>'
    + '<option value="invalidas"' + (f.status === 'invalidas' ? ' selected' : '') + '>Só inválidas</option>'
    + '<option value="manuais"' + (f.status === 'manuais' ? ' selected' : '') + '>Só manuais</option>';

  return ''
    + '<div class="p3-contrib-stats">'
    + '  <div class="p3-contrib-stat"><div class="p3-contrib-stat-lbl">Total</div><div class="p3-contrib-stat-val gold">' + contribs.length + '</div></div>'
    + '  <div class="p3-contrib-stat"><div class="p3-contrib-stat-lbl">Válidas</div><div class="p3-contrib-stat-val">' + (contribs.length - invalidas) + '</div></div>'
    + '  <div class="p3-contrib-stat"><div class="p3-contrib-stat-lbl">Inválidas</div><div class="p3-contrib-stat-val">' + invalidas + '</div></div>'
    + '  <div class="p3-contrib-stat"><div class="p3-contrib-stat-lbl">Manuais</div><div class="p3-contrib-stat-val">' + manuais + '</div></div>'
    + '</div>'
    + '<div class="p3-contrib-mgr-head">'
    + '  <div>'
    + '    <label class="p3-contrib-filtro-lbl">Ano</label>'
    + '    <select class="p3-contrib-filtro-input" onchange="window._apContribFiltroMudar(\'ano\', this.value)">' + anosOpts + '</select>'
    + '  </div>'
    + '  <div>'
    + '    <label class="p3-contrib-filtro-lbl">Buscar (MM/AAAA)</label>'
    + '    <input class="p3-contrib-filtro-input" type="text" value="' + _esc(f.busca) + '" placeholder="ex: 05/2025" oninput="window._apContribFiltroMudar(\'busca\', this.value)">'
    + '  </div>'
    + '  <div>'
    + '    <label class="p3-contrib-filtro-lbl">Status</label>'
    + '    <select class="p3-contrib-filtro-input" onchange="window._apContribFiltroMudar(\'status\', this.value)">' + statusOpts + '</select>'
    + '  </div>'
    + '  <button class="p3-contrib-btn-add" onclick="window._apContribAbrirModal(null)">＋ Adicionar</button>'
    + '</div>';
}

function _atualizarSecao() {
  var box = document.getElementById('p3-contrib-body');
  if (box) box.innerHTML = _renderCabecalho() + _renderTabela();
}

// ──────────────────────────────────────────────────────────
// MODAL — abrir / salvar / fechar
// ──────────────────────────────────────────────────────────

function _renderModal(dados, avisoDup) {
  var isEdit = !dados._isNew;
  var titulo = isEdit ? 'Editar Contribuição' : 'Adicionar Contribuição';
  var indSel = _indicadoresArr(dados);

  var checksHtml = INDICADORES_TIPOS.map(function(t) {
    var sel = indSel.indexOf(t.key) >= 0;
    return '<label class="p3-modal-check ' + (sel ? 'sel' : '') + '">'
      + '<input type="checkbox" ' + (sel ? 'checked' : '') + ' value="' + t.key + '" onchange="window._apContribMarcarCheck(this)">'
      + '<span>' + _esc(t.label) + '</span>'
      + '</label>';
  }).join('');

  // Tipos de vínculo (Lei 8.213/91 art. 11 e art. 13)
  var tiposVinculo = [
    { v: 'Empregado/Agente Publico',   l: 'Empregado / Agente Público' },
    { v: 'Empregado Domestico',         l: 'Empregado Doméstico' },
    { v: 'Contribuinte Individual',     l: 'Contribuinte Individual (autônomo/MEI)' },
    { v: 'Facultativo',                 l: 'Facultativo' },
    { v: 'Segurado Especial',           l: 'Segurado Especial (rural)' },
    { v: 'Trabalhador Avulso',          l: 'Trabalhador Avulso' },

window._apContribAbrirModal = function(comp) {
  var cnis = _obterCnis();
  if (!cnis) return;
  if (comp) {
    // Editar existente
    var achou = cnis._contribuicoesDetalhadas.find(function(c) { return c.comp === comp; });
    if (!achou) return;
    // Se não tem empresa própria mas está dentro de um vínculo, usa o nome do vínculo como default
    var empDefault = achou.empresa || '';
    if (!empDefault && typeof _vinculoDaComp === 'function') {
      var v = _vinculoDaComp(comp);
      if (v && v.empresa) empDefault = v.empresa;
    }
    window._apContribEditando = {
      comp: achou.comp,
      valor: achou.valor,
      indicadores: _indicadoresStr(achou),
      empresa: empDefault,
      tipoVinculo: achou.tipoVinculo || (typeof _vinculoDaComp === 'function' && _vinculoDaComp(comp) ? _vinculoDaComp(comp).tipo : '') || '',
      tipoContribuicao: achou.tipoContribuicao || '',
      _origem: achou._origem || 'cnis',
      _original: achou,
      _isNew: false,
    };
  } else {
    window._apContribEditando = {
      comp: '', valor: '', indicadores: '',
      empresa: '', tipoVinculo: '', tipoContribuicao: '',
      _origem: 'manual', _isNew: true,
    };
  }
  _abrirModalHTML(_renderModal(window._apContribEditando));
  setTimeout(function() {

window._apContribMarcarCheck = function(el) {

window._apContribSalvar = function() {
  var ed = window._apContribEditando;
  if (!ed) return;
  var compInput = document.getElementById('p3-modal-comp');
  var valorInput = document.getElementById('p3-modal-valor');
  if (!compInput || !valorInput) return;

  // Validação
  var compStr = (compInput.value || '').trim();
  var parsed = _compValida(compStr);
  if (!parsed) { alert('Competência inválida. Use formato MM/AAAA (ex: 05/2025).'); compInput.focus(); return; }

  var valorStr = (valorInput.value || '').trim().replace(/\./g, '').replace(',', '.');
  var valor = parseFloat(valorStr);
  if (isNaN(valor) || valor < 0) { alert('Valor inválido. Informe um número (ex: 1100 ou 1100,00).'); valorInput.focus(); return; }

  // Novos campos
  var empresaEl = document.getElementById('p3-modal-empresa');
  var vincEl    = document.getElementById('p3-modal-vinc');
  var aliqEl    = document.getElementById('p3-modal-aliq');
  var empresa = empresaEl ? (empresaEl.value || '').trim() : '';
  var tipoVinc = vincEl ? vincEl.value : '';
  var tipoAliq = aliqEl ? aliqEl.value : '';

  // Coleta checkboxes
  var inds = [];
  document.querySelectorAll('.p3-modal-check input[type=checkbox]:checked').forEach(function(cb) {
    inds.push(cb.value);
  });

  var cnis = _obterCnis();
  if (!cnis || !cnis._contribuicoesDetalhadas) return;

  if (ed._isNew) {
    // Verifica duplicata
    var jaExiste = cnis._contribuicoesDetalhadas.find(function(c) { return c.comp === parsed.str; });
    if (jaExiste) {
      _abrirModalHTML(_renderModal(window._apContribEditando, parsed.str));
      return;
    }
    // Adiciona
    var novo = {
      comp: parsed.str,
      valor: valor,
      indicadores: inds.join(' '),
      _origem: 'manual',
    };
    if (empresa)  novo.empresa = empresa;
    if (tipoVinc) novo.tipoVinculo = tipoVinc;
    if (tipoAliq) novo.tipoContribuicao = tipoAliq;
    cnis._contribuicoesDetalhadas.push(novo);
    toast('✓ Competência ' + parsed.str + ' adicionada');
  } else {
    // Edita existente
    var alvo = ed._original;
    alvo.valor = valor;
    alvo.indicadores = inds.join(' ');
    if (empresa)  alvo.empresa = empresa;       else delete alvo.empresa;
    if (tipoVinc) alvo.tipoVinculo = tipoVinc;  else delete alvo.tipoVinculo;
    if (tipoAliq) alvo.tipoContribuicao = tipoAliq; else delete alvo.tipoContribuicao;
    if (alvo._origem !== 'manual') alvo._origem = 'editada';
    toast('✓ Competência ' + parsed.str + ' atualizada');
  }

  _fecharModalDOM();
  window._apContribEditando = null;
  _dispararRender();
};

window._apContribEditarExistente = function(comp) {
  _fecharModalDOM();
  setTimeout(function() { window._apContribAbrirModal(comp); }, 100);
};

window._apContribExcluirPerg = function(comp) {

  _abrirModalHTML(_renderModalConfirmExcluir(comp));
};
window._apContribCancelarExcluir = function() {

};
window._apContribConfirmarExcluir = function() {
  var comp = window._apContribParaExcluir;
  if (!comp) return;
  var cnis = _obterCnis();
  if (!cnis || !cnis._contribuicoesDetalhadas) return;
  cnis._contribuicoesDetalhadas = cnis._contribuicoesDetalhadas.filter(function(c) { return c.comp !== comp; });
  window._apContribParaExcluir = null;
  _fecharModalDOM();
  toast('✓ Competência ' + comp + ' excluída');
  _dispararRender();
};

// Acesso para outros scripts (ex: toast)
function toast(msg) {
  if (typeof window.toast === 'function') return window.toast(msg);
  var el = document.getElementById('toast');

  el.textContent = msg;
  el.classList.add('on');

<!-- ═══════════════════════════════════════════════════════════════
     MÓDULO RMI NÃO-PROGRAMÁVEIS v1
     ───────────────────────────────────────────────────────────────
     Calcula RMI estimada de:
       - Auxílio-doença (91% da média, art. 61 Lei 8.213/91)
       - Salário-maternidade (última remuneração, art. 72 Lei 8.213/91)
       - Pensão por morte (100% + cotas por dependente, Lei 13.135/15)
       - Aposentadoria por invalidez (100% da média, art. 44 Lei 8.213/91)

     Base de cálculo (art. 26 EC 103/2019 + art. 29 Lei 8.213/91):
       - PBC: 07/1994 até a DER
       - Atualização: INPC (mesmo de aposentadoria)
       - Média aritmética de 100% dos SCs válidos (pós EC 103)

     Depende: window.AP_Plan.calcularRMI (para reutilizar média já validada)
     ═══════════════════════════════════════════════════════════════ -->
<style>
.p3-naoprog-rmi {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--gold);
  font-weight: 500;
  margin-top: 3px;
  letter-spacing: .02em;
}
.p3-naoprog-rmi.sem { color: var(--muted); font-style: italic; font-weight: normal; }
.p3-naoprog-rmi-detalhe {
  font-family: var(--sans);
  font-size: 10.5px;
  color: var(--muted2);
  margin-top: 2px;
  line-height: 1.4;
}

@media print {
  .p3-naoprog-rmi { color: #8a7028 !important; }
  .p3-naoprog-rmi-detalhe { color: #666 !important; }
}
</style>

<script>
(function() {
'use strict';

if (window._apRmiNaoProgInstalled) return;
window._apRmiNaoProgInstalled = true;

// ──────────────────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────────────────

function _fmtMoeda(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return 'R$ ' + Number(v).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d)\,)/g, '.');
}
function _parseComp(s) {
  if (!s || typeof s !== 'string') return null;
  var m = s.match(/^(\d{2})\/(\d{4})$/);
  if (!m) return null;
  return new Date(parseInt(m[2]), parseInt(m[1]) - 1, 15);
}

// ──────────────────────────────────────────────────────────
// CALCULO DA MÉDIA (reaproveita lógica do módulo RMI)
// ──────────────────────────────────────────────────────────

function _calcularMediaParaNaoProg(ctx) {
  // Estratégia: chamar calcularRMI com uma regra fake "Regra Nova"
  // e extrair só o campo `media`. Isso reusa toda a lógica de PBC,
  // INPC, filtragem de PSC-MEN-SM, teto INSS — 100% validada.
  if (!window.AP_Plan || !window.AP_Plan.calcularRMI) return null;
  var regraFake = { nome: 'Regra Nova', temDireito: true };
  try {
    var r = window.AP_Plan.calcularRMI(regraFake, ctx);
    if (r && !r.erro && r.media) {
      return {
        media: r.media,
        qtdSCs: r.qtdSCs,
        metodoMedia: r.metodoMedia,
      };
    }
  } catch (e) {}
  return null;
}

// Última remuneração VÁLIDA antes da DER (para salário-maternidade)
function _ultimaRemuneracao(ctx) {
  var cnis = ctx && ctx.cnisOriginal;
  if (!cnis || !cnis._contribuicoesDetalhadas) return null;
  var ref = ctx.der instanceof Date ? ctx.der : new Date();

  var candidatas = [];
  cnis._contribuicoesDetalhadas.forEach(function(c) {
    if (!c || !c.comp || !c.valor) return;
    var d = _parseComp(c.comp);
    if (!d || d > ref) return;
    var inds = typeof c.indicadores === 'string' ? c.indicadores
      : (Array.isArray(c.indicadores) ? c.indicadores.join(' ') : '');
    if (/PSC-MEN-SM|PREC-MENOR-MIN/.test(inds)) return;
    candidatas.push({ comp: c.comp, data: d, valor: c.valor });
  });
  if (!candidatas.length) return null;
  candidatas.sort(function(a, b) { return b.data - a.data; });
  return candidatas[0]; // a mais recente
}

// ──────────────────────────────────────────────────────────
// CÁLCULOS ESPECÍFICOS POR BENEFÍCIO
// ──────────────────────────────────────────────────────────

function _smDoAno(ano) {
  var t = window.SALARIO_MINIMO_HISTORICO || {};
  return t[ano] || t[2025] || 1518;
}
function _tetoInss(ano) {
  // Tabela simples (teto INSS ano vigente)
  var t = {
    2019: 5839.45, 2020: 6101.06, 2021: 6433.57, 2022: 7087.22,
    2023: 7507.49, 2024: 7786.02, 2025: 8157.41, 2026: 8500.00,
  };
  return t[ano] || t[2025] || 8000;
}

/**
 * Auxílio por Incapacidade Temporária (auxílio-doença)
 * Art. 61 Lei 8.213/91:
 *   RMI = 91% da média
 *   Limitado a 100% da média dos últimos 12 salários de contribuição (art. 29, §10)
 *     (proteção: não pode superar média dos últimos 12m — regra "teto do auxílio")
 */
function _calcularAuxilioDoenca(ctx, base) {
  if (!base) return { erro: 'Sem base de cálculo' };
  var media = base.media;
  var rmi = media * 0.91;
  var teto12 = _calcularMediaUltimos12(ctx);
  var aplicouTeto12 = false;
  if (teto12 && rmi > teto12) {
    rmi = teto12;
    aplicouTeto12 = true;
  }
  var derAno = ctx.der.getFullYear();
  var pisoSM = _smDoAno(derAno);
  var tetoInss = _tetoInss(derAno);
  var limite = null;
  if (rmi < pisoSM) { rmi = pisoSM; limite = 'piso'; }
  else if (rmi > tetoInss) { rmi = tetoInss; limite = 'teto'; }
  return {
    rmi: rmi,
    media: media,
    coef: 0.91,
    coefTxt: '91% da média (art. 61 Lei 8.213/91)',
    qtdSCs: base.qtdSCs,
    aplicouTeto12: aplicouTeto12,
    teto12: teto12,
    limite: limite,
    piso: pisoSM,
    teto: tetoInss,
  };
}

/**
 * Aposentadoria por Incapacidade Permanente (invalidez)
 * Art. 44 Lei 8.213/91 + EC 103/2019:
 *   RMI = 60% + 2%/ano após 20H/15M (coef EC 103)
 *   EXCETO: se decorrer de acidente do trabalho, doença profissional
 *           ou doenças taxativas → 100% da média
 */
function _calcularInvalidez(ctx, base, decorrenteDeAcidente) {
  if (!base) return { erro: 'Sem base de cálculo' };
  var media = base.media;
  var coef, coefTxt;
  if (decorrenteDeAcidente) {
    coef = 1.0;
    coefTxt = '100% (acidente/doença profissional — art. 26, §3º, III EC 103)';
  } else {
    var tempoAnos = (ctx.tempoContribMeses || 0) / 12;
    var tempoMin = ctx.sexo === 'feminino' ? 15 : 20;
    var extra = Math.max(0, tempoAnos - tempoMin);
    coef = 0.60 + extra * 0.02;
    if (coef > 1.0) coef = 1.0;
    coefTxt = '60% + 2%/ano após ' + tempoMin + 'a (regra comum) → ' + (coef * 100).toFixed(0) + '%';
  }
  var rmi = media * coef;
  var derAno = ctx.der.getFullYear();
  var pisoSM = _smDoAno(derAno);
  var tetoInss = _tetoInss(derAno);
  var limite = null;
  if (rmi < pisoSM) { rmi = pisoSM; limite = 'piso'; }
  else if (rmi > tetoInss) { rmi = tetoInss; limite = 'teto'; }
  return {
    rmi: rmi,
    media: media,
    coef: coef,
    coefTxt: coefTxt,
    qtdSCs: base.qtdSCs,
    limite: limite,
    piso: pisoSM,
    teto: tetoInss,
  };
}

/**
 * Salário-Maternidade
 * Art. 72 Lei 8.213/91:
 *   - Empregada / trabalhadora avulsa: remuneração integral do mês do afastamento
 *   - Empregada doméstica: último salário de contribuição
 *   - CI / facultativa: 1/12 da soma dos 12 últimos salários apurados em PBC ≥ 15 meses
 *   - Rural (seg. especial): 1 SM
 * Piso: SM | Teto: teto INSS (exceto para empregada com vínculo ativo, que recebe salário integral)
 */
function _calcularSalarioMaternidade(ctx) {
  var cnis = ctx.cnisOriginal;
  if (!cnis) return { erro: 'Sem CNIS' };
  var derAno = ctx.der.getFullYear();
  var pisoSM = _smDoAno(derAno);
  var tetoInss = _tetoInss(derAno);

  // Detecta tipo da segurada
  var tipoSeg = 'ci'; // default contribuinte individual / facultativa
  var tipoTxt = 'CI/facultativa';
  // Verifica vínculo EMPREGADA ativo na DER
  var ref = ctx.der;
  function pd(s) {
    if (!s) return null;
    var p = (s || '').split('/');
    if (p.length !== 3) return null;
    return new Date(parseInt(p[2]), parseInt(p[1]) - 1, parseInt(p[0]));
  }
  var vincAtivo = (cnis._vinculos || []).find(function(v) {
    var ini = pd(v.inicio);
    var fimAberto = !v.fim || /aberto|atual|vigente/i.test(v.fim);
    if (!ini || ini > ref) return false;
    if (fimAberto) return true;
    var fim = pd(v.fim);
    return fim && fim >= ref;
  });
  if (vincAtivo) {
    var tipoVinc = (vincAtivo.tipo || '').toLowerCase();
    if (/empregad/i.test(tipoVinc) || /agente.p[uú]blico/i.test(tipoVinc)) {
      tipoSeg = 'empregada';
      tipoTxt = 'Empregada (vínculo ativo)';
    }
  }

  // Cálculo por tipo
  var rmi, coefTxt;
  if (tipoSeg === 'empregada') {
    // Recebe salário integral do mês. Pega a última remuneração válida.
    var ultima = _ultimaRemuneracao(ctx);
    if (!ultima) return { erro: 'Sem remuneração para base' };
    rmi = ultima.valor;
    coefTxt = 'Salário integral do mês (' + ultima.comp + ') — empregada';
  } else {
    // CI/facultativa: 1/12 da soma dos últimos 12 SC em PBC ≥ 15 meses
    var ultimos12 = _calcularMediaUltimos12(ctx);
    if (ultimos12) {
      rmi = ultimos12;
      coefTxt = 'Média dos últimos 12 SCs (CI/facultativa) — art. 72, §3º Lei 8.213/91';
    } else {
      // Sem contribuições suficientes — vai no piso (SM)
      rmi = pisoSM;
      coefTxt = 'Sem 12 contribuições válidas — aplicado piso (1 SM)';
    }
  }

  var limite = null;
  if (rmi < pisoSM) { rmi = pisoSM; limite = 'piso'; }
  else if (rmi > tetoInss && tipoSeg !== 'empregada') { rmi = tetoInss; limite = 'teto'; }

  return {
    rmi: rmi,
    tipoSegurada: tipoSeg,
    tipoTxt: tipoTxt,
    coefTxt: coefTxt,
    limite: limite,
    piso: pisoSM,
    teto: tetoInss,
  };
}

/**
 * Pensão por Morte (Lei 13.135/2015 + EC 103/2019)
 *   RMI de REFERÊNCIA = 100% da aposentadoria que o instituidor recebia / teria direito
 *   Valor FINAL ao dependente: 50% + 10% por dependente (até 100%)
 *       - cônjuge / companheiro
 *       - filho menor de 21 ou inválido (cada)
 *       - pais / outros dependentes (se habilitados)
 */
function _calcularPensaoPorMorte(ctx, base, qtdDependentes) {
  if (!base) return { erro: 'Sem base de cálculo' };
  var media = base.media;
  // 100% da média (como se fosse aposentadoria por invalidez — regra geral)
  var tempoAnos = (ctx.tempoContribMeses || 0) / 12;
  var tempoMin = ctx.sexo === 'feminino' ? 15 : 20;
  var extra = Math.max(0, tempoAnos - tempoMin);
  var coefAposent = 0.60 + extra * 0.02;
  if (coefAposent > 1.0) coefAposent = 1.0;
  var rmiBase = media * coefAposent;

  // Cotas: 50% + 10% por dependente, limitado a 100%
  var qtd = qtdDependentes || 1;
  var coefCota = 0.50 + 0.10 * qtd;
  if (coefCota > 1.0) coefCota = 1.0;
  var rmi = rmiBase * coefCota;

  var derAno = ctx.der.getFullYear();
  var pisoSM = _smDoAno(derAno);
  var tetoInss = _tetoInss(derAno);
  var limite = null;
  if (rmi < pisoSM) { rmi = pisoSM; limite = 'piso'; }
  else if (rmi > tetoInss) { rmi = tetoInss; limite = 'teto'; }

  return {
    rmi: rmi,
    rmiBase: rmiBase,
    media: media,
    coefAposent: coefAposent,
    coefCota: coefCota,
    qtdDependentes: qtd,
    coefTxt: '50% + 10%/dep (' + qtd + ' dep) = ' + (coefCota * 100).toFixed(0) + '% sobre base',
    qtdSCs: base.qtdSCs,
    limite: limite,
    piso: pisoSM,
    teto: tetoInss,
  };
}

// Média dos últimos 12 salários de contribuição válidos até a DER
function _calcularMediaUltimos12(ctx) {
  var cnis = ctx.cnisOriginal;
  if (!cnis || !cnis._contribuicoesDetalhadas) return null;
  var ref = ctx.der;
  var validas = [];
  cnis._contribuicoesDetalhadas.forEach(function(c) {
    if (!c || !c.comp || !c.valor) return;
    var d = _parseComp(c.comp);
    if (!d || d > ref) return;
    var inds = typeof c.indicadores === 'string' ? c.indicadores
      : (Array.isArray(c.indicadores) ? c.indicadores.join(' ') : '');
    if (/PSC-MEN-SM|PREC-MENOR-MIN/.test(inds)) return;
    validas.push({ data: d, valor: c.valor });
  });
  if (validas.length < 1) return null;
  // Ordena desc
  validas.sort(function(a, b) { return b.data - a.data; });
  var ultimos = validas.slice(0, 12);
  var soma = ultimos.reduce(function(acc, x) { return acc + x.valor; }, 0);
  return soma / ultimos.length;
}

// ──────────────────────────────────────────────────────────
// API PÚBLICA
// ──────────────────────────────────────────────────────────

function calcularRmiNaoProg(tipo, ctx, opts) {
  opts = opts || {};
  // Base de cálculo comum (média)
  var base = _calcularMediaParaNaoProg(ctx);

  switch (tipo) {
    case 'auxilio_doenca':
      return _calcularAuxilioDoenca(ctx, base);
    case 'invalidez':
      return _calcularInvalidez(ctx, base, opts.acidentario);
    case 'salario_maternidade':
      return _calcularSalarioMaternidade(ctx);
    case 'pensao_morte':
      return _calcularPensaoPorMorte(ctx, base, opts.qtdDependentes || 1);
    default:
      return { erro: 'Tipo não implementado: ' + tipo };
  }
}

window.AP_Plan = window.AP_Plan || {};
window.AP_Plan.calcularRmiNaoProg = calcularRmiNaoProg;

console.log('[A&P Plan] Módulo RMI Não-Programáveis v1 carregado');

})();
</script>


<!-- ═══════════════════════════════════════════════════════════════
     PATCH: injetar RMI nos cards de não-programáveis
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function() {
'use strict';

if (window._apRmiNaoProgRenderInstalled) return;
window._apRmiNaoProgRenderInstalled = true;

// Mapa: nome do benefício → tipo esperado pela API
var MAPA_TIPO = {
  'Auxílio por Incapacidade Temporária':       'auxilio_doenca',
  'Aposentadoria por Incapacidade Permanente': 'invalidez',
  'Salário-Maternidade':                        'salario_maternidade',
  'Pensão por Morte (dependentes)':             'pensao_morte',
};

function _fmtMoeda(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return 'R$ ' + Number(v).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d)\,)/g, '.');
}

function _obterCtx() {
  var dados = window.dadosExtraidos || {};
  var todos = window._todosDocumentosDados || [];
  var cnis = (todos || []).find(function(d) {
    return d && (d._tipoDetectado === 'cnis' || /cnis|extrato/i.test(d.tipoDocumento || ''));
  }) || dados;

  var der = new Date();
  var derInput = document.getElementById('p3-der-input');
  if (derInput && derInput.value) {
    var m = derInput.value.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (m) der = new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
  }
  var parseBR = function(s) {
    if (!s || typeof s !== 'string') return null;
    var m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    return m ? new Date(parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1])) : null;
  };
  var nasc = parseBR(dados.dataNascimento || cnis.dataNascimento);
  var idadeMeses = nasc
    ? ((der.getFullYear() - nasc.getFullYear()) * 12 + (der.getMonth() - nasc.getMonth()))
    : 0;
  var sexo = (function() {
    var n = (dados.nomeCliente || cnis.nomeCliente || '').split(' ')[0];
    return /a$/i.test(n) ? 'feminino' : 'masculino';
  })();

  // Tempo e carência ATÉ a DER (replica lógica do módulo Tramitação)
  var tempoAteDer = 0, carenciaAteDer = 0;
  if (cnis && cnis._contribuicoesDetalhadas) {
    cnis._contribuicoesDetalhadas.forEach(function(c) {
      var parts = (c.comp || '').split('/');
      if (parts.length !== 2) return;
      var dc = new Date(parseInt(parts[1]), parseInt(parts[0]) - 1, 15);
      if (dc > der) return;
      tempoAteDer++;
      var inds = typeof c.indicadores === 'string' ? c.indicadores
        : (Array.isArray(c.indicadores) ? c.indicadores.join(' ') : '');
      if (!/PSC-MEN-SM|PREC-MENOR-MIN/.test(inds)) carenciaAteDer++;
    });
  }

  return {
    sexo: sexo, der: der,
    idadeAtualMeses: idadeMeses,
    tempoContribMeses: tempoAteDer,
    carencia: carenciaAteDer,
    cnisOriginal: cnis,
    _temCnis: !!(cnis && cnis._vinculos && cnis._vinculos.length),
  };
}

function _injetarRmi() {
  if (!window.AP_Plan || !window.AP_Plan.calcularRmiNaoProg) return;
  var ctx = _obterCtx();
  if (!ctx._temCnis) return;

  var items = document.querySelectorAll('.p3-naoprog-item');
  if (!items.length) return;

  items.forEach(function(item) {
    // Já tem RMI? Pula
    if (item.querySelector('.p3-naoprog-rmi')) return;

    var nomeEl = item.querySelector('.p3-naoprog-nome');
    if (!nomeEl) return;
    var nome = nomeEl.textContent.trim();
    var tipo = MAPA_TIPO[nome];
    if (!tipo) return; // BPC não tem RMI calculada (é de 1 SM)

    // Status do card: se "sem direito" ou "—", não mostra RMI
    var statusEl = item.querySelector('.p3-naoprog-status');
    var statusCls = statusEl && statusEl.className || '';
    if (/\bnao\b/.test(statusCls)) {
      // Sem qualidade de segurado — mostra "sem cálculo"
      var semHtml = '<div class="p3-naoprog-rmi sem">RMI indisponível — sem qualidade de segurado na DER</div>';
      nomeEl.parentElement.insertAdjacentHTML('beforeend', semHtml);
      return;
    }

    var r;
    try {
      r = window.AP_Plan.calcularRmiNaoProg(tipo, ctx, { qtdDependentes: 1 });
    } catch (e) {
      console.warn('[A&P] RMI não-prog falhou:', nome, e);
      return;
    }
    if (!r || r.erro) return;

    var detalhe = '';
    if (tipo === 'auxilio_doenca') {
      detalhe = r.coefTxt + (r.aplicouTeto12 ? ' · limitado à média dos últimos 12' : '');
    } else if (tipo === 'salario_maternidade') {
      detalhe = r.tipoTxt + ' · ' + r.coefTxt;
    } else if (tipo === 'pensao_morte') {
      detalhe = r.coefTxt + ' (estimativa c/ 1 dependente)';
    } else {
      detalhe = r.coefTxt || '';
    }
    if (r.limite === 'piso') detalhe += ' · piso SM';
    if (r.limite === 'teto') detalhe += ' · teto INSS';

    var html = '<div class="p3-naoprog-rmi">'
             +   '~ ' + _fmtMoeda(r.rmi) + ' estimado'
             + '</div>'
             + '<div class="p3-naoprog-rmi-detalhe">' + detalhe + '</div>';
    nomeEl.parentElement.insertAdjacentHTML('beforeend', html);
  });
}

// Hook render
var _renderPrev = window.renderPlanejamento;
window.renderPlanejamento = function() {
  if (typeof _renderPrev === 'function') {
    try { _renderPrev.apply(this, arguments); } catch (e) {}
  }
  // Delay maior que o de Tramitação (80) e Didáticas (160) para pegar DOM já pronto
  setTimeout(_injetarRmi, 240);
};

setTimeout(function() {
  if (typeof window.renderPlanejamento === 'function') _injetarRmi();
}, 1500);

console.log('[A&P Plan] Módulo RMI Não-Prog — render carregado');

})();
</script>
