<script>
(function() {
'use strict';

// Idempotência
if (window._apRmiInstalled) return;
window._apRmiInstalled = true;

// ──────────────────────────────────────────────────────────
// TABELAS DE REFERÊNCIA
// ──────────────────────────────────────────────────────────

// INPC acumulado base jul/1994 = 1.000
// Valores aproximados (fonte: IBGE, dez/cada ano)
var INPC_ACUM = {
  1994: 1.000,  1995: 1.220,  1996: 1.320,  1997: 1.375,
  1998: 1.410,  1999: 1.530,  2000: 1.590,  2001: 1.730,
  2002: 1.910,  2003: 2.110,  2004: 2.260,  2005: 2.370,
  2006: 2.440,  2007: 2.540,  2008: 2.690,  2009: 2.800,
  2010: 2.970,  2011: 3.160,  2012: 3.340,  2013: 3.530,
  2014: 3.760,  2015: 4.180,  2016: 4.440,  2017: 4.500,
  2018: 4.680,  2019: 4.880,  2020: 5.120,  2021: 5.670,
  2022: 5.980,  2023: 6.240,  2024: 6.520,  2025: 6.790,
  2026: 7.070,
};

// Teto INSS mensal (valor máximo de salário de contribuição)
var TETO_INSS = {
  1994: 582.86,  1995: 832.66,   1996: 957.56,   1997: 1031.87,
  1998: 1081.50, 1999: 1200.00,  2000: 1255.32,  2001: 1328.25,
  2002: 1561.56, 2003: 1869.34,  2004: 2400.00,  2005: 2668.15,
  2006: 2801.82, 2007: 2894.28,  2008: 3038.99,  2009: 3218.90,
  2010: 3467.40, 2011: 3691.74,  2012: 3916.20,  2013: 4159.00,
  2014: 4390.24, 2015: 4663.75,  2016: 5189.82,  2017: 5531.31,
  2018: 5645.80, 2019: 5839.45,  2020: 6101.06,  2021: 6433.57,
  2022: 7087.22, 2023: 7507.49,  2024: 7786.02,  2025: 8157.41,
  2026: 8545.00,
};

var PBC_INICIO = new Date(1994, 6, 1); // 01/07/1994

// ──────────────────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────────────────

function _parseComp(s) {
  if (!s || typeof s !== 'string') return null;
  var m = s.match(/^(\d{2})\/(\d{4})$/);
  if (!m) return null;
  return new Date(parseInt(m[2]), parseInt(m[1]) - 1, 15);
}

function _parseDataBR(s) {
  if (!s || typeof s !== 'string') return null;
  var m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (!m) return null;
  return new Date(parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1]));
}

function _parseDataISO(s) {
  if (!s || typeof s !== 'string') return null;
  var m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return null;
  return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
}

function _fmtMoeda(v) {
  if (v === null || v === undefined || isNaN(v)) return 'R$ —';
  return 'R$ ' + v.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d)\,)/g, '.');
}

function _fmtMoedaCompacta(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  if (v >= 1000) {
    return 'R$ ' + v.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d)\,)/g, '.');
  }
  return 'R$ ' + v.toFixed(2).replace('.', ',');
}

function _esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}

// Fator previdenciário (réplica local — função do módulo pedágios não foi exportada)
var EXPECT_IBGE_LOCAL = {
  40:43.3, 41:42.4, 42:41.5, 43:40.6, 44:39.7, 45:38.8, 46:37.9, 47:37.0,
  48:36.1, 49:35.3, 50:34.4, 51:33.5, 52:32.7, 53:31.8, 54:31.0, 55:30.2,
  56:29.3, 57:28.5, 58:27.7, 59:26.9, 60:26.1, 61:25.3, 62:24.6, 63:23.8,
  64:23.1, 65:22.3, 66:21.6, 67:20.9, 68:20.2, 69:19.5, 70:18.8, 71:18.1,
  72:17.5, 73:16.8, 74:16.2, 75:15.6, 76:15.0, 77:14.4, 78:13.9, 79:13.3,
  80:12.8,
};
function _fatorPrev(idadeAnos, tempoContribAnos) {
  var idadeR = Math.round(idadeAnos);
  var es = EXPECT_IBGE_LOCAL[idadeR] || (idadeR < 40 ? 45 : 15);
  var a = 0.31;
  return (tempoContribAnos * a / es) * (1 + (idadeR + tempoContribAnos * a) / 100);
}

// ──────────────────────────────────────────────────────────
// CONTEXTO (reconstrói a partir dos globais + DOM)
// ──────────────────────────────────────────────────────────

function _obterCtx() {
  var dados = window.dadosExtraidos || {};
  var todos = window._todosDocumentosDados || [];
  var cnis = (todos || []).find(function(d) {
    return d && (d._tipoDetectado === 'cnis' || /cnis|extrato/i.test(d.tipoDocumento || ''));
  }) || dados;

  // DER vem do input se existir, senão hoje
  var der = new Date();
  var derInput = document.getElementById('p3-der-input');
  if (derInput && derInput.value) {
    var d = _parseDataISO(derInput.value);
    if (d) der = d;
  }

  var nasc = _parseDataBR(dados.dataNascimento || cnis.dataNascimento);
  var idadeMeses = nasc
    ? ((der.getFullYear() - nasc.getFullYear()) * 12 + (der.getMonth() - nasc.getMonth()))
    : 0;

  // Tempo de contribuição até a DER
  var tempoAteDer = 0, carenciaAteDer = 0;
  if (cnis && cnis._contribuicoesDetalhadas) {
    cnis._contribuicoesDetalhadas.forEach(function(c) {
      var d = _parseComp(c.comp);
      if (!d || d > der) return;
      tempoAteDer++;
      var invalida = false;
      var inds = c.indicadores;
      if (typeof inds === 'string' && /PSC-MEN-SM/.test(inds)) invalida = true;
      else if (Array.isArray(inds) && inds.some(function(i){ return /PSC-MEN-SM/.test(i); })) invalida = true;
      if (!invalida) carenciaAteDer++;
    });
  }

  // Pré-reforma
  var reforma = new Date(2019, 10, 13);
  var tempo2019 = 0;
  var temPre = false;
  if (cnis && cnis._contribuicoesDetalhadas) {
    cnis._contribuicoesDetalhadas.forEach(function(c) {
      var d = _parseComp(c.comp);
      if (d && d < reforma) { temPre = true; tempo2019++; }
    });
  }

  var sexo = (function() {
    var n = (dados.nomeCliente || cnis.nomeCliente || '').split(' ')[0];
    return /a$/i.test(n) ? 'feminino' : 'masculino';
  })();

  return {
    nomeCliente: dados.nomeCliente || cnis.nomeCliente || 'Segurado',
    cpf: dados.cpfCnpj || cnis.cpfCnpj || '—',
    dataNascimento: nasc,
    sexo: sexo,
    der: der,
    idadeAtualMeses: idadeMeses,
    tempoContribMeses: tempoAteDer,
    carencia: carenciaAteDer,
    tempoContrib2019: tempo2019,
    temContribAnterior2019: temPre,
    tipoAtividade: (cnis && cnis.tipoAtividade) || dados.tipoAtividade,
    cnisOriginal: cnis,
    dadosOriginais: dados,
    todosDocDados: todos,
    _temCnis: !!(cnis && cnis._vinculos && cnis._vinculos.length),
    hoje: new Date(),
  };
}

// ──────────────────────────────────────────────────────────
// MOTOR DE CÁLCULO RMI
// ──────────────────────────────────────────────────────────

function _multInflacao(anoOrigem, anoDestino) {
  var orig = INPC_ACUM[anoOrigem];
  var dest = INPC_ACUM[anoDestino];
  if (!orig) orig = INPC_ACUM[1994]; // fallback bem no começo
  if (!dest) {
    // Projeção linear para DER futura: ~4% ao ano
    var anos = Object.keys(INPC_ACUM).map(Number);
    var ultimo = Math.max.apply(null, anos);
    if (anoDestino > ultimo) {
      dest = INPC_ACUM[ultimo] * Math.pow(1.04, anoDestino - ultimo);
    } else {
      dest = INPC_ACUM[ultimo];
    }
  }
  return dest / orig;
}

function _tetoDoAno(ano) {
  if (TETO_INSS[ano]) return TETO_INSS[ano];
  var anos = Object.keys(TETO_INSS).map(Number);
  var ultimo = Math.max.apply(null, anos);
  if (ano > ultimo) return TETO_INSS[ultimo] * Math.pow(1.04, ano - ultimo);
  return TETO_INSS[ultimo];
}

function calcularRMI(regra, ctx) {
  if (!regra || !ctx) return { erro: 'Parâmetros ausentes' };
  var cnis = ctx.cnisOriginal;
  if (!cnis || !cnis._contribuicoesDetalhadas || !cnis._contribuicoesDetalhadas.length) {
    return { erro: 'Sem contribuições registradas' };
  }

  var der = ctx.der;
  var derAno = der.getFullYear();

  // 1. Filtra PBC — contribuições válidas de 07/1994 até a DER
  var sc = [];
  cnis._contribuicoesDetalhadas.forEach(function(c) {
    var d = _parseComp(c.comp);
    if (!d || d < PBC_INICIO || d > der) return;

    // Pula inválidas
    var inds = c.indicadores;
    var invalida = false;
    if (typeof inds === 'string' && /PSC-MEN-SM/.test(inds)) invalida = true;
    else if (Array.isArray(inds) && inds.some(function(i){ return /PSC-MEN-SM/.test(i); })) invalida = true;
    if (invalida) return;

    if (!c.valor || c.valor <= 0) return;

    var ano = parseInt(c.comp.split('/')[1]);

    // Limita valor ORIGINAL ao teto do ano (CNIS em geral já vem limitado, mas por segurança)
    var tetoOrig = _tetoDoAno(ano);
    var valOrig = Math.min(c.valor, tetoOrig);

    sc.push({
      comp: c.comp,
      ano: ano,
      original: valOrig,
      atualizado: valOrig * _multInflacao(ano, derAno),
    });
  });

  if (!sc.length) {
    return { erro: 'Nenhuma contribuição válida no PBC (07/1994 até DER)' };
  }

  // 2. Média conforme a regra
  var media, metodoMedia, ordSc;
  if (regra.nome === 'Direito Adquirido') {
    // Regra antiga: 80% maiores salários de contribuição
    ordSc = sc.slice().sort(function(a,b){ return b.atualizado - a.atualizado; });
    var qtd80 = Math.max(1, Math.ceil(ordSc.length * 0.8));
    var maiores = ordSc.slice(0, qtd80);
    var soma = maiores.reduce(function(a,s){ return a + s.atualizado; }, 0);
    media = soma / maiores.length;
    metodoMedia = 'Média dos 80% maiores (' + qtd80 + ' de ' + sc.length + ') — regra antiga';
  } else {
    // EC 103: 100% dos SCs
    var soma2 = sc.reduce(function(a,s){ return a + s.atualizado; }, 0);
    media = soma2 / sc.length;
    metodoMedia = 'Média de 100% dos SCs (' + sc.length + ') — EC 103/2019';
    ordSc = sc.slice();
  }

  // 3. Coeficiente conforme regra
  var sexo = ctx.sexo;
  var tempoAnos = ctx.tempoContribMeses / 12;
  var tempoMin = sexo === 'feminino' ? 15 : 20;
  var coef, coefTxt;

  switch ((regra.nome || '').toLowerCase()) {
    case 'pedágio 100%':
      coef = 1.0;
      coefTxt = '100% (integral, sem redução)';
      break;
    case 'pedágio 50%':
      coef = 1.0;
      coefTxt = '100% × fator previdenciário';
      break;
    case 'direito adquirido':
      coef = 1.0;
      coefTxt = '100% da média (fator opcional)';
      break;
    default:
      // Pontos, Idade Progressiva, Regra Nova — EC 103: 60% + 2%/ano após mínimo
      var extra = Math.max(0, tempoAnos - tempoMin);
      coef = 0.60 + (extra * 0.02);
      if (coef > 1.0) coef = 1.0;
      coefTxt = '60% + 2%/ano após ' + tempoMin + 'a → ' + (coef * 100).toFixed(0) + '%';
  }

  var rmiBase = media * coef;
  var rmi = rmiBase;

  // 4. Fator previdenciário
  var fatorUsado = null;
  var fatorContexto = '';
  if (regra.nome === 'Pedágio 50%') {
    // SEMPRE aplica fator — geralmente já vem calculado na regra
    if (regra.fator && regra.fator > 0) {
      fatorUsado = regra.fator;
    } else {
      // Calcula se não veio
      var idadeP = Math.max(ctx.idadeAtualMeses / 12, sexo === 'feminino' ? 53 : 55);
      fatorUsado = _fatorPrev(idadeP, Math.max(tempoAnos, sexo === 'feminino' ? 30 : 35));
    }
    rmi = rmi * fatorUsado;
    fatorContexto = 'obrigatório (Pedágio 50%)';
  } else if (regra.nome === 'Direito Adquirido') {
    // Fator é OPCIONAL — só aplica se for > 1 (benéfico ao segurado)
    var idadeA = ctx.idadeAtualMeses / 12;
    var fOpc = _fatorPrev(idadeA, tempoAnos);
    if (fOpc > 1) {
      rmi = rmi * fOpc;
      fatorUsado = fOpc;
      fatorContexto = 'opcional aplicado (>1)';
    } else {
      fatorContexto = 'opcional não aplicado (' + fOpc.toFixed(3) + ' < 1)';
    }
  }

  // 5. Piso (SM) e teto (INSS) do ano da DER
  var pisoSM = (window.SALARIO_MINIMO_HISTORICO && window.SALARIO_MINIMO_HISTORICO[derAno])
    ? window.SALARIO_MINIMO_HISTORICO[derAno]
    : 1518;
  var tetoDer = _tetoDoAno(derAno);

  var rmiPreLimite = rmi;
  var limite = null;
  if (rmi < pisoSM) { rmi = pisoSM; limite = 'piso'; }
  else if (rmi > tetoDer) { rmi = tetoDer; limite = 'teto'; }

  return {
    rmi: rmi,
    rmiPreLimite: rmiPreLimite,
    media: media,
    coef: coef,
    coefTxt: coefTxt,
    metodoMedia: metodoMedia,
    fator: fatorUsado,
    fatorContexto: fatorContexto,
    qtdSCs: sc.length,
    piso: pisoSM,
    teto: tetoDer,
    limite: limite,
    sc: ordSc.slice().sort(function(a,b){
      // ordena cronologicamente para exibir
      return a.comp.split('/')[1].localeCompare(b.comp.split('/')[1]) || a.comp.split('/')[0].localeCompare(b.comp.split('/')[0]);
    }),
    derAno: derAno,
  };
}

// ──────────────────────────────────────────────────────────
// RECOMPUTA RESULTADOS DAS REGRAS (para acessar fator e afins)
// ──────────────────────────────────────────────────────────

function _recomputarRegras(ctx) {
  var AP = window.AP_Plan || {};
  var resultados = [];
  if (AP.calcDireitoAdquirido) resultados.push(AP.calcDireitoAdquirido(ctx));
  if (AP.calcPedagio100)       resultados.push(AP.calcPedagio100(ctx));
  if (AP.calcPedagio50)        resultados.push(AP.calcPedagio50(ctx));
  if (AP.calcPontos)           resultados.push(AP.calcPontos(ctx));
  if (AP.calcIdadeProgressiva) resultados.push(AP.calcIdadeProgressiva(ctx));
  if (AP.calcRegraNova)        resultados.push(AP.calcRegraNova(ctx));
  return resultados;
}

function _identificarMelhor(resultados) {
  var aplic = resultados.filter(function(r){ return r.aplicavel; });
  if (!aplic.length) return null;
  aplic.sort(function(a, b) {
    if (a.nome === 'Direito Adquirido' && a.temDireito) return -1;
    if (b.nome === 'Direito Adquirido' && b.temDireito) return 1;
    if (a.temDireito && b.temDireito) {
      if (a.fatorAplica !== b.fatorAplica) return a.fatorAplica ? 1 : -1;
      return 0;
    }
    if (a.temDireito) return -1;
    if (b.temDireito) return 1;
    if (a.dataDireito && b.dataDireito) return a.dataDireito - b.dataDireito;
    if (a.dataDireito) return -1;
    if (b.dataDireito) return 1;
    return 0;
  });
  return aplic[0];
}

// ──────────────────────────────────────────────────────────
// RENDERIZAÇÃO
// ──────────────────────────────────────────────────────────

function _renderPassos(r, regra) {
  var passos = [];
  passos.push({ label: 'Salários de contribuição no PBC', valor: r.qtdSCs + ' competências' });
  passos.push({ label: 'Método da média', valor: r.metodoMedia });
  passos.push({ label: 'Salário de benefício (média)', valor: _fmtMoeda(r.media) });
  passos.push({ label: 'Coeficiente aplicado', valor: r.coefTxt, op: '×' });
  if (r.fator) {
    passos.push({ label: 'Fator previdenciário (' + r.fatorContexto + ')', valor: r.fator.toFixed(4), op: '×' });
  }
  if (r.limite === 'piso') {
    passos.push({ label: 'RMI antes do piso', valor: _fmtMoeda(r.rmiPreLimite) });
    passos.push({ label: 'Piso aplicado (SM)', valor: _fmtMoeda(r.piso), op: '↑' });
  } else if (r.limite === 'teto') {
    passos.push({ label: 'RMI antes do teto', valor: _fmtMoeda(r.rmiPreLimite) });
    passos.push({ label: 'Teto INSS aplicado', valor: _fmtMoeda(r.teto), op: '↓' });
  }
  passos.push({ label: 'RMI ESTIMADA', valor: _fmtMoeda(r.rmi), destaque: true });
  return passos;
}

function _renderDetalheRMI(r, regra) {
  if (!r || r.erro) return '';
  var passos = _renderPassos(r, regra);
  var html = '<div class="p3-rmi-detalhe">'
    + '<div class="p3-rmi-detalhe-head">'
    + '  <span class="p3-rmi-detalhe-titulo">💰 RMI estimada</span>'
    + '  <span class="p3-rmi-detalhe-valor">' + _fmtMoeda(r.rmi) + '</span>'
    + '</div>'
    + '<div class="p3-rmi-passos">';
  passos.forEach(function(p) {
    html += '<div class="p3-rmi-passos-linha' + (p.destaque ? ' destaque' : '') + '">'
      + '<span>' + (p.op ? '<span class="op">' + p.op + '</span>' : '') + _esc(p.label) + '</span>'
      + '<span>' + _esc(p.valor) + '</span>'
      + '</div>';
  });
  html += '</div>'
    + '<div class="p3-rmi-disclaimer">'
    + 'Estimativa com INPC anual acumulado — precisão ~±3%. O valor oficial usa multiplicadores mensais da Portaria MPS vigente na DER.'
    + '</div>'
    + '</div>';
  return html;
}

function _renderBlocoMelhor(r, regra, ctx) {
  if (!r || r.erro) {
    return '<div class="p3-melhor-rmi">'
      + '<div class="p3-melhor-rmi-left">'
      + '  <div class="p3-melhor-rmi-label">RMI ESTIMADA</div>'
      + '  <div class="p3-melhor-rmi-hint">' + _esc(r && r.erro || 'Não foi possível calcular') + '</div>'
      + '</div></div>';
  }
  var hint;
  if (r.limite === 'piso') hint = 'limitada ao salário mínimo';
  else if (r.limite === 'teto') hint = 'limitada ao teto do INSS';
  else if (r.fator) hint = 'inclui fator previdenciário ' + r.fator.toFixed(3);
  else hint = 'baseada em ' + r.qtdSCs + ' salários de contribuição';

  return '<div class="p3-melhor-rmi">'
    + '<div class="p3-melhor-rmi-left">'
    + '  <div class="p3-melhor-rmi-label">RMI ESTIMADA</div>'
    + '  <div class="p3-melhor-rmi-valor">' + _fmtMoeda(r.rmi) + '</div>'
    + '  <div class="p3-melhor-rmi-hint">' + _esc(hint) + '</div>'
    + '</div>'
    + '<button class="p3-melhor-rmi-btn" onclick="window._apRmiAbrirMemoria()">Ver cálculo</button>'
    + '</div>';
}

// ──────────────────────────────────────────────────────────
// MODAL — MEMÓRIA DE CÁLCULO COMPLETA
// ──────────────────────────────────────────────────────────

window._apRmiMemoriaAtual = null;

window._apRmiAbrirMemoria = function() {
  var m = window._apRmiMemoriaAtual;
  if (!m || !m.resultado || m.resultado.erro) {
    alert('Sem memória de cálculo disponível.');
    return;
  }
  var r = m.resultado;
  var regra = m.regra;
  var ctx = m.ctx;

  var passos = _renderPassos(r, regra);
  var passosHtml = '';
  passos.forEach(function(p) {
    passosHtml += '<div class="p3-rmi-passos-linha' + (p.destaque ? ' destaque' : '') + '">'
      + '<span>' + (p.op ? '<span class="op">' + p.op + '</span>' : '') + _esc(p.label) + '</span>'
      + '<span>' + _esc(p.valor) + '</span>'
      + '</div>';
  });

  var tabelaSC = '<table><thead><tr>'
    + '<th>Competência</th>'
    + '<th class="num">SC original</th>'
    + '<th class="num">Mult.</th>'
    + '<th class="num">SC atualizado</th>'
    + '</tr></thead><tbody>';
  r.sc.forEach(function(s) {
    var mult = _multInflacao(s.ano, r.derAno);
    tabelaSC += '<tr>'
      + '<td>' + _esc(s.comp) + '</td>'
      + '<td class="num">' + _fmtMoedaCompacta(s.original) + '</td>'
      + '<td class="num">' + mult.toFixed(3) + '</td>'
      + '<td class="num">' + _fmtMoedaCompacta(s.atualizado) + '</td>'
      + '</tr>';
  });
  tabelaSC += '</tbody></table>';

  var html = '<div class="p3-rmi-modal" onclick="if(event.target===this)window._apRmiFecharMemoria()">'
    + '<div class="p3-rmi-modal-box">'
    + '  <div class="p3-rmi-modal-head">'
    + '    <div class="p3-rmi-modal-title">Memória de cálculo — ' + _esc(regra.nome) + '</div>'
    + '    <button class="p3-rmi-modal-close" onclick="window._apRmiFecharMemoria()">×</button>'
    + '  </div>'
    + '  <div class="p3-rmi-modal-body">'
    + '    <div class="p3-rmi-modal-secao">'
    + '      <h4>Passo a passo</h4>'
    + '      <div class="p3-rmi-passos">' + passosHtml + '</div>'
    + '    </div>'
    + '    <div class="p3-rmi-modal-secao">'
    + '      <h4>Salários de contribuição considerados (' + r.sc.length + ')</h4>'
    + '      <div class="explic">Cada salário de contribuição é atualizado pelo INPC anual acumulado do ano da competência até o ano da DER (' + r.derAno + ').</div>'
    + '      <div class="p3-rmi-tabela-sc">' + tabelaSC + '</div>'
    + '    </div>'
    + '    <div class="p3-rmi-modal-secao">'
    + '      <h4>Base normativa</h4>'
    + '      <div class="explic">'
    + (regra.nome === 'Direito Adquirido'
        ? 'Art. 29, I da Lei 8.213/91 (regra anterior à EC 103): média aritmética simples dos 80% maiores salários de contribuição do período contributivo a partir de julho/1994, multiplicada pelo fator previdenciário (opcional desde a Lei 13.183/2015).'
        : (regra.nome === 'Pedágio 100%'
            ? 'Art. 20 da EC 103/2019: RMI corresponde a 100% da média aritmética simples de todos os salários de contribuição desde julho/1994 — sem fator previdenciário e sem coeficiente de redução.'
            : (regra.nome === 'Pedágio 50%'
                ? 'Art. 17 da EC 103/2019: RMI = 100% da média × fator previdenciário. O fator é aplicado obrigatoriamente nesta regra.'
                : 'Art. 26 da EC 103/2019: RMI = 60% da média de 100% dos salários de contribuição + 2% por ano que ultrapassar 20 anos (homens) ou 15 anos (mulheres) de tempo de contribuição.')))

    + '      <strong>⚠ Estimativa.</strong> Usa INPC anual acumulado (base jul/1994). O cálculo oficial do INSS emprega multiplicadores MENSAIS da Portaria MPS vigente na DER — pode divergir em até ~3%. Este valor serve para planejamento, não substitui o cálculo oficial.'
    + '    </div>'
    + '  </div>'
    + '</div></div>';

  wrapper.id = '_apRmiModalWrapper';
  wrapper.innerHTML = html;

window._apRmiFecharMemoria = function() {
  var w = document.getElementById('_apRmiModalWrapper');
  if (w) w.remove();

// ──────────────────────────────────────────────────────────
// HOOK PÓS-RENDER — injeta RMI no DOM
// ──────────────────────────────────────────────────────────

function _injetar() {
  var ctx = _obterCtx();
  if (!ctx._temCnis) return;
  if (!window.AP_Plan || !window.AP_Plan.calcPedagio50) return; // módulos ainda não carregaram

  var resultados = _recomputarRegras(ctx);
  var melhor = _identificarMelhor(resultados);

  // Cache de memórias (para o modal)
  var memorias = {};

  // 1. Card Melhor Opção
  var cardMelhor = document.querySelector('.p3-melhor');
  if (cardMelhor && melhor && !cardMelhor.querySelector('.p3-melhor-rmi')) {
    var rmiMelhor = calcularRMI(melhor, ctx);
    cardMelhor.insertAdjacentHTML('beforeend', _renderBlocoMelhor(rmiMelhor, melhor, ctx));
    memorias[melhor.nome] = { regra: melhor, resultado: rmiMelhor, ctx: ctx };
    window._apRmiMemoriaAtual = memorias[melhor.nome];
  }

  // 2. Cada linha de benefício
  var linhas = document.querySelectorAll('.p3-beneficio-linha');
  linhas.forEach(function(linha) {
    if (linha.querySelector('.p3-ben-rmi-mini')) return; // já injetado
    var nomeEl = linha.querySelector('.p3-beneficio-nome');
    if (!nomeEl) return;
    var nome = nomeEl.textContent.trim();
    var regra = resultados.find(function(x){ return x.nome === nome; });
    if (!regra || !regra.aplicavel) return;

    var rmiR = calcularRMI(regra, ctx);
    if (!rmiR || rmiR.erro) return;

    memorias[regra.nome] = { regra: regra, resultado: rmiR, ctx: ctx };

    // Mini badge antes da data
    var cls = 'p3-ben-rmi-mini';
    if (rmiR.limite === 'piso') cls += ' piso';
    else if (rmiR.limite === 'teto') cls += ' teto';
    var miniHtml = '<div class="' + cls + '" title="RMI estimada">'
      + _fmtMoeda(rmiR.rmi)
      + '</div>';
    var dataEl = linha.querySelector('.p3-beneficio-data');
    if (dataEl) dataEl.insertAdjacentHTML('beforebegin', miniHtml);

    // Bloco detalhado dentro do accordion
    var detalhe = linha.nextElementSibling;
    if (detalhe && detalhe.classList.contains('p3-beneficio-detalhe') && !detalhe.querySelector('.p3-rmi-detalhe')) {
      detalhe.insertAdjacentHTML('beforeend', _renderDetalheRMI(rmiR, regra));
    }
  });

  // Expõe memórias para eventual uso
  window._apRmiMemorias = memorias;
}

// Monkey-patch em window.renderPlanejamento
var _renderOrig = window.renderPlanejamento;
window.renderPlanejamento = function() {
  if (typeof _renderOrig === 'function') {
    try { _renderOrig.apply(this, arguments); } catch (e) { console.error('[rmi] erro no render original:', e); }
  }
  setTimeout(_injetar, 40);
};

// Re-injeção em navegação de aba (caso o plan seja renderizado depois)
setTimeout(function() {
  if (typeof window.renderPlanejamento === 'function') _injetar();
}, 500);

// Exposição pública
window.AP_Plan = window.AP_Plan || {};
window.AP_Plan.calcularRMI = calcularRMI;
window.AP_Plan.INPC_ACUM = INPC_ACUM;
window.AP_Plan.TETO_INSS = TETO_INSS;

console.log('[A&P Plan] Módulo RMI v1 carregado');

})();
</script>

<script>

  if (!d) d = new Date();

               'julho','agosto','setembro','outubro','novembro','dezembro'];
  return d.getDate() + ' de ' + meses[d.getMonth()] + ' de ' + d.getFullYear();
}

function _temCnis() {
  var dados = window.dadosExtraidos || {};
  var todos = window._todosDocumentosDados || [];
  var cnis = (todos || []).find(function(d) {
    return d && (d._tipoDetectado === 'cnis' || /cnis|extrato/i.test(d.tipoDocumento || ''));
  });
  return !!(cnis && cnis._vinculos && cnis._vinculos.length) || !!(dados && dados._vinculos && dados._vinculos.length);
}

function _montarCabecalhoPDF() {
  var dados = window.dadosExtraidos || {};
  var todos = window._todosDocumentosDados || [];
  var cnis = (todos || []).find(function(d) {
    return d && (d._tipoDetectado === 'cnis' || /cnis|extrato/i.test(d.tipoDocumento || ''));

  var nome = dados.nomeCliente || cnis.nomeCliente || 'Segurado';

  var derTxt = '—';
  var derInput = document.getElementById('p3-der-input');
  if (derInput && derInput.value) {
    var p = derInput.value.split('-');

  meta.push('<span>DER ' + _esc(derTxt) + '</span>');

    + '      <div class="pdf-cabecalho-logo">A&amp;P</div>'
    + '      <div class="pdf-cabecalho-sub">Planejamento Previdenciário</div>'
    + '    </div>'
    + '    <div class="pdf-cabecalho-data">'
    + '      Relatório emitido em<br>'
    + '      <strong>' + _fmtDataLonga(new Date()) + '</strong>'
    + '    </div>'
    + '  </div>'
    + '  <div class="pdf-cabecalho-titulo">' + _esc(nome) + '</div>'
    + '  <div class="pdf-cabecalho-meta">' + meta.join('') + '</div>'
    + '</div>';
}

function _montarRodapePDF() {
  return ''
    + '<div class="pdf-rodape pdf-only">'
    + '  <div class="pdf-rodape-divisao">'
    + '    <span>A&amp;P — Planejamento Previdenciário</span>'
    + '    <span>Emitido ' + _fmtDataLonga(new Date()) + '</span>'
    + '  </div>'
    + '  <div class="pdf-rodape-disclaimer">'
    + '    Este relatório é uma <strong>estimativa técnica</strong> baseada nos dados do CNIS fornecido. '
    + '    Os valores de RMI foram calculados com base em INPC anual acumulado (precisão aproximada de ±3% '
    + '    frente aos multiplicadores mensais da Portaria MPS vigente). Recomenda-se que o cálculo definitivo '
    + '    seja realizado pelo INSS na data do requerimento administrativo (DER). As conclusões aqui expostas '
    + '    não constituem concessão de benefício nem parecer jurídico vinculante.'
    + '  </div>'
    + '</div>';
}

function _esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}

// ──────────────────────────────────────────────────────────
// ORQUESTRADOR
// ──────────────────────────────────────────────────────────

window._apGerarPDF = function() {
  if (!_temCnis()) {
    var msg = '⚠ Anexe o CNIS antes de gerar o PDF.';
    if (typeof window.toast === 'function') window.toast(msg);
    else alert(msg);
    return;
  }

  // 1. Garante que o render está atualizado
  if (typeof window.renderPlanejamento === 'function') {
    try { window.renderPlanejamento(); } catch(e) {}
  }

  // 2. Abre todos os accordions (para aparecerem no PDF)
  setTimeout(function() {
    var secoesAbertas = [];
    document.querySelectorAll('.p3-secao').forEach(function(s) {
      if (!s.classList.contains('aberta')) {
        secoesAbertas.push(s);
        s.classList.add('aberta');
      }
    });

    // 3. Injeta cabeçalho antes do #tab-planejamento
    var tab = document.getElementById('tab-planejamento');
    var cabecalho = null, rodape = null;
    if (tab) {
      var wrapperCab = document.createElement('div');
      wrapperCab.innerHTML = _montarCabecalhoPDF();
      cabecalho = wrapperCab.firstElementChild;
      tab.parentNode.insertBefore(cabecalho, tab);

      var wrapperRod = document.createElement('div');
      wrapperRod.innerHTML = _montarRodapePDF();
      rodape = wrapperRod.firstElementChild;
      tab.parentNode.insertBefore(rodape, tab.nextSibling);
    }

    // 4. Nome de arquivo sugerido
    var dados = window.dadosExtraidos || {};
    var todos = window._todosDocumentosDados || [];
    var cnis = (todos || []).find(function(d) {
      return d && (d._tipoDetectado === 'cnis' || /cnis|extrato/i.test(d.tipoDocumento || ''));
    }) || dados;
    var nomeCli = (dados.nomeCliente || cnis.nomeCliente || 'segurado').toLowerCase()
      .replace(/[áàâãä]/g,'a').replace(/[éèêë]/g,'e').replace(/[íìîï]/g,'i')
      .replace(/[óòôõö]/g,'o').replace(/[úùûü]/g,'u').replace(/[ç]/g,'c')
      .replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
    var dataArq = new Date().toISOString().slice(0,10);
    var titleOrig = document.title;
    document.title = 'planejamento-' + nomeCli + '-' + dataArq;

    // 5. Aciona o diálogo de impressão
    //    Pequeno delay para garantir que o render/CSS foram aplicados
    setTimeout(function() {
      window.print();

      // 6. Restaura após imprimir (o "afterprint" pode não disparar no iOS)
      setTimeout(function() {
        if (cabecalho && cabecalho.parentNode) cabecalho.parentNode.removeChild(cabecalho);
        if (rodape && rodape.parentNode)       rodape.parentNode.removeChild(rodape);
        secoesAbertas.forEach(function(s) { s.classList.remove('aberta'); });
        document.title = titleOrig;
      }, 500);
    }, 100);
  }, 150);
};

// Também responde ao evento afterprint (mais limpo em desktop)
window.addEventListener('afterprint', function() {
  // cleanup defensivo de quaisquer elementos pdf-only deixados
  document.querySelectorAll('.pdf-cabecalho.pdf-only, .pdf-rodape.pdf-only').forEach(function(el) {
    if (el.parentNode) el.parentNode.removeChild(el);
  });
});

console.log('[A&P Plan] Módulo PDF v1 carregado');

})();
</script>

<script>
(function() {
'use strict';

if (window._apTramitacaoInstalled) return;
window._apTramitacaoInstalled = true;

// ──────────────────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────────────────

function _parseComp(s) {
  if (!s || typeof s !== 'string') return null;
  var m = s.match(/^(\d{2})\/(\d{4})$/);
  if (!m) return null;
  return new Date(parseInt(m[2]), parseInt(m[1]) - 1, 15);
}
function _parseCompIni(s) {
  // Primeiro dia do mês
  if (!s || typeof s !== 'string') return null;
  var m = s.match(/^(\d{2})\/(\d{4})$/);
  if (!m) return null;
  return new Date(parseInt(m[2]), parseInt(m[1]) - 1, 1);
}
function _parseDataBR(s) {
  if (!s || typeof s !== 'string') return null;
  var m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (!m) return null;
  return new Date(parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1]));
}
function _parseDataISO(s) {
  if (!s || typeof s !== 'string') return null;
  var m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return null;
  return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
}
function _fmtData(d) {
  if (!d) return '—';
  return ('0'+d.getDate()).slice(-2) + '/' + ('0'+(d.getMonth()+1)).slice(-2) + '/' + d.getFullYear();
}
function _fmtTempo(meses) {
  if (!meses || meses <= 0) return '—';
  var a = Math.floor(meses/12), m = meses%12;
  return a + 'a ' + m + 'm';
}
function _fmtMoeda(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return 'R$ ' + v.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d)\,)/g, '.');
}
function _esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}
function _indicadoresStr(c) {
  var i = c.indicadores;
  if (typeof i === 'string') return i;
  if (Array.isArray(i)) return i.join(' ');
  return '';
}
function _ehInvalida(c) {
  var s = _indicadoresStr(c);
  // IREC-LIM-SM NÃO invalida carência — é apenas SC limitado ao SM.
  // Para a aposentadoria por idade urbana/híbrida, a competência conta.
  return /PSC-MEN-SM|PREC-MENOR-MIN/.test(s);
}
function _ehReduzida(c) {
  var s = _indicadoresStr(c);
  // MEI (5%), LC123 (11%), IREC-LIM-SM (limitado SM)
  return /IREC-MEI|IREC-LC123|IREC-LIM-SM|PSC-MEN-SM/.test(s);
}

// ──────────────────────────────────────────────────────────
// CONTEXTO (reaproveita DOM DER + globais)
// ──────────────────────────────────────────────────────────

function _obterCtx() {
  var dados = window.dadosExtraidos || {};
  var todos = window._todosDocumentosDados || [];
  var cnis = (todos || []).find(function(d){
    return d && (d._tipoDetectado === 'cnis' || /cnis|extrato/i.test(d.tipoDocumento || ''));
  }) || dados;

  var der = new Date();
  var derInput = document.getElementById('p3-der-input');
  if (derInput && derInput.value) {
    var d = _parseDataISO(derInput.value);
    if (d) der = d;
  }

  var nasc = _parseDataBR(dados.dataNascimento || cnis.dataNascimento);
  var idadeMeses = nasc
    ? ((der.getFullYear() - nasc.getFullYear()) * 12 + (der.getMonth() - nasc.getMonth()))
    : 0;

  var tempoAteDer = 0, carenciaAteDer = 0;
  if (cnis && cnis._contribuicoesDetalhadas) {
    cnis._contribuicoesDetalhadas.forEach(function(c) {
      var d = _parseComp(c.comp);
      if (!d || d > der) return;
      tempoAteDer++;
      if (!_ehInvalida(c)) carenciaAteDer++;
    });
  }

  var reforma = new Date(2019, 10, 13);
  var tempo2019 = 0, temPre = false;
  if (cnis && cnis._contribuicoesDetalhadas) {
    cnis._contribuicoesDetalhadas.forEach(function(c) {
      var d = _parseComp(c.comp);
      if (d && d < reforma) { temPre = true; tempo2019++; }
    });
  }

  var sexo = (function() {
    var n = (dados.nomeCliente || cnis.nomeCliente || '').split(' ')[0];
    return /a$/i.test(n) ? 'feminino' : 'masculino';
  })();

  return {
    nomeCliente: dados.nomeCliente || cnis.nomeCliente || 'Segurado',
    primeiroNome: (dados.nomeCliente || cnis.nomeCliente || 'Segurado').split(' ')[0],
    cpf: dados.cpfCnpj || cnis.cpfCnpj || '—',
    dataNascimento: nasc,
    sexo: sexo,
    der: der,
    idadeAtualMeses: idadeMeses,
    tempoContribMeses: tempoAteDer,
    carencia: carenciaAteDer,
    tempoContrib2019: tempo2019,
    temContribAnterior2019: temPre,
    tipoAtividade: (cnis && cnis.tipoAtividade) || dados.tipoAtividade,
    cnisOriginal: cnis,
    dadosOriginais: dados,
    _temCnis: !!(cnis && cnis._vinculos && cnis._vinculos.length),
    hoje: new Date(),
  };
}

// ──────────────────────────────────────────────────────────
// B) MARCOS TEMPORAIS
// ──────────────────────────────────────────────────────────

function calcularMarcos(ctx) {
  var cnis = ctx.cnisOriginal;
  if (!cnis || !cnis._contribuicoesDetalhadas) return [];

  // Datas de corte legais
  var EC20    = new Date(1998, 11, 16);
  var LEI9876 = new Date(1999, 10, 28);
  var EC103   = new Date(2019, 10, 13);
  var LEI14331 = new Date(2022, 4, 4);
  var hoje    = ctx.der || new Date();

  // Descobre primeiro ano de contribuição
  var contribs = cnis._contribuicoesDetalhadas || [];
  var primeiraData = null;
  contribs.forEach(function(c) {
    var d = _parseCompIni(c.comp);
    if (!d) return;
    if (!primeiraData || d < primeiraData) primeiraData = d;
  });

  // Monta lista de marcos
  var marcos = [];
  if (primeiraData && primeiraData <= EC20)    marcos.push({ data: EC20,    label: 'EC 20/98',     sub: '16/12/1998', tipo: 'legal' });
  if (primeiraData && primeiraData <= LEI9876) marcos.push({ data: LEI9876, label: 'Lei 9.876/99', sub: '28/11/1999', tipo: 'legal' });
  marcos.push({ data: EC103, label: 'EC 103/2019',  sub: '13/11/2019',  tipo: 'legal' });
  if (LEI14331 <= hoje)                        marcos.push({ data: LEI14331, label: 'Lei 14.331/22', sub: '04/05/2022', tipo: 'legal' });

  // 31/12 de cada ano desde 2019 até ano da DER
  var anoInicio = primeiraData ? Math.max(primeiraData.getFullYear(), 2019) : 2019;
  var anoFim    = hoje.getFullYear();
  for (var a = anoInicio; a <= anoFim; a++) {
    // Pula 31/12/2019 se já tem EC 103
    // (Mantém para ter a foto pós-reforma)
    marcos.push({ data: new Date(a, 11, 31), label: '31/12/' + a, sub: 'fim do ano', tipo: 'anual' });
  }
  // DER / hoje
  marcos.push({ data: hoje, label: 'DER', sub: _fmtData(hoje), tipo: 'agora' });

  // Calcula tempo/carência/idade/pontos em cada marco
  var nasc = ctx.dataNascimento;
  marcos.forEach(function(m) {
    var tempo = 0, carencia = 0;
    contribs.forEach(function(c) {
      var dc = _parseComp(c.comp);
      if (!dc || dc > m.data) return;
      tempo++;
      if (!_ehInvalida(c)) carencia++;
    });
    m.tempoMeses = tempo;
    m.carencia   = carencia;
    if (nasc) {
      var idadeMeses = (m.data.getFullYear() - nasc.getFullYear()) * 12 + (m.data.getMonth() - nasc.getMonth());
      m.idadeAnos = idadeMeses / 12;
    } else {
      m.idadeAnos = null;
    }
    // Pontos (Lei 13.183/2015) — só faz sentido após 2015, e só para tempo de contribuição
    if (m.idadeAnos !== null && tempo > 0) {
      m.pontos = (m.idadeAnos + tempo/12).toFixed(2);
    } else {
      m.pontos = '—';
    }
  });

  // Deduplica por data e ordena
  var vistos = {};
  var ordenados = marcos.filter(function(m) {
    var k = m.data.getTime();
    if (vistos[k]) return false;
    vistos[k] = true;
    return true;
  });
  ordenados.sort(function(a, b) { return a.data - b.data; });
  return ordenados;
}

// ──────────────────────────────────────────────────────────
// C) PERÍODOS DESCONSIDERADOS (alíquota reduzida ou abaixo SM)
// ──────────────────────────────────────────────────────────

function identificarPeriodosDesconsiderados(ctx) {
  var cnis = ctx.cnisOriginal;
  if (!cnis || !cnis._contribuicoesDetalhadas) return [];

  // Classifica cada competência
  var classificadas = cnis._contribuicoesDetalhadas.map(function(c) {
    var inds = _indicadoresStr(c);
    var tipo = null, aliquota = null, fundamento = null;

    if (/IREC-MEI/.test(inds)) {
      tipo = 'MEI';
      aliquota = '5%';
      fundamento = 'Art. 21, §2º, inc. I, alínea \'a\' da Lei 8.212/91';
    } else if (/IREC-LC123/.test(inds) && !/IREC-MEI/.test(inds)) {
      tipo = 'LC 123 (facultativo baixa renda)';
      aliquota = '11%';
      fundamento = 'Art. 21, §2º, inc. II, alínea \'b\' da Lei 8.212/91';
    } else if (/PSC-MEN-SM|IREC-LIM-SM/.test(inds)) {
      tipo = 'SC abaixo do salário mínimo';
      aliquota = 'limitada ao SM';
      fundamento = 'Art. 195, §8º da CF/88 c/c Art. 29, §2º da Lei 8.213/91 — EC 103/2019';
    } else if (/PREC-MENOR-MIN/.test(inds)) {
      tipo = 'Recolhimento abaixo do mínimo';
      aliquota = '—';
      fundamento = 'Art. 21, §2º da Lei 8.212/91';
    }

    return {
      comp: c.comp,
      data: _parseComp(c.comp),
      valor: c.valor,
      inds: inds,
      tipo: tipo,
      aliquota: aliquota,
      fundamento: fundamento,
    };
  }).filter(function(c) {
    return c.tipo !== null; // só as desconsideradas
  });

  // Descobre a qual vínculo cada competência pertence
  var vinculos = (cnis._vinculos || []);
  function vincDe(data) {
    if (!data) return null;
    for (var i = 0; i < vinculos.length; i++) {
      var v = vinculos[i];
      var ini = _parseDataBR(v.inicio);
      var fim = v.fim ? _parseDataBR(v.fim) : new Date(2099, 11, 31);
      if (ini && data >= ini && data <= fim) return v;
    }
    return null;
  }
  classificadas.forEach(function(c) {
    var v = vincDe(c.data);
    c.vinculo = v;
    c.vinculoSeq = v ? v.seq : '—';
  });

  // Agrupa em ranges contíguos (mesmo vínculo + mesmo tipo)
  classificadas.sort(function(a,b){ return a.data - b.data; });

  var grupos = [];
  classificadas.forEach(function(c) {
    var ultimo = grupos[grupos.length - 1];
    if (ultimo && ultimo.tipo === c.tipo && ultimo.vinculoSeq === c.vinculoSeq) {
      // Verifica contiguidade (mês seguinte)
      var dUlt = ultimo.ultimaData;
      var mUlt = dUlt.getMonth() + 1, aUlt = dUlt.getFullYear();
      if (mUlt === 12) { mUlt = 0; aUlt++; } else { mUlt = mUlt; }
      var esperada = new Date(aUlt, mUlt, 15);
      if (Math.abs(c.data - esperada) < 20 * 24 * 3600 * 1000) {
        ultimo.ultimaComp = c.comp;
        ultimo.ultimaData = c.data;
        ultimo.competencias.push(c.comp);
        return;
      }
    }
    grupos.push({
      tipo: c.tipo,
      aliquota: c.aliquota,
      fundamento: c.fundamento,
      vinculoSeq: c.vinculoSeq,
      vinculo: c.vinculo,
      primeiraComp: c.comp,
      ultimaComp: c.comp,
      primeiraData: c.data,
      ultimaData: c.data,
      competencias: [c.comp],
    });
  });

  return grupos;
}

// ──────────────────────────────────────────────────────────
// G) BENEFÍCIOS NÃO-PROGRAMÁVEIS
// ──────────────────────────────────────────────────────────

function analisarNaoProgramaveis(ctx, qualidade) {
  var temQualidade = qualidade && (qualidade.status === 'ativo' || qualidade.status === 'graca');
  var idadeAnos = ctx.idadeAtualMeses / 12;
  var carencia  = ctx.carencia || 0;
  var lista = [];

  lista.push({
    icone: '🤕',
    nome: 'Auxílio por Incapacidade Temporária',
    sub:  'Art. 59 Lei 8.213/91',
    regra: 'Carência de 12 meses + qualidade de segurado. Dispensada para acidente do trabalho ou doenças graves taxativas.',
    status: (temQualidade && carencia >= 12) ? 'sim' : (!temQualidade ? 'nao' : 'talvez'),
    motivo: !temQualidade ? 'Sem qualidade de segurado na DER' : (carencia < 12 ? 'Carência insuficiente (' + carencia + '/12)' : 'Cumpre requisitos; depende de perícia do INSS'),
  });

  lista.push({
    icone: '♿',
    nome: 'Aposentadoria por Incapacidade Permanente',
    sub:  'Art. 42 Lei 8.213/91',
    regra: 'Carência de 12 meses + qualidade + incapacidade total e permanente. Dispensada para acidente ou doenças taxativas.',
    status: (temQualidade && carencia >= 12) ? 'sim' : (!temQualidade ? 'nao' : 'talvez'),
    motivo: !temQualidade ? 'Sem qualidade de segurado' : (carencia < 12 ? 'Carência insuficiente' : 'Depende de perícia médica pericial'),
  });

  if (ctx.sexo === 'feminino') {
    var temRural = ctx.tipoAtividade === 'RURAL' || ctx._rural;
    lista.push({
      icone: '🤰',
      nome: 'Salário-Maternidade',
      sub:  'Art. 71 Lei 8.213/91',
      regra: temRural
        ? 'Rural: sem carência — basta comprovar atividade por 10 meses'
        : 'Urbana: 10 meses de carência (CI/facultativa). Empregada não tem carência.',
      status: temQualidade ? 'talvez' : 'nao',
      motivo: !temQualidade ? 'Sem qualidade de segurada' : 'Apto — verificar tipo de segurada e evento (nascimento/adoção)',
    });
  }

  lista.push({
    icone: '💔',
    nome: 'Pensão por Morte (dependentes)',
    sub:  'Art. 74 Lei 8.213/91',
    regra: 'Sem carência. Basta qualidade do instituidor no óbito. Beneficiários: cônjuge, filhos menores/inválidos, pais dependentes.',
    status: temQualidade ? 'talvez' : 'nao',
    motivo: 'Benefício para dependentes — não para o titular. Relevante para planejamento sucessório.',
  });

  if (idadeAnos >= 65) {
    lista.push({
      icone: '👵',
      nome: 'BPC/LOAS — Idoso',
      sub:  'Art. 20 Lei 8.742/93',
      regra: 'Idade ≥ 65 anos + renda per capita familiar < ¼ do SM + inscrição no CadÚnico.',
      status: 'talvez',
      motivo: 'Não requer contribuição. Exige comprovação de miserabilidade no CadÚnico.',
    });
  }

  lista.push({
    icone: '♿',
    nome: 'BPC/LOAS — Deficiência',
    sub:  'Art. 20, §2º da Lei 8.742/93',
    regra: 'Qualquer idade + deficiência de longo prazo (≥ 2 anos) + renda ¼ do SM + CadÚnico.',
    status: 'talvez',
    motivo: 'Requer perícia social + médica do INSS e CadÚnico atualizado.',
  });

  return lista;
}

// ──────────────────────────────────────────────────────────
// Expõe API pública
// ──────────────────────────────────────────────────────────

window.AP_Plan = window.AP_Plan || {};
window.AP_Plan.calcularMarcos                 = calcularMarcos;
window.AP_Plan.identificarPeriodosDesconsider = identificarPeriodosDesconsiderados;
window.AP_Plan.analisarNaoProgramaveis        = analisarNaoProgramaveis;
window.AP_Plan._tramitUtils = { _parseComp: _parseComp, _parseDataBR: _parseDataBR, _ehInvalida: _ehInvalida, _ehReduzida: _ehReduzida };

// Os renders vêm na parte 2 deste módulo
window._apTramitacaoObterCtx = _obterCtx;
window._apTramitacaoFmtTempo = _fmtTempo;
window._apTramitacaoFmtData = _fmtData;
window._apTramitacaoFmtMoeda = _fmtMoeda;
window._apTramitacaoEsc = _esc;

console.log('[A&P Plan] Módulo Tramitação v1 — parte 1 (cálculos) carregada');

})();
</script>


<!-- ═══════════════════════════════════════════════════════════════
     MÓDULO TRAMITAÇÃO v1 — parte 2 (render DOM)
     ───────────────────────────────────────────────────────────────
     Depende da parte 1 (cálculos expostos em window.AP_Plan.*)
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function() {
'use strict';

if (window._apTramitacaoRenderInstalled) return;
window._apTramitacaoRenderInstalled = true;

var AP = window.AP_Plan || {};
var _obterCtx  = window._apTramitacaoObterCtx;
var _fmtTempo  = window._apTramitacaoFmtTempo;
var _fmtData   = window._apTramitacaoFmtData;
var _fmtMoeda  = window._apTramitacaoFmtMoeda;
var _esc       = window._apTramitacaoEsc;

if (!_obterCtx) {
  console.warn('[tramitacao] parte 1 não carregada, abortando');
  return;
}

// ──────────────────────────────────────────────────────────
// A) RENDER — tabela síntese
// ──────────────────────────────────────────────────────────

function _renderSintese(ctx, resultados, melhorNome) {
  var aplicaveis = resultados.filter(function(r){ return r.aplicavel; });
  if (!aplicaveis.length) return '';

  // Ordena: melhor primeiro, depois com direito, depois por data
  aplicaveis.sort(function(a, b) {
    if (a.nome === melhorNome) return -1;
    if (b.nome === melhorNome) return 1;
    if (a.temDireito !== b.temDireito) return a.temDireito ? -1 : 1;
    if (a.fatorAplica !== b.fatorAplica) return (a.fatorAplica ? 1 : 0) - (b.fatorAplica ? 1 : 0);
    if (a.dataDireito && b.dataDireito) return a.dataDireito - b.dataDireito;
    if (a.dataDireito) return -1;
    if (b.dataDireito) return 1;
    return 0;
  });

  var linhas = aplicaveis.map(function(r) {
    // Status da direito
    var status, statusClass;
    if (r.temDireito && r.fatorAplica)      { status = 'Com fator'; statusClass = 'fator'; }
    else if (r.temDireito)                   { status = '✓ Hoje';    statusClass = 'sim'; }
    else if (r.dataDireito)                  { status = _fmtData(r.dataDireito); statusClass = 'nao'; }
    else                                      { status = 'Sem projeção'; statusClass = 'nao'; }

    // RMI — só se tem direito (postura do Tramitação)
    var rmiHtml = '<span class="p3-sintese-rmi sem">Sem direito</span>';
    if (r.temDireito && AP.calcularRMI) {
      try {
        var rmiR = AP.calcularRMI(r, ctx);
        if (rmiR && !rmiR.erro) {
          rmiHtml = '<span class="p3-sintese-rmi">' + _fmtMoeda(rmiR.rmi) + '</span>';
        }
      } catch (e) {}
    }

    var nomeClasse = (r.nome === melhorNome) ? 'p3-sintese-nome melhor' : 'p3-sintese-nome';
    var trClasse   = (r.nome === melhorNome) ? 'melhor-linha' : '';

    return ''
      + '<tr class="' + trClasse + '" onclick="window._apTramitRolarPara(\'' + _esc(r.nome).replace(/'/g, '\\\'') + '\')">'
      + '  <td>'
      + '    <div class="' + nomeClasse + '">' + _esc(r.nome) + '</div>'
      + (r.base ? '<div class="p3-sintese-sub-regra">' + _esc(r.base) + '</div>' : '')
      + '  </td>'
      + '  <td class="num">' + _fmtTempo(ctx.tempoContribMeses) + '</td>'
      + '  <td class="num">' + (ctx.carencia || 0) + '</td>'
      + '  <td><span class="p3-sintese-direito ' + statusClass + '">' + _esc(status) + '</span></td>'
      + '  <td class="num">' + rmiHtml + '</td>'
      + '</tr>';
  }).join('');

  return ''
    + '<div class="p3-sintese" id="p3-sintese-box">'
    + '  <div class="p3-sintese-head">'
    + '    <div class="p3-sintese-titulo">Síntese dos Benefícios Programáveis</div>'
    + '    <div class="p3-sintese-sub">' + aplicaveis.length + ' aplicáveis · DER ' + _fmtData(ctx.der) + '</div>'
    + '  </div>'
    + '  <table class="p3-sintese-tabela">'
    + '    <thead><tr>'
    + '      <th>Benefício</th>'
    + '      <th class="num">Tempo contrib.</th>'
    + '      <th class="num">Carência</th>'
    + '      <th>Direito</th>'
    + '      <th class="num">RMI estimada</th>'
    + '    </tr></thead>'
    + '    <tbody>' + linhas + '</tbody>'
    + '  </table>'
    + '</div>';
}

// Handler: rola até o detalhe da regra
window._apTramitRolarPara = function(nome) {
  var linhas = document.querySelectorAll('.p3-beneficio-linha');
  for (var i = 0; i < linhas.length; i++) {
    var nomeEl = linhas[i].querySelector('.p3-beneficio-nome');
    if (nomeEl && nomeEl.textContent.trim() === nome) {
      // Abre o accordion da seção de benefícios
      var secao = linhas[i].closest('.p3-secao');
      if (secao && !secao.classList.contains('aberta')) secao.classList.add('aberta');
      // Rola
      linhas[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
      // Destaque visual momentâneo
      linhas[i].style.transition = 'background .8s ease';
      linhas[i].style.background = 'rgba(201,168,76,.15)';
      setTimeout(function() { linhas[i].style.background = ''; }, 1200);
      // Expande o detalhe usando a classe oficial (mesma do toggle)
      var det = linhas[i].nextElementSibling;
      if (det && det.classList.contains('p3-beneficio-detalhe')) {
        det.classList.add('aberto');
      }
      return;
    }
  }
};

// ──────────────────────────────────────────────────────────
// B) RENDER — marcos temporais
// ──────────────────────────────────────────────────────────

function _renderMarcos(ctx) {
  if (!AP.calcularMarcos) return '';
  var marcos = AP.calcularMarcos(ctx);
  if (!marcos.length) return '';

  var linhas = marcos.map(function(m) {
    var clsRow = m.tipo === 'legal' ? 'legal' : (m.tipo === 'agora' ? 'agora' : '');
    var idade = m.idadeAnos !== null ? (Math.floor(m.idadeAnos) + 'a ' + Math.round((m.idadeAnos - Math.floor(m.idadeAnos)) * 12) + 'm') : '—';
    return ''
      + '<tr class="' + clsRow + '">'
      + '  <td class="p3-marcos-marco">' + _esc(m.label) + ' <small>' + _esc(m.sub) + '</small></td>'
      + '  <td class="num">' + _fmtTempo(m.tempoMeses) + '</td>'
      + '  <td class="num">' + (m.carencia || 0) + '</td>'
      + '  <td class="num">' + idade + '</td>'
      + '  <td class="num">' + m.pontos + '</td>'
      + '</tr>';
  }).join('');

  return ''
    + '<table class="p3-marcos-tabela">'
    + '  <thead><tr>'
    + '    <th>Marco temporal</th>'
    + '    <th class="num">Tempo contrib.</th>'
    + '    <th class="num">Carência</th>'
    + '    <th class="num">Idade</th>'
    + '    <th class="num">Pontos</th>'
    + '  </tr></thead>'
    + '  <tbody>' + linhas + '</tbody>'
    + '</table>'
    + '<div style="margin-top:10px;font-size:11px;color:var(--muted2);font-style:italic;line-height:1.5;">'
    + '  Marcos destacados em dourado: datas de alteração legislativa. '
    + '  Linha em azul: DER em análise. '
    + '  Pontos seguem a Lei 13.183/2015 (idade + tempo ÷ 12).'
    + '</div>';
}

// ──────────────────────────────────────────────────────────
// C) RENDER — períodos desconsiderados
// ──────────────────────────────────────────────────────────

function _renderDesconsiderados(ctx) {
  if (!AP.identificarPeriodosDesconsider) return '';
  var grupos = AP.identificarPeriodosDesconsider(ctx);
  if (!grupos.length) return '';

  var totalMeses = 0;
  var linhas = grupos.map(function(g) {
    totalMeses += g.competencias.length;
    var periodo = g.primeiraComp === g.ultimaComp
      ? g.primeiraComp
      : g.primeiraComp + ' a ' + g.ultimaComp;
    var vinc = g.vinculo ? '#' + g.vinculoSeq + ' ' + (g.vinculo.empresa || '').substring(0, 30) : 'vínculo —';
    return ''
      + '<tr>'
      + '  <td>#' + _esc(g.vinculoSeq) + '</td>'
      + '  <td>' + _esc(periodo) + '<div class="p3-desconsid-fundamento">' + _esc(vinc) + '</div></td>'
      + '  <td>' + _esc(g.tipo) + '<div class="p3-desconsid-fundamento">' + _esc(g.fundamento) + '</div></td>'
      + '  <td class="num">' + _esc(g.aliquota) + '</td>'
      + '  <td class="num">' + g.competencias.length + '</td>'
      + '</tr>';
  }).join('');

  return ''
    + '<div class="p3-desconsid">'
    + '  <div class="p3-desconsid-titulo">⚠ Períodos desconsiderados por alíquota reduzida</div>'
    + '  <div class="p3-desconsid-desc">'
    + '    A alíquota normal dos contribuintes individuais e facultativos é de <strong>20%</strong>. '
    + '    Os períodos abaixo foram recolhidos com alíquota menor e, por isso, '
    + '    <strong>não contam para aposentadoria por tempo de contribuição</strong> '
    + '    (art. 21, §2º da Lei 8.212/91). Podem ser validados mediante '
    + '    <strong>complementação de alíquota</strong> (cálculo futuro).'
    + '  </div>'
    + '  <table class="p3-desconsid-tabela">'
    + '    <thead><tr>'
    + '      <th>Vínc.</th>'
    + '      <th>Período</th>'
    + '      <th>Tipo / fundamento</th>'
    + '      <th class="num">Alíquota</th>'
    + '      <th class="num">Meses</th>'
    + '    </tr></thead>'
    + '    <tbody>' + linhas + '</tbody>'
    + '  </table>'
    + '  <div class="p3-desconsid-total">Total desconsiderado: <strong>' + totalMeses + ' meses</strong> (' + Math.floor(totalMeses/12) + 'a ' + (totalMeses%12) + 'm)</div>'
    + '</div>';
}

// ──────────────────────────────────────────────────────────
// D) SUBSTITUIÇÃO do bloco RMI quando SEM direito
// ──────────────────────────────────────────────────────────

function _aplicarSemRMI(melhor, ctx) {
  var bloco = document.querySelector('.p3-melhor .p3-melhor-rmi');
  if (!bloco) return;
  // Só substitui se NÃO tem direito
  if (melhor && melhor.temDireito) return;

  var proxData = melhor && melhor.dataDireito ? _fmtData(melhor.dataDireito) : null;
  var proxNome = melhor ? melhor.nome : '—';

  var novo = document.createElement('div');
  novo.className = 'p3-sem-rmi';
  novo.innerHTML = ''
    + '<div class="p3-sem-rmi-tag">SEM CÁLCULO DE RMI</div>'
    + '<div class="p3-sem-rmi-titulo">Sem direito a aposentadoria programável</div>'
    + '<div class="p3-sem-rmi-desc">'
    + '  O <strong>cálculo da Renda Mensal Inicial</strong> só se aplica quando há direito '
    + '  a algum benefício programável na DER em análise. Como nenhuma regra foi implementada, '
    + '  não é possível calcular valor de benefício, valor da causa ou atrasados.'
    + '</div>'
    + (proxData
        ? '<div class="p3-sem-rmi-projecao">📅 Projeção mais próxima: <strong>' + _esc(proxNome) + '</strong> em <strong>' + proxData + '</strong>.</div>'
        : '<div class="p3-sem-rmi-projecao">Nenhuma regra com projeção definida no momento.</div>');
  bloco.parentNode.replaceChild(novo, bloco);
}

// ──────────────────────────────────────────────────────────
// G) RENDER — benefícios não-programáveis
// ──────────────────────────────────────────────────────────

function _renderNaoProg(ctx) {
  if (!AP.analisarNaoProgramaveis) return '';
  // Precisa de qualidade de segurado
  var qualidade = { status: 'ativo' };
  if (AP.calcularQualidadeSegurado) {
    try { qualidade = AP.calcularQualidadeSegurado(ctx); } catch (e) {}
  }
  var lista = AP.analisarNaoProgramaveis(ctx, qualidade);

  var itens = lista.map(function(b) {
    return ''
      + '<div class="p3-naoprog-item">'
      + '  <div class="p3-naoprog-icone">' + b.icone + '</div>'
      + '  <div>'
      + '    <div class="p3-naoprog-nome">' + _esc(b.nome) + '</div>'
      + '    <div class="p3-naoprog-sub">' + _esc(b.sub) + '</div>'
      + '    <div class="p3-naoprog-regra">' + _esc(b.regra) + '</div>'
      + '  </div>'
      + '  <div class="p3-naoprog-status ' + b.status + '">'
      + (b.status === 'sim' ? '✓ apto' : b.status === 'talvez' ? 'depende' : 'sem direito')
      + '  </div>'
      + '  <div class="p3-naoprog-motivo">' + _esc(b.motivo) + '</div>'
      + '</div>';
  }).join('');

  return '<div class="p3-naoprog-lista">' + itens + '</div>'
    + '<div style="margin-top:10px;font-size:11px;color:var(--muted2);font-style:italic;line-height:1.5;">'
    + '  Benefícios <strong>não-programáveis</strong> dependem de eventos (doença, morte, maternidade) — '
    + '  não de idade ou tempo de contribuição. <strong>Apto</strong> = cumpre requisitos objetivos; '
    + '  <strong>depende</strong> = cumpre carência mas exige evento ou perícia.'
    + '</div>';
}

// ──────────────────────────────────────────────────────────
// RECOMPUTA regras e identifica melhor (mesma lógica do RMI)
// ──────────────────────────────────────────────────────────

function _recomputarRegras(ctx) {
  var res = [];
  if (AP.calcDireitoAdquirido) res.push(AP.calcDireitoAdquirido(ctx));
  if (AP.calcPedagio100)       res.push(AP.calcPedagio100(ctx));
  if (AP.calcPedagio50)        res.push(AP.calcPedagio50(ctx));
  if (AP.calcPontos)           res.push(AP.calcPontos(ctx));
  if (AP.calcIdadeProgressiva) res.push(AP.calcIdadeProgressiva(ctx));
  if (AP.calcRegraNova)        res.push(AP.calcRegraNova(ctx));
  return res;
}

function _identificarMelhor(resultados) {
  var aplic = resultados.filter(function(r){ return r.aplicavel; });
  if (!aplic.length) return null;
  aplic.sort(function(a, b) {
    if (a.nome === 'Direito Adquirido' && a.temDireito) return -1;
    if (b.nome === 'Direito Adquirido' && b.temDireito) return 1;
    if (a.temDireito && b.temDireito) {
      if (a.fatorAplica !== b.fatorAplica) return a.fatorAplica ? 1 : -1;
      return 0;
    }
    if (a.temDireito) return -1;
    if (b.temDireito) return 1;
    if (a.dataDireito && b.dataDireito) return a.dataDireito - b.dataDireito;
    if (a.dataDireito) return -1;
    if (b.dataDireito) return 1;
    return 0;
  });
  return aplic[0];
}

// ──────────────────────────────────────────────────────────
// ORQUESTRADOR — injeta tudo após re-render
// ──────────────────────────────────────────────────────────

function _injetar() {
  var ctx = _obterCtx();
  if (!ctx._temCnis) return;
  if (!AP.calcPedagio50) return;

  var resultados = _recomputarRegras(ctx);
  var melhor = _identificarMelhor(resultados);

  // ── A) Tabela síntese — antes da primeira .p3-secao ──
  var root = document.getElementById('tab-planejamento');
  if (root && !document.getElementById('p3-sintese-box')) {
    // O alvo é o primeiro .p3-secao dentro do root
    var primeiraSecao = root.querySelector('.p3-secao');
    if (primeiraSecao) {
      var syntHtml = _renderSintese(ctx, resultados, melhor ? melhor.nome : null);
      if (syntHtml) {
        var tmp = document.createElement('div');
        tmp.innerHTML = syntHtml;
        primeiraSecao.parentNode.insertBefore(tmp.firstElementChild, primeiraSecao);
      }
    }
  }

  // ── B) Marcos temporais — nova seção, depois do histórico ──
  if (root && !document.getElementById('p3-marcos-box')) {
    var histSecao = root.querySelector('[data-secao-id="historico"]');
    if (histSecao) {
      var marcosHtml = _renderMarcos(ctx);
      if (marcosHtml) {
        var secaoMarcos = document.createElement('div');
        secaoMarcos.className = 'p3-secao';
        secaoMarcos.id = 'p3-marcos-box';
        secaoMarcos.setAttribute('data-secao-id', 'marcos');
        secaoMarcos.innerHTML = ''
          + '<div class="p3-secao-head" onclick="window._apPlanToggleSecao(\'marcos\')">'
          + '  <span class="p3-secao-icon">🕰</span>'
          + '  <span class="p3-secao-titulo">Marcos Temporais</span>'
          + '  <span class="p3-secao-resumo">tempo, carência, idade e pontos em cada data-chave</span>'
          + '  <span class="p3-chevron">▾</span>'
          + '</div>'
          + '<div class="p3-secao-body">' + marcosHtml + '</div>';
        histSecao.parentNode.insertBefore(secaoMarcos, histSecao.nextSibling);
      }
    }
  }

  // ── C) Períodos desconsiderados — dentro da seção de pendências ──
  if (root && !root.querySelector('.p3-desconsid')) {
    var pendBody = root.querySelector('[data-secao-id="pendencias"] .p3-secao-body');
    if (pendBody) {
      var descHtml = _renderDesconsiderados(ctx);
      if (descHtml) {
        pendBody.insertAdjacentHTML('beforeend', descHtml);
      }
    }
  }

  // ── D) Substitui RMI por "Sem cálculo" quando sem direito ──
  if (melhor) _aplicarSemRMI(melhor, ctx);

  // ── G) Benefícios não-programáveis — nova seção ao final ──
  if (root && !document.getElementById('p3-naoprog-box')) {
    var naoProgHtml = _renderNaoProg(ctx);
    if (naoProgHtml) {
      var secaoNP = document.createElement('div');
      secaoNP.className = 'p3-secao';
      secaoNP.id = 'p3-naoprog-box';
      secaoNP.setAttribute('data-secao-id', 'naoprog');
      secaoNP.innerHTML = ''
        + '<div class="p3-secao-head" onclick="window._apPlanToggleSecao(\'naoprog\')">'
        + '  <span class="p3-secao-icon">🚑</span>'
        + '  <span class="p3-secao-titulo">Benefícios Não-Programáveis</span>'
        + '  <span class="p3-secao-resumo">invalidez, auxílio-doença, salário-maternidade, pensão, BPC</span>'
        + '  <span class="p3-chevron">▾</span>'
        + '</div>'
        + '<div class="p3-secao-body">' + naoProgHtml + '</div>';
      root.appendChild(secaoNP);
    }
  }
}

// Monkey-patch final
var _renderAnterior = window.renderPlanejamento;
window.renderPlanejamento = function() {
  if (typeof _renderAnterior === 'function') {
    try { _renderAnterior.apply(this, arguments); } catch (e) { console.error('[tramit] render anterior:', e); }
  }
  // Atraso maior que o do RMI para que as linhas de benefício já existam
  setTimeout(_injetar, 80);
};

// Injeção inicial
setTimeout(function() {
  if (typeof window.renderPlanejamento === 'function') _injetar();
}, 700);

console.log('[A&P Plan] Módulo Tramitação v1 — parte 2 (render) carregada');

})();
</script>

<script>
(function() {
'use strict';

if (window._apComplemInstalled) return;
window._apComplemInstalled = true;

// ──────────────────────────────────────────────────────────
// TABELA SELIC ACUMULADA
// Fator para atualizar R$ 1,00 do ano X até o ano DER.
// Base: SELIC anual efetiva média (BACEN) + pro-rata.
// Usa produto acumulado de (1 + taxa_anual).
// Base de referência: abr/2026 = 1.00
// ──────────────────────────────────────────────────────────

// Taxas SELIC anuais efetivas (BACEN)
var SELIC_ANUAL = {
  2006: 0.1508, 2007: 0.1188, 2008: 0.1237, 2009: 0.0998,
  2010: 0.0975, 2011: 0.1158, 2012: 0.0839, 2013: 0.0812,
  2014: 0.1081, 2015: 0.1325, 2016: 0.1400, 2017: 0.0993,
  2018: 0.0642, 2019: 0.0596, 2020: 0.0276, 2021: 0.0440,
  2022: 0.1239, 2023: 0.1304, 2024: 0.1088, 2025: 0.1150,
  2026: 0.0400, // pró-rata até abril (1/3 de ~12% a.a.)
};

// Calcula fator acumulado de cada ano até 2026 (abr)
// Ex: R$ 1,00 em 01/2015 corresponde a ~R$ 2,79 em abr/2026
var SELIC_ACUM = (function() {
  var t = {};
  var acum = 1.0;
  // Caminha regressivamente de 2026 para 2006
  // Para cada ano, acumulamos o fator "dali até 2026"
  var anos = Object.keys(SELIC_ANUAL).map(Number).sort(function(a,b){ return b - a; });
  // 2026 (ano corrente) representa só a fração vigente até a DER
  t[2026] = 1 + SELIC_ANUAL[2026];
  acum = t[2026];
  for (var i = 1; i < anos.length; i++) {
    var ano = anos[i];
    acum = acum * (1 + SELIC_ANUAL[ano]);
    t[ano] = acum;
  }
  return t;
})();

// Alíquotas que faltam para completar 20% (alíquota normal do CI)
var ALIQUOTA_FALTA = {
  'MEI':    0.15, // paga 5%,  falta 15%
  'LC 123': 0.09, // paga 11%, falta 9%
};

// ──────────────────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────────────────

function _fmtMoeda(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return 'R$ ' + v.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d)\,)/g, '.');
}
function _esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}
function _indicadoresStr(c) {
  var i = c.indicadores;
  if (typeof i === 'string') return i;
  if (Array.isArray(i)) return i.join(' ');
  return '';
}
function _parseComp(s) {
  if (!s || typeof s !== 'string') return null;
  var m = s.match(/^(\d{2})\/(\d{4})$/);
  if (!m) return null;
  return new Date(parseInt(m[2]), parseInt(m[1]) - 1, 15);
}
function _parseDataISO(s) {
  if (!s || typeof s !== 'string') return null;
  var m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return null;
  return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
}
function _smDoAno(ano) {
  var t = window.SALARIO_MINIMO_HISTORICO || {};
  return t[ano] || t[2025] || 1518;
}
function _fatorSelic(anoOrigem, anoDestino) {
  var o = SELIC_ACUM[anoOrigem];
  var d = SELIC_ACUM[anoDestino];
  if (!o) o = SELIC_ACUM[2012] || 3.6;
  if (!d) d = SELIC_ACUM[2026] || 1.04;
  return o / d;
}

// ──────────────────────────────────────────────────────────
// CÁLCULO PRINCIPAL
// ──────────────────────────────────────────────────────────

function calcularComplementacoes(ctx) {
  var cnis = ctx && ctx.cnisOriginal;
  if (!cnis || !cnis._contribuicoesDetalhadas || !cnis._contribuicoesDetalhadas.length) {
    return null;
  }

  var derAno = ctx.der ? ctx.der.getFullYear() : new Date().getFullYear();

  // Classifica cada competência
  var entries = [];
  cnis._contribuicoesDetalhadas.forEach(function(c) {
    var d = _parseComp(c.comp);
    if (!d || (ctx.der && d > ctx.der)) return;

    var inds = _indicadoresStr(c);
    var tipo = null;
    // MEI tem prioridade sobre LC 123 (pois tem os dois indicadores em geral)
    if (/IREC-MEI/.test(inds)) {
      tipo = 'MEI';
    } else if (/IREC-LC123/.test(inds)) {
      tipo = 'LC 123';
    }
    if (!tipo) return;

    var ano = parseInt(c.comp.split('/')[1]);
    var sm = _smDoAno(ano);
    var aliqFalta = ALIQUOTA_FALTA[tipo];
    var nominal = sm * aliqFalta;
    var atualizado = nominal * _fatorSelic(ano, derAno);

    entries.push({
      comp: c.comp,
      ano: ano,
      tipo: tipo,
      sm: sm,
      aliqFalta: aliqFalta,
      nominal: nominal,
      atualizado: atualizado,
    });
  });

  if (!entries.length) return null;

  // Agrupa por (ano, tipo)
  var mapa = {};
  entries.forEach(function(e) {
    var k = e.ano + '|' + e.tipo;
    if (!mapa[k]) {
      mapa[k] = {
        ano: e.ano,
        tipo: e.tipo,
        sm: e.sm,
        aliqFalta: e.aliqFalta,
        meses: 0,
        nominal: 0,
        atualizado: 0,
      };
    }
    mapa[k].meses++;
    mapa[k].nominal += e.nominal;
    mapa[k].atualizado += e.atualizado;
  });

  var linhas = Object.keys(mapa).map(function(k) { return mapa[k]; })
    .sort(function(a, b) { return a.ano - b.ano || a.tipo.localeCompare(b.tipo); });

  // Totais
  var totMeses = entries.length;
  var totNominal = entries.reduce(function(s, e) { return s + e.nominal; }, 0);
  var totAtualizado = entries.reduce(function(s, e) { return s + e.atualizado; }, 0);

  // Totais por tipo
  var totMei = { meses: 0, nominal: 0, atualizado: 0 };
  var totLc  = { meses: 0, nominal: 0, atualizado: 0 };
  entries.forEach(function(e) {
    var t = (e.tipo === 'MEI') ? totMei : totLc;
    t.meses++;
    t.nominal += e.nominal;
    t.atualizado += e.atualizado;
  });

  return {
    linhas: linhas,
    entries: entries,
    totalMeses: totMeses,
    totalNominal: totNominal,
    totalAtualizado: totAtualizado,
    totalMei: totMei,
    totalLc123: totLc,
    derAno: derAno,
  };
}

// ──────────────────────────────────────────────────────────
// RENDER
// ──────────────────────────────────────────────────────────

function _renderBloco(res) {
  if (!res || !res.linhas.length) return '';

  var linhasHtml = res.linhas.map(function(l) {
    var cls = l.tipo === 'MEI' ? 'mei' : 'lc123';
    return '<tr>'
      + '<td>' + l.ano + '</td>'
      + '<td><span class="p3-complem-tipo ' + cls + '">' + _esc(l.tipo) + '</span></td>'
      + '<td class="num">' + l.meses + '</td>'
      + '<td class="num">' + _fmtMoeda(l.sm) + '</td>'
      + '<td class="num">' + (l.aliqFalta * 100).toFixed(0) + '%</td>'
      + '<td class="num">' + _fmtMoeda(l.nominal) + '</td>'
      + '<td class="num">' + _fmtMoeda(l.atualizado) + '</td>'
      + '</tr>';
  }).join('');

  // Cards resumo
  var cardsHtml = ''
    + '<div class="p3-complem-card">'
    + '  <div class="p3-complem-card-label">Valor nominal</div>'
    + '  <div class="p3-complem-card-valor">' + _fmtMoeda(res.totalNominal) + '</div>'
    + '  <div class="p3-complem-card-sub">sem atualização</div>'
    + '</div>'
    + '<div class="p3-complem-card destaque">'
    + '  <div class="p3-complem-card-label">Valor atualizado (SELIC)</div>'
    + '  <div class="p3-complem-card-valor">' + _fmtMoeda(res.totalAtualizado) + '</div>'
    + '  <div class="p3-complem-card-sub">a pagar hoje</div>'
    + '</div>'
    + '<div class="p3-complem-card">'
    + '  <div class="p3-complem-card-label">Competências</div>'
    + '  <div class="p3-complem-card-valor">' + res.totalMeses + '</div>'
    + '  <div class="p3-complem-card-sub">' + Math.floor(res.totalMeses/12) + 'a ' + (res.totalMeses%12) + 'm destraváveis</div>'
    + '</div>';

  // Rodapé por tipo
  var rodapeTipo = '';
  if (res.totalMei.meses > 0) {
    rodapeTipo += '<tr><td colspan="5"><span class="p3-complem-tipo mei">MEI</span> ' + res.totalMei.meses + ' meses</td>'
      + '<td class="num">' + _fmtMoeda(res.totalMei.nominal) + '</td>'
      + '<td class="num">' + _fmtMoeda(res.totalMei.atualizado) + '</td></tr>';
  }
  if (res.totalLc123.meses > 0) {
    rodapeTipo += '<tr><td colspan="5"><span class="p3-complem-tipo lc123">LC 123</span> ' + res.totalLc123.meses + ' meses</td>'
      + '<td class="num">' + _fmtMoeda(res.totalLc123.nominal) + '</td>'
      + '<td class="num">' + _fmtMoeda(res.totalLc123.atualizado) + '</td></tr>';
  }

  return ''
    + '<div class="p3-complem">'
    + '  <div class="p3-complem-head">'
    + '    <div class="p3-complem-titulo">💰 Simulação de complementação de alíquota</div>'
    + '  </div>'
    + '  <div class="p3-complem-desc">'
    + '    Valor estimado para <strong>complementar as alíquotas reduzidas</strong> e tornar as competências '
    + '    válidas para <strong>aposentadoria por tempo de contribuição</strong>. Para aposentadoria por '
    + '    idade urbana/híbrida, a complementação <strong>não é necessária</strong> — as competências já contam.'
    + '    <br>Base: <em>Art. 21, §2º e §3º da Lei 8.212/91</em>.'
    + '  </div>'
    + '  <div class="p3-complem-resumo">' + cardsHtml + '</div>'
    + '  <table class="p3-complem-tabela">'
    + '    <thead><tr>'
    + '      <th>Ano</th>'
    + '      <th>Tipo</th>'
    + '      <th class="num">Meses</th>'
    + '      <th class="num">SM do ano</th>'
    + '      <th class="num">Alíq. falta</th>'
    + '      <th class="num">Nominal</th>'
    + '      <th class="num">Atualizado</th>'
    + '    </tr></thead>'
    + '    <tbody>' + linhasHtml + '</tbody>'
    + (rodapeTipo ? '<tfoot>' + rodapeTipo + '</tfoot>' : '')
    + '  </table>'
    + '  <div class="p3-complem-disclaimer">'
    + '    <strong>⚠ Estimativa.</strong> Cálculo com SELIC anual acumulada, sem multa por recolhimento em atraso. '
    + '    Para valor definitivo e GPS oficial, gerar no <strong>e-CAC (Receita Federal)</strong> '
    + '    código 1473 (MEI) ou 1007 (CI), selecionando "Complementação de alíquota" '
    + '    com a competência e base desejadas. Precisão estimada: ±5%.'
    + '  </div>'
    + '</div>';
}

// ──────────────────────────────────────────────────────────
// HOOK — injeta bloco depois do .p3-desconsid
// ──────────────────────────────────────────────────────────

function _obterCtx() {
  var dados = window.dadosExtraidos || {};
  var todos = window._todosDocumentosDados || [];
  var cnis = (todos || []).find(function(d) {
    return d && (d._tipoDetectado === 'cnis' || /cnis|extrato/i.test(d.tipoDocumento || ''));
  }) || dados;

  var der = new Date();
  var derInput = document.getElementById('p3-der-input');
  if (derInput && derInput.value) {
    var d = _parseDataISO(derInput.value);
    if (d) der = d;
  }
  return {
    der: der,
    cnisOriginal: cnis,
    _temCnis: !!(cnis && cnis._vinculos && cnis._vinculos.length),
  };
}

function _injetar() {
  var ctx = _obterCtx();
  if (!ctx._temCnis) return;

  // Evita duplicação
  var existente = document.querySelector('.p3-complem');
  if (existente) existente.remove();

  var res = calcularComplementacoes(ctx);
  if (!res) return;

  var html = _renderBloco(res);
  if (!html) return;

  // Alvo: DEPOIS do .p3-desconsid (módulo Tramitação o cria dentro de Pendências)
  // Se não existir, coloca no final do body da seção Pendências
  var desconsid = document.querySelector('.p3-desconsid');
  if (desconsid) {
    desconsid.insertAdjacentHTML('afterend', html);
    return;
  }
  // Fallback: adiciona no body da seção Pendências
  var pendBody = document.querySelector('[data-secao-id="pendencias"] .p3-secao-body');
  if (pendBody) {
    pendBody.insertAdjacentHTML('beforeend', html);
  }
}

// Expõe
window.AP_Plan = window.AP_Plan || {};
window.AP_Plan.calcularComplementacoes = calcularComplementacoes;
window.AP_Plan.SELIC_ACUM = SELIC_ACUM;
window.AP_Plan.SELIC_ANUAL = SELIC_ANUAL;

// Hook no render (vem depois de Tramitação — delay maior)
var _renderPrev = window.renderPlanejamento;
window.renderPlanejamento = function() {
  if (typeof _renderPrev === 'function') {
    try { _renderPrev.apply(this, arguments); } catch (e) {}
  }
  setTimeout(_injetar, 120); // depois do módulo Tramitação
};

// Injeção inicial
setTimeout(function() {
  if (typeof window.renderPlanejamento === 'function') _injetar();
}, 900);

console.log('[A&P Plan] Módulo Complementações v1 carregado');

})();
</script>

<script>
(function() {
'use strict';

if (window._apDidaticaInstalled) return;
window._apDidaticaInstalled = true;

// ──────────────────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────────────────

function _fmtTempo(meses) {
  if (!meses || meses <= 0) return '—';
  var a = Math.floor(meses/12), m = meses%12;
  if (a === 0) return m + ' meses';
  if (m === 0) return a + ' anos';
  return a + ' anos e ' + m + ' meses';
}
function _fmtTempoCurto(meses) {
  if (!meses || meses <= 0) return '0';
  var a = Math.floor(meses/12), m = meses%12;
  return a + 'a ' + m + 'm';
}
function _fmtData(d) {
  if (!d || !(d instanceof Date) || isNaN(d)) return '—';
  return ('0'+d.getDate()).slice(-2) + '/' + ('0'+(d.getMonth()+1)).slice(-2) + '/' + d.getFullYear();
}
function _fmtMoeda(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return 'R$ ' + v.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d)\,)/g, '.');
}
function _parseDataBR(s) {
  if (!s || typeof s !== 'string') return null;
  var m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (!m) return null;
  return new Date(parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1]));
}
function _parseDataISO(s) {
  if (!s || typeof s !== 'string') return null;
  var m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return null;
  return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
}
function _esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}
function _modo() {
  // Lê o toggle técnica/cliente do v3 via DOM
  var btn = document.querySelector('.p3-modo-btn.ativo');
  if (btn) return btn.textContent.trim().toLowerCase() === 'cliente' ? 'cliente' : 'tecnica';
  return 'tecnica';
}

function _obterCtx() {
  var dados = window.dadosExtraidos || {};
  var todos = window._todosDocumentosDados || [];
  var cnis = (todos || []).find(function(d) {
    return d && (d._tipoDetectado === 'cnis' || /cnis|extrato/i.test(d.tipoDocumento || ''));
  }) || dados;

  var der = new Date();
  var derInput = document.getElementById('p3-der-input');
  if (derInput && derInput.value) {
    var d = _parseDataISO(derInput.value);
    if (d) der = d;
  }
  var nasc = _parseDataBR(dados.dataNascimento || cnis.dataNascimento);
  var idadeMeses = nasc
    ? ((der.getFullYear() - nasc.getFullYear()) * 12 + (der.getMonth() - nasc.getMonth()))
    : 0;

  var sexo = (function() {
    var n = (dados.nomeCliente || cnis.nomeCliente || '').split(' ')[0];
    return /a$/i.test(n) ? 'feminino' : 'masculino';
  })();

  var tempoAteDer = 0, carenciaAteDer = 0;
  var reforma = new Date(2019, 10, 13);
  var tempo2019 = 0, temPre = false;
  if (cnis && cnis._contribuicoesDetalhadas) {
    cnis._contribuicoesDetalhadas.forEach(function(c) {
      var parts = (c.comp || '').split('/');
      if (parts.length !== 2) return;
      var dc = new Date(parseInt(parts[1]), parseInt(parts[0]) - 1, 15);
      if (dc > der) return;
      tempoAteDer++;
      var inds = c.indicadores;
      var invStr = typeof inds === 'string' ? inds : (Array.isArray(inds) ? inds.join(' ') : '');
      if (!/PSC-MEN-SM|PREC-MENOR-MIN/.test(invStr)) carenciaAteDer++;
      if (dc < reforma) { temPre = true; tempo2019++; }
    });
  }

  return {
    nomeCliente: dados.nomeCliente || cnis.nomeCliente || 'Segurado',
    primeiroNome: (dados.nomeCliente || cnis.nomeCliente || 'Segurado').split(' ')[0],
    dataNascimento: nasc,
    sexo: sexo,
    der: der,
    idadeAtualMeses: idadeMeses,
    tempoContribMeses: tempoAteDer,
    carencia: carenciaAteDer,
    tempoContrib2019: tempo2019,
    temContribAnterior2019: temPre,
    cnisOriginal: cnis,
    _temCnis: !!(cnis && cnis._vinculos && cnis._vinculos.length),
  };
}

// ──────────────────────────────────────────────────────────
// TEXTOS POR REGRA — modo TÉCNICA e CLIENTE
// Retorna { mecanismo, calculo, recomendacao }
// ──────────────────────────────────────────────────────────

function _explicacaoDireitoAdquirido(regra, ctx, modo) {
  var sexoStr = ctx.sexo === 'feminino' ? 'mulher' : 'homem';
  var minimoMeses = ctx.sexo === 'feminino' ? 360 : 420;
  var tinha2019 = ctx.tempoContrib2019 || 0;
  var tem = regra.temDireito;

  if (modo === 'tecnica') {
    return {
      mecanismo: ''
        + '<strong>Base legal:</strong> Art. 3º da EC 103/2019 c/c art. 52 e 53 da Lei 8.213/91. '
        + 'Protege o segurado que <strong>implementou integralmente os requisitos</strong> para '
        + 'aposentadoria por tempo de serviço ANTES de 13/11/2019. '
        + 'Requisitos pré-reforma: <code>' + (minimoMeses/12) + ' anos</code> de tempo de contribuição '
        + '(' + sexoStr + '), sem idade mínima. '
        + 'RMI calculada pela regra antiga do art. 29, I da Lei 8.213/91: média dos 80% maiores '
        + 'salários de contribuição desde 07/1994, com <em>fator previdenciário opcional</em> '
        + '(art. 29-C incluído pela Lei 13.183/2015 — só aplica se for benéfico ao segurado).',
      calculo: ''
        + '<span class="op">Tempo em 13/11/2019:</span> <span class="num">' + _fmtTempo(tinha2019) + '</span>\n'
        + '<span class="op">Exigido (' + sexoStr + '):</span> <span class="num">' + _fmtTempo(minimoMeses) + '</span>\n'
        + '<span class="op">Diferença:</span> <span class="' + (tem ? 'res' : 'num') + '">' + (tem ? 'atingido, direito adquirido' : 'faltavam ' + _fmtTempo(minimoMeses - tinha2019)) + '</span>',
      recomendacao: tem

function _explicacaoPontos(regra, ctx, modo) {
  var sexoStr = ctx.sexo === 'feminino' ? 'mulher' : 'homem';
